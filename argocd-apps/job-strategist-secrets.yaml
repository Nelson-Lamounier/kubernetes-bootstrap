# @format
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: job-strategist-secrets
  annotations:
    kubernetes.io/description: "ExternalSecrets for job-strategist namespace"
    argocd.argoproj.io/sync-wave: "2"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/job-strategist/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: job-strategist
  syncPolicy:
    automated: { prune: true, selfHeal: true, allowEmpty: false }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 5m }
