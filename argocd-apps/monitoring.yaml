# @format
# ArgoCD Application: Monitoring Stack
#
# Points ArgoCD at the monitoring Helm chart directory in Git.
# ArgoCD recognizes this as a Helm-type source and renders the chart
# with values from values-development.yaml.
#
# Secrets are managed by ESO (External Secrets Operator) via ExternalSecrets
# in charts/monitoring/external-secrets/ — no manual seeding needed.
#
# admin-ip-allowlist Middleware sourceRange: the chart renders an empty
# array; a PostSync hook Job (allowlist-patcher) reads the ESO-managed
# admin-ip-allowlist Secret (data.ipv4 + data.ipv6, comma-split) and
# patches /spec/ipAllowList/sourceRange. The ignoreDifferences block
# below stops selfHeal from reverting that patch — RespectIgnoreDifferences
# is required for the ignore rule to apply to sync, not just diff.
#
# Credential: SSH Deploy Key (read-only) — stored in K8s secret
# via bootstrap-argocd.sh from SSM parameter.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  annotations:
    kubernetes.io/description: "ArgoCD application for the monitoring stack (Prometheus, Grafana, Loki, Tempo)"
    argocd.argoproj.io/sync-wave: "3"
    # ArgoCD Image Updater — roll the synthetic-monitor CronJob image on each CI
    # push to ECR. Writes the new tag into syntheticMonitor.image.{repository,tag}
    # via a git write-back (chart/.argocd-source-monitoring.yaml).
    argocd-image-updater.argoproj.io/image-list: "synthmon=771826808455.dkr.ecr.eu-west-1.amazonaws.com/synthetic-monitor"
    argocd-image-updater.argoproj.io/synthmon.update-strategy: newest-build
    argocd-image-updater.argoproj.io/synthmon.allow-tags: "regexp:^[0-9a-f]{7,40}(-r[0-9]+)?$"
    argocd-image-updater.argoproj.io/synthmon.helm.image-name: syntheticMonitor.image.repository
    argocd-image-updater.argoproj.io/synthmon.helm.image-tag: syntheticMonitor.image.tag
    argocd-image-updater.argoproj.io/write-back-method: "git:secret:argocd/argocd-image-updater-writeback-key"
    argocd-image-updater.argoproj.io/git-branch: "main"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/monitoring/chart
    helm:
      valueFiles:
        - values-development.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  # Don't reconcile drift on the admin-ip-allowlist sourceRange — it is
  # owned by the allowlist-patcher PostSync hook (real CIDRs cannot live
  # in git, and Helm `lookup` is a no-op under `helm template`).
  ignoreDifferences:
    - group: traefik.io
      kind: Middleware
      name: admin-ip-allowlist
      jsonPointers:
        - /spec/ipAllowList/sourceRange

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      # Required so ignoreDifferences applies to sync, not just diff.
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
