# @format
# ArgoCD Application: ingestion-secrets
#
# Manages ExternalSecret manifests for the ingestion workload namespace.
# Pulls RDS connection config from SSM and the password from Secrets Manager.
#
# Wave 2 — same wave as other secrets applications (nextjs-secrets,
# public-api-secrets). Secrets are ready before the ingestion Job/CronJob
# is deployed at a higher wave.
#
# Namespace "ingestion" is created automatically via CreateNamespace=true.
# The ingestion workload (Job/CronJob) reads both produced Kubernetes Secrets:
#   envFrom:
#     - secretRef: { name: rds-config }       # RDS_HOST, RDS_PORT, RDS_DB_NAME, RDS_USER
#     - secretRef: { name: rds-credentials }  # RDS_PASSWORD

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingestion-secrets
  annotations:
    kubernetes.io/description: "ExternalSecrets for ingestion — RDS config from SSM, credentials from Secrets Manager"
    argocd.argoproj.io/sync-wave: "2"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/ingestion/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: ingestion

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
