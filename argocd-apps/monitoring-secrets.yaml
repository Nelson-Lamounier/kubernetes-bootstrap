# @format
# ArgoCD Application: monitoring-secrets
#
# Manages ExternalSecret manifests for the monitoring stack.
# ESO resolves these into Kubernetes Secrets before the monitoring
# Helm chart (wave 3) starts pods that reference them.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-secrets
  annotations:
    kubernetes.io/description: "ExternalSecrets for monitoring stack — resolved by ESO from SSM"
    argocd.argoproj.io/sync-wave: "2"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/monitoring/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
