# @format
# ArgoCD ApplicationSet: Workload Generator — Self-Service Templates
#
# Watches `charts/*/` directories in Git.
# When a developer adds a new Helm chart directory, ArgoCD automatically
# creates an Application for it — zero manual ArgoCD configuration needed.
#
# How it works:
#   1. Developer creates charts/my-service/chart/
#   2. Developer creates charts/my-service/my-service-values.yaml
#   3. ArgoCD ApplicationSet detects the new directory via Git
#   4. ArgoCD creates a new Application 'my-service' pointing to the chart
#   5. ArgoCD syncs the chart into the my-service namespace
#
# The "golden-path-service" template chart provides production-ready
# defaults that developers customise via values.yaml.
#
# Pattern: Git Directory Generator + templated Application spec

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-generator
  namespace: argocd
  annotations:
    kubernetes.io/description: "Self-service workload generator — auto-creates ArgoCD Applications from Git directories"
  labels:
    app.kubernetes.io/part-of: argocd
    platform.engineering/component: self-service
spec:
  generators:
    # ---------------------------------------------------------------
    # Git Directory Generator
    #
    # Scans the workloads/charts/ directory tree in Git.
    # Each subdirectory with a chart/ folder becomes a workload.
    #
    # Excludes:
    #   - Hidden directories (e.g. .git)
    #   - The golden-path-service template itself (it's a template, not a workload)
    # ---------------------------------------------------------------
    - git:
        repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
        revision: develop
        directories:
          - path: charts/*
          - path: charts/golden-path-service
            exclude: true
          # nextjs is excluded because it requires custom annotations
          # (ArgoCD Image Updater, ECR write-back) and a specific namespace
          # (nextjs-app) that the generic template cannot provide.
          # The manually committed workloads/argocd-apps/nextjs.yaml is used instead.
          - path: charts/nextjs
            exclude: true
          # start-admin is excluded for the same reason as nextjs:
          # it requires ArgoCD Image Updater annotations (ECR SHA tag tracking,
          # git write-back to .argocd-source-start-admin.yaml) that the generic
          # ApplicationSet template cannot inject.
          # The manually committed workloads/argocd-apps/start-admin.yaml is used instead.
          - path: charts/start-admin
            exclude: true
          # wiki-mcp is excluded because it requires ArgoCD Image Updater annotations
          # (ECR SHA tag tracking, git write-back to .argocd-source-wiki-mcp.yaml).
          # The manually committed workloads/argocd-apps/wiki-mcp.yaml is used instead.
          - path: charts/wiki-mcp
            exclude: true
          # admin-api is excluded because it requires ArgoCD Image Updater annotations
          # (ECR SHA tag tracking, git write-back to .argocd-source-admin-api.yaml).
          # The manually committed workloads/argocd-apps/admin-api.yaml is used instead.
          - path: charts/admin-api
            exclude: true
          # public-api is excluded because it requires ArgoCD Image Updater annotations
          # (ECR SHA tag tracking, git write-back to .argocd-source-public-api.yaml).
          # The manually committed workloads/argocd-apps/public-api.yaml is used instead.
          - path: charts/public-api
            exclude: true
          # Platform charts below have hand-crafted argocd-apps/<name>.yaml manifests
          # (multi-source Helm, custom valueFiles paths, or non-standard layouts that
          # don't match the workload-generator template of {{path}}/chart +
          # ../{{path.basename}}-values.yaml). Excluded so the generator doesn't
          # collide with the hand-crafted Applications.
          - path: charts/traefik
            exclude: true
          - path: charts/argocd-notifications
            exclude: true
          - path: charts/cert-manager-config
            exclude: true
          - path: charts/ecr-token-refresh
            exclude: true
          - path: charts/external-secrets-config
            exclude: true
          - path: charts/ingestion
            exclude: true
          - path: charts/crossplane-providers
            exclude: true
          - path: charts/crossplane-xrds
            exclude: true
          - path: charts/monitoring
            exclude: true
          - path: charts/platform-rds
            exclude: true

  template:
    metadata:
      # {{path.basename}} is the directory name, e.g. "nextjs", "api-service"
      name: "{{path.basename}}"
      namespace: argocd
      annotations:
        kubernetes.io/description: "Auto-generated workload: {{path.basename}}"
        argocd.argoproj.io/sync-wave: "5"  # Wave 5: Business Apps
      labels:
        app.kubernetes.io/part-of: argocd
        platform.engineering/source: workload-generator
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default

      source:
        repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
        targetRevision: develop
        path: "{{path}}/chart"
        helm:
          valueFiles:
            - "../{{path.basename}}-values.yaml"

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
