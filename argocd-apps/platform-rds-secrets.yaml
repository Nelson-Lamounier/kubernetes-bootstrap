# @format
# ArgoCD Application: platform-rds-secrets
#
# Manages ExternalSecret manifests for platform RDS.
# ESO resolves these into Kubernetes Secrets before the platform-rds
# Helm chart (wave 3) starts pods that reference them.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-rds-secrets
  annotations:
    kubernetes.io/description: "ExternalSecrets for platform RDS — credentials from Secrets Manager, config from SSM"
    argocd.argoproj.io/sync-wave: "2"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: develop
    path: charts/platform-rds/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
