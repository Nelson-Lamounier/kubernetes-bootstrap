# @format
# ArgoCD Application: ingestion-secrets (EKS — Development)
#
# Reconciles the ExternalSecret manifests under
# charts/ingestion/external-secrets/. Without this Application the EKS
# root app only synced charts/ingestion/chart (namespace+SA+RBAC) and
# ESO was never told to create the Secrets — the ingestion Job pod then
# fails with `CreateContainerConfigError: secret "ingestion-secrets"
# not found` (envFrom secretRef is Optional:false).
#
# Mirrors the article-pipeline-secrets / *-secrets pattern.
#
# Sync wave 2: lands BEFORE the ingestion workload App (wave 8) so the
# Secrets exist by the time admin-api creates an ingestion Job.
#
# NOTE: the ingestion-secrets ExternalSecret sources SM
# `bedrock-development/github-token`, and rds-config / rds-credentials
# source `/bedrock-development/rds/*` and
# `bedrock-development/rds-pgvector/credentials`. Those AWS sources must
# exist or ESO reports SecretSyncError for that ExternalSecret (the
# admin-api Job only mounts platform-rds-credentials + ingestion-secrets).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingestion-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for ingestion Jobs"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/ingestion/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: ingestion
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
