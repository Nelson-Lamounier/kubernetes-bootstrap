# @format
# ArgoCD Application: External Secrets Operator (EKS development)
#
# Installs ESO from the official Helm chart. ESO watches ExternalSecret
# CRDs and syncs values from AWS SSM into Kubernetes Secrets automatically.
#
# All three components (controller, webhook, certController) are scheduled
# on the system MNG (tainted dedicated=system:NoSchedule).
#
# Chart: https://artifacthub.io/packages/helm/external-secrets/external-secrets
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-eks-development
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    kubernetes.io/description: "External Secrets Operator — syncs SSM parameters into Kubernetes Secrets (EKS)"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "~0.10.0"
    helm:
      releaseName: external-secrets
      valuesObject:
        nodeSelector:
          node-role: system
        tolerations:
          - key: dedicated
            operator: Equal
            value: system
            effect: NoSchedule

        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi

        webhook:
          nodeSelector:
            node-role: system
          tolerations:
            - key: dedicated
              operator: Equal
              value: system
              effect: NoSchedule
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

        certController:
          nodeSelector:
            node-role: system
          tolerations:
            - key: dedicated
              operator: Equal
              value: system
              effect: NoSchedule
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
