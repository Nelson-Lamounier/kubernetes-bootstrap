# @format
# ArgoCD Application: article-pipeline-secrets (EKS — Development)
#
# Reconciles the ExternalSecret manifests under
# charts/article-pipeline/external-secrets/. ESO synthesises the
# platform-rds-credentials K8s Secret from AWS Secrets Manager
# (aws-secretsmanager ClusterSecretStore).
#
# Sync wave 2: lands BEFORE the workload App so the Secret exists by
# the time article-pipeline Job pods start (envFrom reference would
# otherwise cause the Job to fail with "secret not found").
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: article-pipeline-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for article-pipeline Jobs"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/article-pipeline/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: article-pipeline
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
