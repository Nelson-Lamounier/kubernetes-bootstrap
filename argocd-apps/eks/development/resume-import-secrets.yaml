# @format
# ArgoCD Application: resume-import-secrets
#
# Reconciles the ExternalSecret manifests under
# charts/resume-import/external-secrets/. ESO synthesises the underlying K8s
# Secrets from SSM/Secrets Manager before admin-api dispatches resume-import
# Jobs into the namespace.
#
# Sync wave 2: lands BEFORE the resume-import namespace/RBAC App (wave 8) so
# Job pods can resolve platform-rds-credentials, admin-api-bedrock,
# resume-import-secrets, and datadog-credentials.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resume-import-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for resume-import Jobs"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/resume-import/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: resume-import
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # ESO admission webhook injects conversionStrategy/decodingStrategy/
  # metadataPolicy defaults into remoteRef and mergePolicy into templates at
  # creation time. Git does not declare those defaults, causing permanent
  # OutOfSync without these ignores.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.target.template.mergePolicy
