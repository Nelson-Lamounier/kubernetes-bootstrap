# @format
# ArgoCD Application: tech-extractor-secrets (EKS — Development)
#
# Reconciles the ExternalSecret manifests under
# charts/tech-extractor/external-secrets/ (platform-rds-credentials +
# tech-extractor-secrets GitHub PAT fallback). Without this the EKS root
# app only syncs the chart (namespace+SA+RBAC) and ESO never creates the
# Secrets, so the tech-extract Job pod fails with CreateContainerConfigError.
#
# Sync wave 2: lands BEFORE the tech-extractor workload App (wave 8) so the
# Secrets exist by the time admin-api creates a tech-extract Job.
#
# NOTE: tech-extractor-secrets sources SM `bedrock-development/github-token`;
# platform-rds-credentials sources `k8s-development/platform-rds/credentials`.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tech-extractor-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for tech-extractor Jobs"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/tech-extractor/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: tech-extractor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
