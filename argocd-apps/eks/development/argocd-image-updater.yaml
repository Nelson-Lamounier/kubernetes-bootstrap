# @format
# ArgoCD Application: Image Updater (EKS development)
#
# Watches ECR for new container image tags and writes updated tags
# back to git via SSH. Required by every workload using Blue/Green or
# Canary Rollouts whose chart annotates with `argocd-image-updater.argoproj.io/*`.
#
# Auth model:
#   - ECR pull: pullsecret:argocd/ecr-credentials — a docker-registry K8s secret
#     refreshed every 6h by the ecr-token-refresh CronJob (ECR tokens expire after
#     12h; 6h schedule gives ≥6h margin). credsexpire: 5h30m forces Image Updater
#     to re-read the secret before the next CronJob fires so it never holds a stale
#     token across a refresh boundary.
#   - Git write: SSH deploy key in argocd/argocd-image-updater-writeback-key
#     (sshPrivateKey field). Pulled from SSM /k8s/development/argocd/image-updater-deploy-key.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater-eks-development
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: argocd-image-updater
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 0.11.0
    helm:
      releaseName: argocd-image-updater
      valuesObject:
        config:
          argocd:
            grpcWeb: true
            insecure: true
            plaintext: true
            serverAddress: argocd-server.argocd.svc.cluster.local
          # config.registries (list) renders to registries.conf in the ConfigMap.
          # config.registriesConf (raw string) renders to a key literally named
          # "registriesConf" — Image Updater never reads that key. Use list form.
          registries:
            - name: AWS ECR
              api_url: https://771826808455.dkr.ecr.eu-west-1.amazonaws.com
              prefix: 771826808455.dkr.ecr.eu-west-1.amazonaws.com
              ping: false
              insecure: false
              credentials: pullsecret:argocd/ecr-credentials
              # Re-read secret before the 6h CronJob fires to avoid stale cache.
              credsexpire: 5h30m
        # Image Updater itself runs on the system MNG.
        tolerations:
          - key: dedicated
            operator: Equal
            value: system
            effect: NoSchedule
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: node-role
                      operator: In
                      values: [system]
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
