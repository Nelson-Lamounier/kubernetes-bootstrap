# @format
# ArgoCD Application: nextjs-secrets (EKS — Plan 5b Phase 6)
#
# Reconciles ExternalSecret manifests for the nextjs frontend from
# charts/nextjs/external-secrets/. Includes the legacy
# cloudfront-origin-secret which is now unused (CloudFront edge layer
# removed in Plan 5b Phase 5) but kept to avoid cross-environment
# drift; safe to delete in a Plan 6 cleanup PR.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextjs-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for nextjs frontend (Plan 5b)"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/nextjs/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: nextjs-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
