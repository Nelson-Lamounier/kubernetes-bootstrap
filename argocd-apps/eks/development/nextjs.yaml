# @format
# ArgoCD Application: nextjs (EKS — Plan 5b Phase 6)
#
# Portfolio frontend. Catch-all on the shared `public` ALB at
# nelsonlamounier.com. Argo Rollouts blueGreen on a single active
# Service; ALB targets the active Service — preview stays internal.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextjs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    kubernetes.io/description: "nextjs portfolio frontend on EKS (Plan 5b)"
    # ArgoCD Image Updater — auto-bump image.tag from ECR (newest-build),
    # write-back to .argocd-source-nextjs.yaml in git. Mirrors tucaken-app/admin-api.
    argocd-image-updater.argoproj.io/image-list: "nextjs=771826808455.dkr.ecr.eu-west-1.amazonaws.com/nextjs-frontend"
    argocd-image-updater.argoproj.io/nextjs.update-strategy: newest-build
    argocd-image-updater.argoproj.io/nextjs.allow-tags: "regexp:^[0-9a-f]{7,40}(-r[0-9]+)?$"
    argocd-image-updater.argoproj.io/nextjs.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/nextjs.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: "git:secret:argocd/argocd-image-updater-writeback-key"
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/git-repository: "git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/nextjs/chart
    helm:
      releaseName: nextjs
      valueFiles:
        - ../nextjs-values.yaml
        - ../nextjs-values-eks.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: nextjs-app
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/template/metadata/annotations
  syncPolicy:
    # Permits ingress to redis-cache-master per the cache NetworkPolicy
    # (charts/redis-cache). ArgoCD stamps this on the namespace it manages
    # via CreateNamespace=true. Add tucaken.com/redis-broker-client when
    # this app starts consuming the job broker.
    managedNamespaceMetadata:
      labels:
        tucaken.com/redis-cache-client: "true"
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
