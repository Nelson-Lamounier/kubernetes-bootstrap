# @format
# ArgoCD Application: tucaken-app (EKS — Plan 5b Phase 6)
#
# SaaS frontend served at tucaken.io (canonical), www.tucaken.io,
# tucaken.com, www.tucaken.com — all on the shared `public` ALB.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tucaken-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    kubernetes.io/description: "tucaken-app SaaS frontend on EKS (Plan 5b)"
    argocd-image-updater.argoproj.io/image-list: "tucaken-app=771826808455.dkr.ecr.eu-west-1.amazonaws.com/tucaken-app"
    argocd-image-updater.argoproj.io/tucaken-app.update-strategy: newest-build
    argocd-image-updater.argoproj.io/tucaken-app.allow-tags: "regexp:^[0-9a-f]{7,40}(-r[0-9]+)?$"
    argocd-image-updater.argoproj.io/tucaken-app.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/tucaken-app.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: "git:secret:argocd/argocd-image-updater-writeback-key"
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/git-repository: "git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/tucaken-app/chart
    helm:
      releaseName: tucaken-app
      valueFiles:
        - ../tucaken-app-values.yaml
        - ../tucaken-app-values-eks.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: tucaken-app
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/template/metadata/annotations
    # waf-annotator PostSync Job writes this annotation after every sync.
    # Ignore it so selfHeal does not strip it between syncs.
    - group: networking.k8s.io
      kind: Ingress
      name: tucaken-app
      jqPathExpressions:
        - .metadata.annotations["alb.ingress.kubernetes.io/wafv2-acl-arn"]
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
