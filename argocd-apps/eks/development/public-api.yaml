# @format
# ArgoCD Application: public-api (EKS — Plan 5b Phase 6)
#
# Deploys the public-api Helm chart with the EKS overlay enabled.
# Frontend ↔ backend communication target. Lives on the shared `public`
# ALB; managed-rules + rate-limit hardening applied via the WebACL
# attached by admin-api's Ingress.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: public-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    kubernetes.io/description: "public-api on EKS (Plan 5b)"
    # ── ArgoCD Image Updater ──────────────────────────────────────────
    # Mirrors admin-api: watches the public-api ECR repo, picks the newest
    # commit-sha-tagged build, and writes the tag back to
    # charts/public-api/chart/.argocd-source-public-api.yaml on `main`
    # (ArgoCD auto-applies that file to this Application). Images are built
    # by ai-applications .github/workflows/deploy-public-api.yml on push to
    # develop.
    argocd-image-updater.argoproj.io/image-list: public-api=771826808455.dkr.ecr.eu-west-1.amazonaws.com/public-api
    argocd-image-updater.argoproj.io/public-api.allow-tags: regexp:^[0-9a-f]{7,40}(-r[0-9]+)?$
    argocd-image-updater.argoproj.io/public-api.update-strategy: newest-build
    argocd-image-updater.argoproj.io/public-api.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/public-api.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/argocd-image-updater-writeback-key
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/git-repository: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/public-api/chart
    helm:
      releaseName: public-api
      valueFiles:
        - ../public-api-values.yaml
        - ../public-api-values-eks.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: public-api
  syncPolicy:
    # NOTE: public-api templates its own Namespace (charts/public-api,
    # deployment.yaml) so the redis-cache-client label lives there, not in
    # managedNamespaceMetadata — that only governs ArgoCD-auto-created
    # namespaces, and this one is a chart-managed resource.
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
