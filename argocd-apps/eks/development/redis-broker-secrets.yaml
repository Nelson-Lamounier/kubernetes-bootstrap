# @format
# ArgoCD Application: redis-broker-secrets
#
# Reconciles ExternalSecret manifests for redis-broker from
# charts/redis-broker/external-secrets/. Sync wave 2.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-broker-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for redis-broker"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/redis-broker/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: redis-broker
  syncPolicy:
    automated:
      prune:      true
      selfHeal:   true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
