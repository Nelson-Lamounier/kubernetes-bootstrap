# @format
# ECR Token Refresh CronJob — argocd namespace
#
# ECR tokens expire after 12h. This job refreshes the `ecr-credentials`
# docker-registry secret every 6h so ArgoCD Image Updater always has
# a valid token with ≥6h safety margin before expiry.
#
# Uses the Kubernetes API directly via curl + the mounted SA token to
# avoid requiring kubectl in the container (amazon/aws-cli doesn't ship it).
# The default ServiceAccount in argocd has no special RBAC — the job uses
# the patch-ecr-credentials ClusterRole bound to it via the RoleBinding below.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-token-refresh
  namespace: argocd
  labels:
    app.kubernetes.io/name: ecr-token-refresh
    app.kubernetes.io/part-of: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-token-refresh
  namespace: argocd
  labels:
    app.kubernetes.io/name: ecr-token-refresh
    app.kubernetes.io/part-of: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ecr-credentials"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-token-refresh
  namespace: argocd
  labels:
    app.kubernetes.io/name: ecr-token-refresh
    app.kubernetes.io/part-of: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-token-refresh
subjects:
  - kind: ServiceAccount
    name: ecr-token-refresh
    namespace: argocd
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresh
  namespace: argocd
  labels:
    app.kubernetes.io/name: ecr-token-refresh
    app.kubernetes.io/part-of: argocd
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-token-refresh
          restartPolicy: OnFailure
          containers:
            - name: ecr-refresh
              image: amazon/aws-cli:2.22.35
              env:
                - name: AWS_REGION
                  value: eu-west-1
                - name: ECR_REGISTRY
                  value: 771826808455.dkr.ecr.eu-west-1.amazonaws.com
                - name: NAMESPACE
                  value: argocd
                - name: SECRET_NAME
                  value: ecr-credentials
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  TOKEN=$(aws ecr get-login-password --region "$AWS_REGION")
                  AUTH=$(printf 'AWS:%s' "$TOKEN" | base64 | tr -d '\n')
                  DOCKERCONFIG=$(printf \
                    '{"auths":{"%s":{"username":"AWS","password":"%s","auth":"%s"}}}' \
                    "$ECR_REGISTRY" "$TOKEN" "$AUTH" | base64 | tr -d '\n')

                  SA=/var/run/secrets/kubernetes.io/serviceaccount
                  K8S=https://kubernetes.default.svc

                  # Patch the existing secret (it was created during bootstrap).
                  HTTP=$(curl -sk -o /dev/null -w "%{http_code}" \
                    -X PATCH \
                    -H "Authorization: Bearer $(cat ${SA}/token)" \
                    -H "Content-Type: application/strategic-merge-patch+json" \
                    --cacert "${SA}/ca.crt" \
                    "${K8S}/api/v1/namespaces/${NAMESPACE}/secrets/${SECRET_NAME}" \
                    -d "{\"data\":{\".dockerconfigjson\":\"${DOCKERCONFIG}\"}}")

                  if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
                    echo "ecr-credentials refreshed (HTTP ${HTTP})"
                  else
                    echo "FAIL: K8s API returned HTTP ${HTTP}"
                    exit 1
                  fi
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
