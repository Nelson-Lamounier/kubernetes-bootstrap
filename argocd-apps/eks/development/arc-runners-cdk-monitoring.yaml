# @format
# ArgoCD Application: ARC Runner Scale Set — tucaken-infra (formerly cdk-monitoring)
#
# Runner scale set for the tucaken-infra repository. NOTE: this repo was renamed
# on GitHub from `cdk-monitoring` → `tucaken-infra`. githubConfigUrl MUST use the
# canonical (current) name: GitHub redirects most REST calls through the rename,
# but the Actions runner-registration session is pinned to the canonical repo, so
# the old URL makes the listener fail `createSession` with a 404 and crash-loop.
# The ArgoCD app name and runnerScaleSetName (k8s-runner-cdk) are kept unchanged
# so existing `runs-on: k8s-runner-cdk` workflows keep resolving.
#
# Personal GitHub accounts scope runner discovery per-repo via githubConfigUrl —
# a separate scale set is required for each repo that uses `runs-on: k8s-runner`.
#
# Same GitHub App (arc-github-secret) as the tucaken-app scale set.
# Prerequisite: GitHub App (ID 3418529) must be installed on tucaken-infra.
# If the app installation is already set to "All repositories", no action needed.
#
# IAM: Runner pods inherit the worker node EC2 instance profile.
# No additional Pod Identity needed for SSM, ECR, or EKS API access.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners-cdk-monitoring
  annotations:
    kubernetes.io/description: "GitHub Actions self-hosted runner scale set for tucaken-infra, formerly cdk-monitoring (0-3 pods, webhook mode)"
    argocd.argoproj.io/sync-wave: "3"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: "0.10.*"
    helm:
      releaseName: arc-runners-cdk-monitoring
      values: |
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller

        githubConfigUrl: "https://github.com/Nelson-Lamounier/tucaken-infra"
        githubConfigSecret: arc-github-secret

        runnerScaleSetName: k8s-runner-cdk

        minRunners: 0
        maxRunners: 3

        template:
          spec:
            serviceAccountName: arc-runner
            containers:
              - name: runner
                image: ghcr.io/nelson-lamounier/kubernetes-bootstrap/arc-runner:latest
                command: ["/home/runner/run.sh"]

  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners

  syncPolicy:
    automated:
      # prune: false — ARC controller creates Role + RoleBinding alongside each
      # AutoscalingListener (hash-named, e.g. k8s-runner-cdk-{hash}-listener).
      # These are not rendered by the Helm chart. With prune:true ArgoCD deletes
      # them on every sync; the ARC controller immediately recreates them →
      # permanent OutOfSync loop + transient RBAC gaps during job pickup.
      prune: false
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  # ARC controller mutates the Helm-created Role (.rules) and RoleBinding
  # (.roleRef, .subjects) post-install. Ignore these fields so ArgoCD does not
  # flag them as drift on every sync.
  # AutoscalingListener is excluded globally via argocd-cm resource.exclusions
  # (not listed here — ignoreDifferences does not prevent pruning of orphaned resources).
  ignoreDifferences:
    - group: rbac.authorization.k8s.io
      kind: Role
      jqPathExpressions:
        - .rules
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
      jqPathExpressions:
        - .roleRef
        - .subjects
