# @format
# ArgoCD Application: ARC Runner Scale Set — cdk-monitoring
#
# Runner scale set for the cdk-monitoring repository.
# Personal GitHub accounts scope runner discovery per-repo via githubConfigUrl —
# a separate scale set is required for each repo that uses `runs-on: k8s-runner`.
#
# Same GitHub App (arc-github-secret) as the tucaken-app scale set.
# Prerequisite: GitHub App (ID 3418529) must be installed on cdk-monitoring.
# If the app installation is already set to "All repositories", no action needed.
#
# IAM: Runner pods inherit the worker node EC2 instance profile.
# No additional Pod Identity needed for SSM, ECR, or EKS API access.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners-cdk-monitoring
  annotations:
    kubernetes.io/description: "GitHub Actions self-hosted runner scale set for cdk-monitoring (0-3 pods, webhook mode)"
    argocd.argoproj.io/sync-wave: "3"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: "0.10.*"
    helm:
      releaseName: arc-runners-cdk-monitoring
      values: |
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller

        githubConfigUrl: "https://github.com/Nelson-Lamounier/cdk-monitoring"
        githubConfigSecret: arc-github-secret

        runnerScaleSetName: k8s-runner

        minRunners: 0
        maxRunners: 3

        template:
          spec:
            serviceAccountName: arc-runner
            containers:
              - name: runner
                image: ghcr.io/nelson-lamounier/kubernetes-bootstrap/arc-runner:latest
                command: ["/home/runner/run.sh"]

  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
