# @format
# ArgoCD Application: monitoring-secrets (EKS — Plan 5b Phase 7)
#
# Reconciles ExternalSecret manifests for the monitoring stack from
# charts/monitoring/external-secrets/. ESO synthesises Secrets from
# SSM via the aws-ssm ClusterSecretStore.
#
# Secrets provisioned:
#   - grafana-credentials (admin-user + admin-password from SSM)
#   - grafana-rds-credentials (postgres password from Secrets Manager — rds-postgres datasource)
#   - github-exporter-credentials (github-token + webhook-token + org)
#   - loki-push-basic-auth-secret
#   - prometheus-basic-auth-secret
#   - admin-ip-allowlist
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for monitoring stack (Plan 5b)"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/monitoring/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # ESO admission webhook injects conversionStrategy/decodingStrategy/metadataPolicy
  # defaults into remoteRef at creation time. Git does not declare these defaults,
  # causing permanent OutOfSync. Ignore the injected fields.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
