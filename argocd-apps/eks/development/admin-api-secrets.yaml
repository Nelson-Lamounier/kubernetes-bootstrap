# @format
# ArgoCD Application: admin-api-secrets (EKS — Plan 5b Phase 6)
#
# Reconciles the ExternalSecret manifests under
# charts/admin-api/external-secrets/. ESO synthesises the underlying
# K8s Secrets from SSM/Secrets Manager (aws-ssm + aws-secretsmanager
# ClusterSecretStores from external-secrets-stores-eks-development).
#
# Sync wave 2: lands BEFORE the workload App so the Secrets exist by
# the time admin-api pods start (mountPath references would otherwise
# block pod admission).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admin-api-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for admin-api (Plan 5b)"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/admin-api/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: admin-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
