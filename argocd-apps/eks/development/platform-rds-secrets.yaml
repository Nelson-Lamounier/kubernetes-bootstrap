# @format
# ArgoCD Application: platform-rds-secrets (EKS — Plan 5b Phase 6)
#
# Reconciles ExternalSecret manifests for the platform RDS database
# (PgBouncer config + RDS credentials) from
# charts/platform-rds/external-secrets/. Lands in namespace `platform`
# matching the chart's namespace value.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-rds-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for platform-rds (Plan 5b)"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/platform-rds/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # ESO admission webhook injects conversionStrategy/decodingStrategy/metadataPolicy
  # defaults into remoteRef at creation time. Git does not declare these defaults,
  # causing permanent OutOfSync. Ignore the injected fields.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
