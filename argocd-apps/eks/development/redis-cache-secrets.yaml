# @format
# ArgoCD Application: redis-cache-secrets
#
# Reconciles ExternalSecret manifests for redis-cache from
# charts/redis-cache/external-secrets/. Sync wave 2 — must reconcile
# before the chart (wave 7) so auth.existingSecret resolves at pod start.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-cache-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for redis-cache"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/redis-cache/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: redis-cache
  syncPolicy:
    automated:
      prune:      true
      selfHeal:   true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # ESO admission webhook injects defaults into remoteRef. Mirror the
  # platform-rds-secrets ignore block so Git stays in sync.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
