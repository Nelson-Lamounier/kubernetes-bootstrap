# @format
# ESO ClusterSecretStores — AWS SSM Parameter Store + Secrets Manager.
# Each workload's ExternalSecret references storeRef: aws-ssm or
# storeRef: aws-secretsmanager.
#
# Authentication: EKS Pod Identity supplies AWS credentials via the
# `external-secrets` ServiceAccount in the `external-secrets` namespace.
# The Pod Identity Association is created by EksPodIdentityStack
# (cdk-monitoring) — no IRSA annotation on the SA, no static AWS keys.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    aws:
      service: ParameterStore
      region: eu-west-1
      # No auth block — EKS Pod Identity (associated with the
      # `external-secrets` ServiceAccount via EksPodIdentityStack)
      # supplies credentials transparently through the AWS SDK.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      # No auth block — EKS Pod Identity (associated with the
      # `external-secrets` ServiceAccount via EksPodIdentityStack)
      # supplies credentials transparently through the AWS SDK.
