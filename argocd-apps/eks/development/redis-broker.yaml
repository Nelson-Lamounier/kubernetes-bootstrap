# @format
# ArgoCD Application: redis-broker (EKS — development)
#
# Standalone Redis (broker profile) in namespace `redis-broker`.
# AOF persistence on, noeviction, EBS gp3 PVC. Pair with redis-cache.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-broker-eks-development
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    kubernetes.io/description: "Redis broker (standalone, AOF persistence) on EKS"
    # StatefulSet volumeClaimTemplates get volumeMode/status defaulted by
    # the API server. ArgoCD's default client-side diff does not normalise
    # those, producing a permanent phantom OutOfSync on an immutable field.
    # ServerSideDiff runs the comparison through a server dry-run, which
    # applies the same defaulting and clears the false positive. Only the
    # broker needs this (the cache has no PVC).
    argocd.argoproj.io/compare-options: ServerSideDiff=true
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/redis-broker/chart
    helm:
      releaseName: redis-broker
      valueFiles:
        - values-development.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: redis-broker
  syncPolicy:
    automated:
      prune:      true
      selfHeal:   true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration:    10s
        factor:      2
        maxDuration: 5m
