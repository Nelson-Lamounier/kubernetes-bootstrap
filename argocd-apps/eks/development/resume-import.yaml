# @format
# ArgoCD Application: resume-import (EKS — Plan 5b Phase 6)
#
# Job-only chart: namespace + SA + RBAC for resume-import Jobs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resume-import-eks-development
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    kubernetes.io/description: "resume-import namespace + RBAC on EKS (Plan 5b)"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/resume-import/chart
    helm:
      releaseName: resume-import
  destination:
    server: https://kubernetes.default.svc
    namespace: resume-import
  syncPolicy:
    # Permits ingress to redis-cache-master per the cache NetworkPolicy
    # (charts/redis-cache). ArgoCD stamps this on the namespace it manages
    # via CreateNamespace=true. Add tucaken.com/redis-broker-client when
    # this app starts consuming the job broker.
    managedNamespaceMetadata:
      labels:
        tucaken.com/redis-cache-client: "true"
        # Pod Security Admission — baseline blocks privileged/hostPath/
        # hostNetwork pods at admission; restricted violations surfaced
        # (warn+audit) to guide follow-up tightening without breaking
        # current pod specs.
        pod-security.kubernetes.io/enforce: baseline
        pod-security.kubernetes.io/warn: restricted
        pod-security.kubernetes.io/audit: restricted
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # ESO admission webhook injects conversionStrategy/decodingStrategy/metadataPolicy
  # defaults into remoteRef at creation time. Git does not declare these defaults,
  # causing permanent OutOfSync. Ignore the injected fields.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
