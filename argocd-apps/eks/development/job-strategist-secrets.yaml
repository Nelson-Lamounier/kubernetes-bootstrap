# @format
# ArgoCD Application: job-strategist-secrets
#
# Reconciles the ExternalSecret manifests under
# charts/job-strategist/external-secrets/. ESO synthesises the underlying
# K8s Secrets from Secrets Manager (aws-secretsmanager ClusterSecretStore
# from external-secrets-stores-eks-development).
#
# Sync wave 2: lands BEFORE the workload App so the Secret exists by
# the time the job-strategist K8s Job is dispatched by admin-api.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: job-strategist-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for job-strategist Jobs"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/job-strategist/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: job-strategist
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # ESO admission webhook injects conversionStrategy/decodingStrategy/metadataPolicy
  # defaults into remoteRef at creation time. Git does not declare these defaults,
  # causing permanent OutOfSync. Ignore the injected fields.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
