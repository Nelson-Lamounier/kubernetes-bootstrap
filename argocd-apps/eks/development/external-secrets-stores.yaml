# @format
# ArgoCD Application: ESO ClusterSecretStores (EKS development)
#
# Wraps the raw ClusterSecretStore manifests so they get a separate
# health/sync surface in ArgoCD. ESO controller is installed by
# EksAddonsStack (CDK-managed); this App only configures the stores.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-stores-eks-development
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: argocd-apps/eks/development/external-secrets-stores
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
