# @format
# ArgoCD Application: argocd-secrets (EKS development)
#
# Reconciles ExternalSecret manifests for ArgoCD itself from
# charts/argocd-eks/external-secrets/. ESO injects secrets into
# the argocd namespace via the aws-ssm ClusterSecretStore.
#
# Secrets provisioned:
#   - argocd-secret (Merge) — injects webhook.github.secret so ArgoCD
#     verifies the HMAC-SHA256 signature on GitHub push webhooks.
#
# sync-wave 2 — runs after ClusterSecretStores (wave 1) are ready,
# before ArgoCD applications begin syncing repo content (wave 3+).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for ArgoCD — GitHub webhook HMAC secret"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/argocd-eks/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
