# @format
# ArgoCD Application: tucaken-app-secrets (EKS — Plan 5b Phase 6)
#
# Reconciles ExternalSecret manifests for tucaken-app from
# charts/tucaken-app/external-secrets/. Same caveat as nextjs-secrets:
# the cloudfront-origin-secret is unused post-Phase-5 but kept for
# now; Plan 6 cleanup will drop it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tucaken-app-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for tucaken-app (Plan 5b)"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/tucaken-app/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: tucaken-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # ESO admission webhook injects conversionStrategy/decodingStrategy/metadataPolicy
  # defaults into remoteRef at creation time. Git does not declare these defaults,
  # causing permanent OutOfSync. Ignore the injected fields.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
