# @format
# ArgoCD Application: ontology-importer-secrets (EKS — Development)
#
# Reconciles the ExternalSecret manifests under
# charts/ontology-importer/external-secrets/ (platform-rds-credentials +
# ontology-importer-secrets Anthropic API key). Without this the EKS root app
# only syncs the chart (namespace+SA+CronJobs) and ESO never creates the
# Secrets, so the CronJob pods fail with CreateContainerConfigError.
#
# Sync wave 2: lands BEFORE the ontology-importer workload App (wave 8) so the
# Secrets exist by the time the CronJobs fire.
#
# NOTE: ontology-importer-secrets sources SM `k8s-development/ontology-importer/
# secrets` (property anthropic_api_key); platform-rds-credentials sources
# `k8s-development/platform-rds/credentials`. The Anthropic SM secret must be
# provisioned out-of-band before the CronJobs can run.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ontology-importer-secrets-eks-development
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for ontology-importer CronJobs"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/ontology-importer/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: ontology-importer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
