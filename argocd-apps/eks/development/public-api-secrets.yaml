# @format
# ArgoCD Application: public-api-secrets (EKS — Plan 5b Phase 6)
#
# Reconciles ExternalSecret manifests for public-api from
# charts/public-api/external-secrets/. ESO synthesises Secrets from
# SSM via the aws-ssm ClusterSecretStore.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: public-api-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: "ExternalSecrets for public-api (Plan 5b)"
  labels:
    app.kubernetes.io/part-of: argocd
    cluster: eks
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/public-api/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: public-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
