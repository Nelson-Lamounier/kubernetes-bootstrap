# @format
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: job-strategist
  annotations:
    kubernetes.io/description: "job-strategist namespace infra — SA + RBAC; Jobs are created by admin-api"
    argocd.argoproj.io/sync-wave: "3"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: develop
    path: charts/job-strategist/chart
  destination:
    server: https://kubernetes.default.svc
    namespace: job-strategist
  syncPolicy:
    automated: { prune: true, selfHeal: true, allowEmpty: false }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff: { duration: 5s, factor: 2, maxDuration: 3m }
