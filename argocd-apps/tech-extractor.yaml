# @format
# ArgoCD Application: tech-extractor
#
# Deploys the tech-extractor namespace's static infra:
#   - ServiceAccount (tech-extractor-sa) used by tech-extractor Job pods
#   - RBAC granting admin-api SA permission to create/observe Jobs here
#
# Job specs themselves are NOT in this chart — admin-api creates Jobs
# programmatically via the Kubernetes API at trigger time (alongside ingestion).
#
# Wave 3 — runs after tech-extractor-secrets (wave 2) so the ServiceAccount
# is ready before admin-api attempts to create a Job that mounts the secrets.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tech-extractor
  annotations:
    kubernetes.io/description: "Tech-extractor namespace infra — SA + RBAC; Jobs are created by admin-api"
    argocd.argoproj.io/sync-wave: "3"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/tech-extractor/chart

  destination:
    server: https://kubernetes.default.svc
    namespace: tech-extractor

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
