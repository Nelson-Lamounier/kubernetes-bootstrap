# @format
# ArgoCD Application: start-admin-secrets
#
# Manages ExternalSecret manifests for the start-admin app.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: start-admin-secrets
  annotations:
    kubernetes.io/description: "ExternalSecrets for start-admin — resolved by ESO from SSM"
    argocd.argoproj.io/sync-wave: "2"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/start-admin/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: start-admin

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
