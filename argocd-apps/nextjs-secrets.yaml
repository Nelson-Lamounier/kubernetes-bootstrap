# @format
# ArgoCD Application: nextjs-secrets
#
# Manages ExternalSecret manifests for the nextjs app.
# ESO resolves these into K8s Secrets before the nextjs workload (wave 5) starts.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextjs-secrets
  annotations:
    kubernetes.io/description: "ExternalSecrets for nextjs — resolved by ESO from SSM"
    argocd.argoproj.io/sync-wave: "2"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/nextjs/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: nextjs-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
