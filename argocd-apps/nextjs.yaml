# @format
# ArgoCD Application: Next.js
#
# Points ArgoCD at the workloads/charts/nextjs/chart/ directory in Git.
# ArgoCD recognizes this as a Helm-type source and renders the chart
# with values from nextjs-values.yaml.
#
# Secrets (DynamoDB table, S3 bucket, API URL) are synced from SSM by
# External Secrets Operator (charts/nextjs/external-secrets/) into
# Kubernetes Secrets that the Deployment consumes via envFrom.secretRef.
# ArgoCD manages all declarative Helm-rendered manifests.
#
# IngressRoute matchRule: the chart renders a placeholder; a PostSync hook
# Job (charts/nextjs/chart/templates/ingressroute-patcher.yaml) reads the
# ESO-managed nextjs-cloudfront-origin-secret and patches the live rule.
# The ignoreDifferences block below stops selfHeal from reverting that
# patch — RespectIgnoreDifferences=true is required for the ignore rule to
# apply to sync (not just diff) operations.
#
# Credential: SSH Deploy Key (read+write) — stored in K8s secret
# via bootstrap-argocd.sh from SSM parameter.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextjs
  annotations:
    kubernetes.io/description: "ArgoCD application for the Next.js portfolio deployment"
    argocd.argoproj.io/sync-wave: "5"  # Wave 5: Business Apps — deploys after Platform Observability (3) and Cluster Utilities (4)
    # -----------------------------------------------------------------------
    # ArgoCD Image Updater — automatically update container image tag
    # when a new image is pushed to ECR by the CI pipeline.
    #
    # Strategy: 'newest-build' picks the most recently built image by timestamp.
    # Filter:   Accepts SHA tags with optional run-attempt suffix (e.g. abc123-r1).
    #           The -rN suffix prevents ECR tag overwrites on pipeline retries.
    # Write-back: Commits .argocd-source-nextjs.yaml to Git so selfHeal
    #             enforces the updated tag instead of reverting it.
    # -----------------------------------------------------------------------
    argocd-image-updater.argoproj.io/image-list: "nextjs=771826808455.dkr.ecr.eu-west-1.amazonaws.com/nextjs-frontend"
    argocd-image-updater.argoproj.io/nextjs.update-strategy: newest-build
    argocd-image-updater.argoproj.io/nextjs.allow-tags: "regexp:^[0-9a-f]{7,40}(-r[0-9]+)?$"
    argocd-image-updater.argoproj.io/nextjs.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/nextjs.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: "git:secret:argocd/argocd-image-updater-writeback-key"
    argocd-image-updater.argoproj.io/git-branch: develop
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Points to this same repo — monorepo pattern
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    # PRODUCTION: Change to 'main' when deploying to production.
    targetRevision: main
    path: charts/nextjs/chart
    helm:
      valueFiles:
        - ../nextjs-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: nextjs-app

  # Don't reconcile drift on:
  #  - IngressRoute matchRule (owned by ingressroute-patcher PostSync hook;
  #    the real CloudFront origin secret cannot live in git and Helm
  #    `lookup` is a no-op under `helm template` in argocd-repo-server).
  #  - Rollout pod template annotations (Stakater Reloader stamps
  #    `last-reload-from-X` here when it rolls the pod after a Secret
  #    content change; selfHeal would otherwise revert the stamp).
  ignoreDifferences:
    - group: traefik.io
      kind: IngressRoute
      name: nextjs
      jsonPointers:
        - /spec/routes/0/match
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/template/metadata/annotations

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      # Required so ignoreDifferences applies to sync, not just diff.
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
