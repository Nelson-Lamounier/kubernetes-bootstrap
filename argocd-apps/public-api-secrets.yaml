# @format
# ArgoCD Application: public-api-secrets
#
# Manages ExternalSecret manifests for the public-api app.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: public-api-secrets
  annotations:
    kubernetes.io/description: "ExternalSecrets for public-api — resolved by ESO from SSM"
    argocd.argoproj.io/sync-wave: "2"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: develop
    path: charts/public-api/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: public-api

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
