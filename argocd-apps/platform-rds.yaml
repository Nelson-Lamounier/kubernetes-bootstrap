# @format
# ArgoCD Application: platform-rds
#
# Points ArgoCD at the platform-rds Helm chart directory in Git.
# ArgoCD recognizes this as a Helm-type source and renders the chart
# with values from values-development.yaml.
#
# Secrets are managed by ESO (External Secrets Operator) via ExternalSecrets
# in charts/platform-rds/external-secrets/ — no manual seeding needed.
#
# Credential: SSH Deploy Key (read-only) — stored in K8s secret
# via bootstrap-argocd.sh from SSM parameter.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-rds
  annotations:
    kubernetes.io/description: "Platform RDS — PgBouncer connection pooler + DDL bootstrap Job"
    argocd.argoproj.io/sync-wave: "3"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/platform-rds/chart
    helm:
      valueFiles:
        - values-development.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
