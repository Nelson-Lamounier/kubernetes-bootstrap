# @format
# ArgoCD Application: ARC Runner Scale Set — tucaken-app
#
# Second runner scale set targeting the tucaken-app repository.
# Personal GitHub accounts cannot register org-level runners — each
# repo that needs self-hosted runners requires its own scale set with
# a distinct githubConfigUrl pointing at that repo.
#
# Runner image is built and published by cdk-monitoring's build-ci-image.yml
# workflow (.github/docker/arc-runner/Dockerfile) to GHCR under the
# cdk-monitoring repository (public). Image must exist before ArgoCD reconciles.
#
# IAM: Runner pods inherit the worker node EC2 instance profile.
# No additional IRSA needed for SSM, ECR, or S3 access.
#
# RBAC: arc-runner ClusterRole (gitops/arc/runner-rbac.yaml) already grants
# argoproj.io rollouts get/list/watch/patch/update cluster-wide — covers the
# admin-api namespace promote job without a separate RoleBinding.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners-tucaken
  annotations:
    kubernetes.io/description: "GitHub Actions self-hosted runner scale set for tucaken-app (0-3 pods, webhook mode)"
    argocd.argoproj.io/sync-wave: "3"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: "0.10.*"
    helm:
      releaseName: arc-runners-tucaken
      values: |
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller

        githubConfigUrl: "https://github.com/Nelson-Lamounier/tucaken-app"
        githubConfigSecret: arc-github-secret

        runnerScaleSetName: k8s-runner

        minRunners: 0
        maxRunners: 3

        template:
          spec:
            serviceAccountName: arc-runner
            containers:
              - name: runner
                image: ghcr.io/nelson-lamounier/cdk-monitoring/arc-runner:latest
                command: ["/home/runner/run.sh"]

  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
