# @format
# ArgoCD Application: ingestion
#
# Deploys the ingestion namespace's static infra:
#   - ServiceAccount (ingestion-sa) used by ingestion Job pods
#   - RBAC granting admin-api SA permission to create/observe Jobs here
#
# Job specs themselves are NOT in this chart — admin-api creates Jobs
# programmatically via the Kubernetes API at trigger time.
#
# Wave 3 — runs after ingestion-secrets (wave 2) so the ServiceAccount
# is ready before admin-api attempts to create a Job that mounts the secrets.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingestion
  annotations:
    kubernetes.io/description: "Ingestion namespace infra — SA + RBAC; Jobs are created by admin-api"
    argocd.argoproj.io/sync-wave: "3"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/ingestion/chart

  destination:
    server: https://kubernetes.default.svc
    namespace: ingestion

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
