# @format
# ArgoCD Application: tech-extractor-secrets
#
# Manages ExternalSecret manifests for the tech-extractor workload namespace:
#   - platform-rds-credentials (PG_* — platform RDS via PgBouncer)
#   - tech-extractor-secrets   (GITHUB_TOKEN fallback; admin-api injects a
#                               per-user installation token that overrides it)
#
# Wave 2 — secrets ready before the namespace infra (wave 3) and before
# admin-api creates a Job that mounts them.
#
# Namespace "tech-extractor" is created automatically via CreateNamespace=true.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tech-extractor-secrets
  annotations:
    kubernetes.io/description: "ExternalSecrets for tech-extractor — platform RDS creds + GitHub PAT fallback"
    argocd.argoproj.io/sync-wave: "2"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: main
    path: charts/tech-extractor/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: tech-extractor

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
