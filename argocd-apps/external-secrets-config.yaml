# @format
# ArgoCD Application: external-secrets-config
#
# Manages the ClusterSecretStore that points ESO at AWS SSM.
# Must sync AFTER the ESO controller (wave 0) so the CRD exists.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  annotations:
    kubernetes.io/description: "ClusterSecretStore — wires ESO to AWS SSM Parameter Store"
    argocd.argoproj.io/sync-wave: "1"
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
    targetRevision: develop
    path: charts/external-secrets-config

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - ServerSideApply=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
