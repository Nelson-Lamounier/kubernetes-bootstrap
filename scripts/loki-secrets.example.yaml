# @format
# Declarative config for `gh-secrets apply`.
# Wires the two LOKI_* secrets across all 4 portfolio repos in one shot.
#
# Usage:
#   1. Edit `valueFromStdin: true` below to `value: "..."` if you'd rather
#      put the token inline (NOT recommended — git history captures it).
#      Better: keep stdin and pipe the token at run time.
#
#   2. Run:
#        echo -n 'github-actions:CLEARTEXT-TOKEN-HERE' | \
#          tsx scripts/gh-secrets.ts apply scripts/loki-secrets.example.yaml
#
#      Note: only ONE entry can use stdin per `apply` run. To set both
#      LOKI_PUSH_URL and LOKI_PUSH_BASIC_AUTH from stdin, use two separate
#      runs OR put the URL inline (it's not sensitive).

owner: Nelson-Lamounier

repos:
  - tucaken-app
  - ai-applications
  - cdk-monitoring
  - kubernetes-bootstrap

entries:
  - name:  LOKI_PUSH_URL
    value: "https://loki-push.nelsonlamounier.com/loki/api/v1/push"

  - name:           LOKI_PUSH_BASIC_AUTH
    valueFromStdin: true        # pipe `github-actions:<token>` via stdin
