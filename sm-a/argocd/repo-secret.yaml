# @format
# ArgoCD Repository Credentials — SSH Deploy Keys
#
# Grants ArgoCD read-only access to private GitHub repositories via SSH.
# The same deploy key is reused across repos — add the public key as a
# deploy key in each repo's Settings → Deploy Keys.
#
# The private key is resolved from SSM during bootstrap and injected here.
#
# Setup (one-time per repo):
#   1. Generate key: ssh-keygen -t ed25519 -C "argocd-deploy-key" -f deploy-key -N ""
#   2. Add deploy-key.pub to GitHub → Repo → Settings → Deploy Keys (read-only)
#   3. Store private key in SSM: aws ssm put-parameter --name "/k8s/{env}/deploy-key" \
#        --value "$(cat deploy-key)" --type SecureString
#
# To add a new repo: add the same public key as a deploy key in the new repo —
# no new SSH key or SSM parameter needed.

# ── cdk-monitoring (workloads ApplicationSet sources) ─────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: repo-cdk-monitoring
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: git@github.com:Nelson-Lamounier/cdk-monitoring.git
  sshPrivateKey: "${DEPLOY_KEY}"
---
# ── kubernetes-bootstrap (platform ArgoCD Applications + charts) ─────────────
apiVersion: v1
kind: Secret
metadata:
  name: repo-kubernetes-bootstrap
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: git@github.com:Nelson-Lamounier/kubernetes-bootstrap.git
  sshPrivateKey: "${DEPLOY_KEY}"
