# @format
# cert-manager ClusterIssuer: Let's Encrypt (DNS-01 via Route 53)
#
# Uses the DNS-01 challenge solver via cross-account Route 53.
# DNS-01 was chosen over HTTP-01 because:
#   - Traefik uses hostNetwork:true + EIP, causing hairpin NAT failure
#     (cert-manager self-check can't reach the EIP from inside the cluster)
#   - DNS-01 creates a TXT record in Route 53 — no HTTP connectivity needed
#   - Works for privately accessible domains (ops.* is not publicly routable)
#
# This is a TEMPLATE file. During bootstrap, the placeholders are replaced
# with actual values from SSM parameters written by CDK:
#   - ${PUBLIC_HOSTED_ZONE_ID} → from SSM: ${SSM_PREFIX}/public-hosted-zone-id
#   - ${CROSS_ACCOUNT_DNS_ROLE_ARN} → from SSM: ${SSM_PREFIX}/cross-account-dns-role-arn
#
# ClusterIssuer (not namespaced Issuer) so that Certificate CRs in
# any namespace can reference it.
#
# Applied during bootstrap via bootstrap_argocd.py Step 5d.
# NOT managed by ArgoCD (ArgoCD would overwrite the templated values).

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
  annotations:
    kubernetes.io/description: "Let's Encrypt production issuer via DNS-01 challenge (Route 53)"
spec:
  acme:
    # Let's Encrypt production endpoint
    server: https://acme-v02.api.letsencrypt.org/directory

    # Same email used in the previous Traefik ACME config
    email: lamounierleao2025@outlook.com

    # Secret to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt-account-key

    solvers:
      - dns01:
          route53:
            # Region where the Route 53 hosted zone is accessible
            region: eu-west-1
            # Public hosted zone ID (injected from SSM during bootstrap)
            hostedZoneID: ${PUBLIC_HOSTED_ZONE_ID}
            # Cross-account role ARN (injected from SSM during bootstrap)
            # cert-manager assumes this role via the EC2 instance profile
            role: ${CROSS_ACCOUNT_DNS_ROLE_ARN}
