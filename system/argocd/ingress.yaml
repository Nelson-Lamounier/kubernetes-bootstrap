# @format
# ArgoCD Traefik IngressRoute
#
# Exposes the ArgoCD UI + API at /argocd path via Traefik over HTTPS.
# ArgoCD server must have server.rootpath=/argocd and server.insecure=true
# set in argocd-cmd-params-cm for this to work correctly.
#
# TLS handled by Traefik Let's Encrypt on the websecure entrypoint.
# Access restricted to admin IPs via IPAllowList middleware.
#
# NOTE: The admin-ip-allowlist Middleware is NOT defined here.
# It is created dynamically by bootstrap_argocd.py (Step 7b) using
# IPs read from SSM, avoiding hardcoded values in version control.

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-ingress
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ops.nelsonlamounier.com`) && PathPrefix(`/argocd`)
      kind: Rule
      priority: 100
      middlewares:
        - name: admin-ip-allowlist
        - name: monitoring-rate-limit@kubernetescrd
      services:
        - name: argocd-server
          port: 80
  tls: {}
