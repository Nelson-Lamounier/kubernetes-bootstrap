# @format
# ArgoCD Application: Next.js
#
# Points ArgoCD at the app-deploy/nextjs/chart/ directory in Git.
# ArgoCD recognizes this as a Helm-type source and renders the chart
# with values from nextjs-values.yaml.
#
# Secrets (DynamoDB table, S3 bucket, API URL) are pre-seeded
# by the SSM Automation pipeline / deploy.py via kubectl create secret.
# ArgoCD manages all declarative Helm-rendered manifests.
#
# Credential: SSH Deploy Key (read-only) — stored in K8s secret
# via bootstrap-argocd.sh from SSM parameter.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextjs
  annotations:
    kubernetes.io/description: "ArgoCD application for the Next.js portfolio deployment"
    # -----------------------------------------------------------------------
    # ArgoCD Image Updater — automatically update container image tag
    # when a new image is pushed to ECR by the CI pipeline.
    #
    # Strategy: 'latest' picks the most recently built image by timestamp.
    # Filter:   Only considers SHA-format tags (7-40 hex chars).
    # Write-back: Updates ArgoCD Application params (no git commit needed).
    # -----------------------------------------------------------------------
    argocd-image-updater.argoproj.io/image-list: "nextjs=771826808455.dkr.ecr.eu-west-1.amazonaws.com/nextjs-frontend"
    argocd-image-updater.argoproj.io/nextjs.update-strategy: newest-build
    argocd-image-updater.argoproj.io/nextjs.allow-tags: "regexp:^[0-9a-f]{7,40}$"
    argocd-image-updater.argoproj.io/nextjs.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/nextjs.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Points to this same repo — monorepo pattern
    repoURL: git@github.com:Nelson-Lamounier/cdk-monitoring.git
    # PRODUCTION: Change to 'main' when deploying to production.
    targetRevision: develop
    path: kubernetes-app/app-deploy/nextjs/chart
    helm:
      valueFiles:
        - ../nextjs-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: nextjs-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
