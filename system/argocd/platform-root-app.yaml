# @format
# ArgoCD Platform Root Application — Infrastructure App-of-Apps
#
# Discovers and manages all PLATFORM Application manifests (waves 0–4):
#   - TLS (cert-manager, cert-manager-config)
#   - Ingress (traefik)
#   - Observability (monitoring, metrics-server, argo-rollouts)
#   - Utilities (ecr-token-refresh, argocd-image-updater, argocd-notifications, aws-ebs-csi-driver)
#
# Must be 100% healthy before the workloads root app deploys business apps.
#
# Source: kubernetes-platform (decoupled from cdk-monitoring as of Apr 2026)
# ArgoCD repo secret: repo-kubernetes-platform (same SSH key as cdk-monitoring)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-root
  namespace: argocd
  annotations:
    kubernetes.io/description: "Platform App-of-Apps — manages infrastructure Applications (waves 0–4)"
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: app-of-apps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/kubernetes-platform.git
    # PRODUCTION: Change to 'main' when deploying to production.
    targetRevision: develop
    path: argocd-apps
    directory:
      recurse: false

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
