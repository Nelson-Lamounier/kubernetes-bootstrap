# @format
# ============================================================================
# deploy-golden-ami.yml — Golden AMI Pipeline
# ============================================================================
#
# Single-account, two-environment pattern:
#
#   Phase 1 — Static Analysis    Validates the generated Image Builder
#              component YAML offline. No AWS credentials required.
#              Fails fast before a 25-minute bake.
#
#   Phase 2 — CDK Deploy + Bake  Provisions Image Builder infrastructure
#              and bakes one AMI (~15-25 min). Stores AMI ID at
#              /k8s/development/golden-ami/latest. Skipped when
#              existing_ami_id is provided.
#
#   Phase 3 — Validate           Verifies AMI state, root device type,
#              and tags via ec2:DescribeImages.
#
#   Phase 4 — Promote to prod    Copies the validated AMI ID to
#              /k8s/production/golden-ami/latest. Requires explicit
#              promote_to_production=true — never runs automatically.
#
# One bake, two SSM pointers. No re-baking per environment.
#
# AMI refresh automation (no CDK redeploy needed):
#   Writing the AMI ID to /k8s/{env}/golden-ami/latest triggers an
#   EventBridge rule in cdk-monitoring which starts the
#   k8s-{env}-ami-refresh Step Functions state machine. That state machine
#   updates all Launch Templates and rolls the ASGs (workers first, then
#   control plane) without requiring a cdk deploy.
#
# Credentials (repository-level — no GitHub Environments):
#   vars.AWS_REGION              repository variable  (e.g. eu-west-1)
#   vars.NOTIFICATION_EMAIL      repository variable  (optional — subscribes
#                                to AMI build failure SNS topic)
#   secrets.AWS_OIDC_ROLE        repository secret    (OIDC role ARN)
#
# Testing a pre-existing AMI without rebuilding:
#   workflow_dispatch → set existing_ami_id to ami-xxxxxxxxxxxx
#
# Debugging a failed bake:
#   If the "CDK Deploy + Bake" job fails with "component ... failed!", the
#   per-step shell output is in S3 (scripts bucket / image-builder-logs/).
#   Fetch it locally with:
#
#     just ami-build-logs                            # development (default)
#     just ami-build-logs production prod-account    # production

name: Deploy Golden AMI

on:
  workflow_dispatch:
    inputs:
      build_ami:
        description: "Trigger AMI bake and wait for completion"
        required: false
        default: true
        type: boolean
      existing_ami_id:
        description: "Validate this pre-built AMI ID instead of rebuilding (e.g. ami-0abc123)"
        required: false
        default: ""
        type: string
      promote_to_production:
        description: "Promote validated AMI to production SSM path (/k8s/production/golden-ami/latest)"
        required: false
        default: false
        type: boolean

  push:
    branches:
      - main
    paths:
      - "infra/lib/constructs/compute/**"
      - "infra/lib/stacks/golden-ami-stack.ts"
      - "infra/lib/config/kubernetes/configurations.ts"
      - "sm-a/boot/steps/**"
      - ".github/workflows/deploy-golden-ami.yml"

concurrency:
  # Never cancel an in-flight AMI build — concurrent builds write
  # conflicting AMI IDs to the same SSM parameter.
  group: golden-ami-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Static AMI component analysis — no AWS credentials required.
  # ---------------------------------------------------------------------------
  test-ami-component:
    name: Static AMI Component Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: "22"
          install-infra: "true"

      - name: Run static analysis
        run: npx --prefix scripts tsx scripts/test-ami-build.ts

  # ---------------------------------------------------------------------------
  # Phase 2: CDK deploy + AMI bake (development)
  # Skipped when existing_ami_id is provided.
  # ---------------------------------------------------------------------------
  bake:
    name: CDK Deploy + Bake
    needs: test-ami-component
    if: "!inputs.existing_ami_id"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      id-token: write
      contents: read

    outputs:
      ami_id: ${{ steps.wait_ami.outputs.ami_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (Yarn v4)
        run: corepack enable

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: infra/.yarn/cache
          key: yarn-infra-${{ runner.os }}-${{ hashFiles('infra/yarn.lock') }}
          restore-keys: |
            yarn-infra-${{ runner.os }}-

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve VPC ID from SSM
        id: resolve_vpc
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          VPC_ID=$(aws ssm get-parameter \
            --name "/k8s/development/vpc-id" \
            --region "$AWS_REGION" \
            --query Parameter.Value \
            --output text)
          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "ERROR: VPC ID not found at /k8s/development/vpc-id"
            exit 1
          fi
          echo "vpc_id=$VPC_ID" >> "$GITHUB_OUTPUT"
          echo "VPC: $VPC_ID"

      - name: Install dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: CDK Deploy
        env:
          VPC_ID: ${{ steps.resolve_vpc.outputs.vpc_id }}
          NOTIFICATION_EMAIL: ${{ vars.NOTIFICATION_EMAIL }}
        run: |
          npx cdk deploy "K8s-GoldenAmi-development" \
            --require-approval never \
            --progress events \
            -c environment="development" \
            -c vpcId="${VPC_ID}"
        working-directory: infra

      - name: Wait for AMI
        id: wait_ami
        if: ${{ github.event_name == 'push' || inputs.build_ami }}
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          SSM_PATH="/k8s/development/golden-ami/latest"
          MAX_WAIT=1800
          INTERVAL=30
          ELAPSED=0

          echo "Polling $SSM_PATH (max ${MAX_WAIT}s)..."
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            AMI_ID=$(aws ssm get-parameter \
              --name "$SSM_PATH" \
              --region "$AWS_REGION" \
              --query Parameter.Value \
              --output text 2>/dev/null || echo "")

            if [[ "$AMI_ID" == ami-* ]]; then
              STATE=$(aws ec2 describe-images \
                --image-ids "$AMI_ID" \
                --region "$AWS_REGION" \
                --query 'Images[0].State' \
                --output text 2>/dev/null || echo "unknown")
              echo "  $AMI_ID — $STATE (${ELAPSED}s)"
              if [ "$STATE" = "available" ]; then
                echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
                echo "Golden AMI ready: $AMI_ID"
                exit 0
              fi
            else
              echo "  Waiting for AMI ID in SSM... (${ELAPSED}/${MAX_WAIT}s)"
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "ERROR: Timed out after ${MAX_WAIT}s"
          exit 1

      - name: Job summary
        if: always()
        env:
          VPC_ID: ${{ steps.resolve_vpc.outputs.vpc_id }}
          AMI_ID: ${{ steps.wait_ami.outputs.ami_id }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          {
            echo "## Golden AMI — Bake"
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Stack    | \`K8s-GoldenAmi-development\` |"
            echo "| Region   | \`${AWS_REGION}\` |"
            echo "| VPC ID   | \`${VPC_ID}\` |"
            echo "| AMI ID   | \`${AMI_ID:-not built}\` |"
            echo "| SSM Path | \`/k8s/development/golden-ami/latest\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Phase 2b: Image Builder log fetch — runs only when the bake job fails
  # with a component execution error ("Workflow Execution ID: ... failed!").
  #
  # Replicates the manual troubleshooting steps:
  #   1. Resolve scripts S3 bucket from SSM
  #   2. List image-builder-logs/ — pick the most recent execution
  #   3. Download TOE console.log, parse step boundaries
  #   4. Print failed step output + stderr to the job summary
  #
  # Local equivalent: just ami-build-logs [env] [region] [profile]
  # ---------------------------------------------------------------------------
  debug-bake:
    name: Fetch Image Builder Logs
    needs: bake
    if: failure() && needs.bake.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: "22"
          install-infra: "false"

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch Image Builder logs
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          npx tsx scripts/ami-build-logs.ts \
            --env development \
            --region "$AWS_REGION" \
          2>&1 | tee /tmp/ami-build-logs.txt || true

      - name: Write logs to job summary
        if: always()
        run: |
          {
            echo "## Image Builder Build Logs"
            echo '```'
            cat /tmp/ami-build-logs.txt
            echo '```'
            echo ""
            echo "> Run \`just ami-build-logs\` locally for the same output."
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Phase 3: Validate AMI metadata
  # Resolves AMI ID from bake job output or existing_ami_id input.
  # ---------------------------------------------------------------------------
  validate:
    name: Validate AMI Metadata
    needs: [test-ami-component, bake]
    if: |
      always() &&
      needs.test-ami-component.result == 'success' &&
      (inputs.existing_ami_id != '' || needs.bake.outputs.ami_id != '')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      id-token: write
      contents: read

    outputs:
      ami_id: ${{ steps.resolve_ami.outputs.ami_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve AMI ID
        id: resolve_ami
        env:
          EXISTING_AMI_ID: ${{ inputs.existing_ami_id }}
          FROM_BAKE: ${{ needs.bake.outputs.ami_id }}
        run: |
          AMI_ID="${EXISTING_AMI_ID:-$FROM_BAKE}"
          if [[ "$AMI_ID" != ami-* ]]; then
            echo "ERROR: No valid AMI ID available"
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          SOURCE="${EXISTING_AMI_ID:+existing_ami_id input}"
          SOURCE="${SOURCE:-bake job output}"
          echo "AMI ID: $AMI_ID  (source: $SOURCE)"

      - name: Validate AMI metadata
        env:
          AMI_ID: ${{ steps.resolve_ami.outputs.ami_id }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          echo "Fetching metadata for $AMI_ID..."

          AMI_INFO=$(aws ec2 describe-images \
            --image-ids "$AMI_ID" \
            --region "$AWS_REGION" \
            --query 'Images[0]' \
            --output json 2>/dev/null || echo "null")

          if [ "$AMI_INFO" = "null" ] || [ -z "$AMI_INFO" ]; then
            echo "::error::AMI $AMI_ID not found in $AWS_REGION"
            exit 1
          fi

          STATE=$(echo "$AMI_INFO" | jq -r '.State // "unknown"')
          if [ "$STATE" != "available" ]; then
            echo "::error::AMI state is '$STATE' — must be 'available'"
            exit 1
          fi
          echo "[pass] state: $STATE"

          ROOT_TYPE=$(echo "$AMI_INFO" | jq -r '.RootDeviceType // "unknown"')
          if [ "$ROOT_TYPE" != "ebs" ]; then
            echo "::error::Root device type '$ROOT_TYPE' — must be 'ebs'"
            exit 1
          fi
          echo "[pass] root device type: $ROOT_TYPE"

          ARCH=$(echo "$AMI_INFO" | jq -r '.Architecture // "unknown"')
          AMI_NAME=$(echo "$AMI_INFO" | jq -r '.Name // "unknown"')
          CREATED=$(echo "$AMI_INFO" | jq -r '.CreationDate // "unknown"')
          echo "[info] name: $AMI_NAME"
          echo "[info] architecture: $ARCH"
          echo "[info] created: $CREATED"

          GP3_COUNT=$(echo "$AMI_INFO" | jq '[.BlockDeviceMappings[]?.Ebs | select(.VolumeType=="gp3")] | length')
          [ "$GP3_COUNT" -eq 0 ] \
            && echo "::warning::No gp3 block devices found (may use gp2)" \
            || echo "[pass] gp3 block devices: $GP3_COUNT"

          get_tag() { echo "$AMI_INFO" | jq -r --arg k "$1" '.Tags[]? | select(.Key==$k) | .Value // ""'; }
          check_tag() {
            local key="$1" expected="$2" actual="$3"
            [ "$actual" = "$expected" ] \
              && echo "[pass] tag $key=$actual" \
              || echo "::warning::Tag $key='$actual' (expected '$expected')"
          }
          check_tag "Purpose"        "GoldenAMI"            "$(get_tag Purpose)"
          check_tag "ManagedBy"      "kubernetes-bootstrap" "$(get_tag ManagedBy)"
          check_tag "BootstrapBaked" "true"                 "$(get_tag BootstrapBaked)"
          K8S_VER=$(get_tag KubernetesVersion)
          [ -n "$K8S_VER" ] \
            && echo "[info] KubernetesVersion: $K8S_VER" \
            || echo "::warning::Tag KubernetesVersion not set"

          echo ""
          echo "AMI $AMI_ID passed validation ($AMI_NAME)"

      - name: Validation summary
        if: always()
        env:
          AMI_ID: ${{ steps.resolve_ami.outputs.ami_id }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          {
            echo "## AMI Validation"
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| AMI ID   | \`${AMI_ID:-n/a}\` |"
            echo "| Region   | \`${AWS_REGION}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Phase 4: Promote to production
  # Writes the validated AMI ID to /k8s/production/golden-ami/latest.
  # Only runs when promote_to_production=true — never automatic.
  # ---------------------------------------------------------------------------
  promote:
    name: Promote to Production
    needs: validate
    if: |
      needs.validate.result == 'success' &&
      inputs.promote_to_production == true
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Write AMI ID to production SSM
        env:
          AMI_ID: ${{ needs.validate.outputs.ami_id }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws ssm put-parameter \
            --name "/k8s/production/golden-ami/latest" \
            --value "$AMI_ID" \
            --type String \
            --overwrite \
            --region "$AWS_REGION"
          echo "Promoted $AMI_ID → /k8s/production/golden-ami/latest"

      - name: Promotion summary
        env:
          AMI_ID: ${{ needs.validate.outputs.ami_id }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          {
            echo "## AMI Promotion"
            echo "| Property   | Value |"
            echo "|------------|-------|"
            echo "| AMI ID     | \`${AMI_ID}\` |"
            echo "| SSM (dev)  | \`/k8s/development/golden-ami/latest\` |"
            echo "| SSM (prod) | \`/k8s/production/golden-ami/latest\` |"
            echo "| Region     | \`${AWS_REGION}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
