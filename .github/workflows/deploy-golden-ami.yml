          done

          echo "ERROR: Timed out waiting for AMI ID in SSM after ${MAX_WAIT_SECONDS}s"
          exit 1

      - name: Job summary
        if: always()
        env:
          VPC_ID: ${{ steps.resolve_vpc.outputs.vpc_id }}
          AMI_ID: ${{ steps.verify_ami.outputs.ami_id }}
        run: |
          {
            echo "## Golden AMI Deployment Summary"
            echo ""
            echo "| Property        | Value |"
            echo "|-----------------|-------|"
            echo "| Environment     | \`${DEPLOY_ENV}\` |"
            echo "| Stack           | \`K8s-GoldenAmi-${DEPLOY_ENV}\` |"
            echo "| VPC ID          | \`${VPC_ID}\` |"
            echo "| AMI ID          | \`${AMI_ID}\` |"
            echo "| SSM Path        | \`/k8s/${DEPLOY_ENV}/golden-ami/latest\` |"
            echo "| Build Triggered | \`${BUILD_AMI}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Pipeline summary (runs after all environments, regardless of outcome)
  # ---------------------------------------------------------------------------
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy-development, deploy-staging, deploy-production]
    steps:
      - name: Summarise pipeline results
        env:
          DEV_RESULT: ${{ needs.deploy-development.result }}
          DEV_AMI: ${{ needs.deploy-development.outputs.ami_id }}
          STG_RESULT: ${{ needs.deploy-staging.result }}
          STG_AMI: ${{ needs.deploy-staging.outputs.ami_id }}
          PRD_RESULT: ${{ needs.deploy-production.result }}
          PRD_AMI: ${{ needs.deploy-production.outputs.ami_id }}
        run: |
          {
            echo "## Golden AMI Pipeline — Final Summary"
            echo ""
            echo "| Environment | Result | AMI ID |"
            echo "|-------------|--------|--------|"
            echo "| development | ${DEV_RESULT} | ${DEV_AMI} |"
            echo "| staging     | ${STG_RESULT} | ${STG_AMI} |"
            echo "| production  | ${PRD_RESULT} | ${PRD_AMI} |"
          } >> "$GITHUB_STEP_SUMMARY"
