# @format
# @description Deploy Post-Bootstrap Verify (Standalone)
#
# Standalone pipeline to verify ArgoCD health and cluster smoke tests
# WITHOUT re-triggering SM-A (Bootstrap Orchestrator).
# Secrets are managed declaratively by ESO; apps by ArgoCD reconciliation.
#
# ─── Use This When ─────────────────────────────────────────────────
#   - Verifying ArgoCD health after manual cluster changes
#   - Smoke testing after Helm chart updates
#
# ─── No Bootstrap ──────────────────────────────────────────────────
# SM-A is NOT triggered. Use deploy-ssm-automation.yml for cluster re-bootstrap.

name: Deploy Post-Bootstrap Verify

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - development
        default: development

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-post-bootstrap-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  post-bootstrap:
    name: "Cluster Health Verify"
    uses: ./.github/workflows/_post-bootstrap-config.yml
    with:
      environment: ${{ inputs.environment }}
      cdk-environment: ${{ inputs.environment }}
    secrets: inherit

  deploy-marker:
    name: Loki deploy marker
    needs: [post-bootstrap]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Compute aggregate status
        id: agg
        env:
          STATUSES: ${{ toJSON(needs) }}
        run: |
          if echo "$STATUSES" | jq -e 'to_entries | any(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "status=succeeded" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/loki-deploy-marker
        env:
          LOKI_PUSH_URL:        ${{ secrets.LOKI_PUSH_URL }}
          LOKI_PUSH_BASIC_AUTH: ${{ secrets.LOKI_PUSH_BASIC_AUTH }}
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
          PUSHGATEWAY_BASIC_AUTH: ${{ secrets.PUSHGATEWAY_BASIC_AUTH }}
        with:
          service:     k8s-post-boot
          environment: development
          status:      ${{ steps.agg.outputs.status }}
          git-sha:     ${{ github.sha }}
          notes:       "Post-bootstrap config"
