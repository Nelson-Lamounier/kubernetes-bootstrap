# @format
# ============================================================================
# ci.yml — Continuous Integration
# ============================================================================
#
# Language split:
#   TypeScript — infra CDK constructs, sm-a/ boot steps (control_plane/worker/
#                orchestrator), scripts/cd, sm-a/argocd bootstrap, vitest tests
#   Python     — gitops/cert-manager helper, tests/gitops

name: CI — Kubernetes Bootstrap

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ---------------------------------------------------------------------------
  # TypeScript: type-check (infra CDK constructs)
  # ---------------------------------------------------------------------------
  ts-typecheck:
    name: TypeScript Typecheck (infra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (Yarn v4)
        run: corepack enable

      - name: Cache Infra Dependencies
        uses: actions/cache@v4
        with:
          path: |
            infra/node_modules
            infra/.yarn/cache
          key: infra-deps-${{ runner.os }}-node22-${{ hashFiles('infra/yarn.lock') }}
          restore-keys: infra-deps-${{ runner.os }}-node22-

      # infra is a standalone Yarn project (own .yarnrc.yml + yarn.lock),
      # so it must be installed in-place — root workspace install does not
      # create infra/.yarn/install-state.gz.
      - name: Install dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: Typecheck
        run: yarn typecheck
        working-directory: infra

  # ---------------------------------------------------------------------------
  # TypeScript: ESLint (infra CDK constructs)
  # ---------------------------------------------------------------------------
  ts-lint:
    name: TypeScript Lint (infra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (Yarn v4)
        run: corepack enable

      - name: Cache Infra Dependencies
        uses: actions/cache@v4
        with:
          path: |
            infra/node_modules
            infra/.yarn/cache
          key: infra-deps-${{ runner.os }}-node22-${{ hashFiles('infra/yarn.lock') }}
          restore-keys: infra-deps-${{ runner.os }}-node22-

      # infra is a standalone Yarn project — install in-place (see ts-typecheck).
      - name: Install dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: ESLint
        run: yarn lint
        working-directory: infra

  # ---------------------------------------------------------------------------
  # TypeScript: type-check (ArgoCD bootstrap)
  # ---------------------------------------------------------------------------
  ts-argocd-typecheck:
    name: TypeScript Typecheck (argocd bootstrap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: "22"

      - name: Typecheck argocd bootstrap
        run: yarn workspace k8s-argocd-bootstrap typecheck

  # ---------------------------------------------------------------------------
  # TypeScript: vitest unit tests
  # ---------------------------------------------------------------------------
  ts-test:
    name: TypeScript Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: "22"
          install-infra: "true"

      - name: Run tests
        run: yarn test

  # ---------------------------------------------------------------------------
  # YAML lint (gitops/ infrastructure manifests + sm-a/ ArgoCD bootstrap)
  # ---------------------------------------------------------------------------
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint -c .yamllint.yml gitops/ sm-a/

  # ---------------------------------------------------------------------------
  # Shell script syntax check (gitops/ + sm-a/ — boot/*.sh removed)
  # ---------------------------------------------------------------------------
  shell-lint:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax check shell scripts
        run: |
          SCRIPTS=$(find gitops/ sm-a/ -name "*.sh" -type f)
          if [ -z "$SCRIPTS" ]; then
            echo "No shell scripts found"
            exit 0
          fi
          echo "$SCRIPTS"
          echo "---"
          while IFS= read -r script; do
            bash -n "$script" && echo "  ✓ $script"
          done <<< "$SCRIPTS"
          echo "All shell scripts pass syntax check"

  # ---------------------------------------------------------------------------
  # Prometheus rules — unit-test the observability-pipeline alerts with promtool
  # (renders the Helm rules ConfigMap, then runs promtool test rules).
  # ---------------------------------------------------------------------------
  promtool-rules:
    name: Prometheus Rules (promtool)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install promtool
        run: |
          PROM_VERSION=3.1.0
          curl -sSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin "prometheus-${PROM_VERSION}.linux-amd64/promtool"
          promtool --version

      - name: Render rules + run promtool unit tests
        working-directory: charts/monitoring
        run: bash tests/promtool/run.sh
