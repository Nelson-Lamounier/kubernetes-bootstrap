# @format
# ============================================================================
# ci.yml — Continuous Integration
# ============================================================================
#
# Language split:
#   TypeScript — infra CDK constructs, sm-a/ boot steps (control_plane/worker/
#                orchestrator), scripts/cd, sm-a/argocd bootstrap, vitest tests
#   Python     — system/cert-manager helper, tests/system

name: CI — Kubernetes Bootstrap

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ---------------------------------------------------------------------------
  # TypeScript: type-check (infra CDK constructs)
  # ---------------------------------------------------------------------------
  ts-typecheck:
    name: TypeScript Typecheck (infra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (Yarn v4)
        run: corepack enable

      - name: Cache Infra Dependencies
        uses: actions/cache@v4
        with:
          path: |
            infra/node_modules
            infra/.yarn/cache
          key: infra-deps-${{ runner.os }}-node22-${{ hashFiles('infra/yarn.lock') }}
          restore-keys: infra-deps-${{ runner.os }}-node22-

      - name: Install dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: Typecheck
        run: yarn typecheck
        working-directory: infra

  # ---------------------------------------------------------------------------
  # TypeScript: ESLint (infra CDK constructs)
  # ---------------------------------------------------------------------------
  ts-lint:
    name: TypeScript Lint (infra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (Yarn v4)
        run: corepack enable

      - name: Cache Infra Dependencies
        uses: actions/cache@v4
        with:
          path: |
            infra/node_modules
            infra/.yarn/cache
          key: infra-deps-${{ runner.os }}-node22-${{ hashFiles('infra/yarn.lock') }}
          restore-keys: infra-deps-${{ runner.os }}-node22-

      - name: Install dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: ESLint
        run: yarn lint
        working-directory: infra

  # ---------------------------------------------------------------------------
  # TypeScript: type-check (ArgoCD bootstrap)
  # ---------------------------------------------------------------------------
  ts-argocd-typecheck:
    name: TypeScript Typecheck (argocd bootstrap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: "22"

      - name: Typecheck argocd bootstrap
        run: yarn workspace k8s-argocd-bootstrap typecheck

  # ---------------------------------------------------------------------------
  # TypeScript: vitest unit tests
  # ---------------------------------------------------------------------------
  ts-test:
    name: TypeScript Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: "22"
          install-infra: "true"

      - name: Run tests
        run: yarn test

  # ---------------------------------------------------------------------------
  # Helm template validation (charts merged from kubernetes-platform)
  # ---------------------------------------------------------------------------
  helm-validate:
    name: Helm Template Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.0"

      - name: Validate monitoring chart (development)
        run: |
          helm template monitoring system/charts/monitoring/chart/ \
            -f system/charts/monitoring/chart/values.yaml \
            -f system/charts/monitoring/chart/values-development.yaml \
            --debug > /dev/null

      - name: Validate crossplane-xrds chart
        run: |
          helm template crossplane-xrds system/charts/crossplane-xrds/chart/ \
            --debug > /dev/null

  # ---------------------------------------------------------------------------
  # Python lint (deploy_helpers)
  # ---------------------------------------------------------------------------
  python-lint:
    name: Python Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint deploy_helpers
        run: ruff check sm-b/deploy_helpers/

  # ---------------------------------------------------------------------------
  # Grafana dashboard JSON validation
  # ---------------------------------------------------------------------------
  dashboard-validation:
    name: Grafana Dashboard Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tsx
        run: npm install -g tsx

      - name: Validate dashboard JSON files
        run: npx tsx --test system/charts/monitoring/tests/validate-dashboards.test.ts

  # ---------------------------------------------------------------------------
  # YAML lint (ArgoCD application manifests in system/)
  # ---------------------------------------------------------------------------
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint -c .yamllint.yml system/

  # ---------------------------------------------------------------------------
  # Shell script syntax check (system/ only — boot/*.sh removed)
  # ---------------------------------------------------------------------------
  shell-lint:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check shell scripts
        run: |
          SCRIPTS=$(find system/ -name "*.sh" -type f)
          if [ -z "$SCRIPTS" ]; then
            echo "No shell scripts found"
            exit 0
          fi
          echo "$SCRIPTS"
          echo "---"
          while IFS= read -r script; do
            bash -n "$script" && echo "  ✓ $script"
          done <<< "$SCRIPTS"
          echo "All shell scripts pass syntax check"
