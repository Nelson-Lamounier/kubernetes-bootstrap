name: CI — Kubernetes Bootstrap

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  python-lint:
    name: Python Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check boot/ deploy_helpers/ system/ tests/

      - name: Ruff format check
        run: ruff format --check boot/ deploy_helpers/ system/

  pytest:
    name: Pytest Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint -c .yamllint.yml system/

  shell-lint:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find and lint shell scripts
        run: |
          find boot/ system/ -name "*.sh" -type f | head -20
          echo "---"
          find boot/ system/ -name "*.sh" -type f -exec bash -n {} \; && echo "✅ All shell scripts pass syntax check"
