# @format
# @description Deploy SSM Bootstrap to Development
#
# Dedicated pipeline for K8s bootstrap trigger (scripts sync + Step Functions).
# The SSM Automation CDK stack is deployed by deploy-cdk.yml.
#
# Triggers:
#   - Push to develop when bootstrap scripts change
#   - Manual dispatch (workflow_dispatch)
#
# ─── Two Modes ─────────────────────────────────────────────────────
#
#   PUSH (automatic): Full bootstrap — S3 sync + Step Functions trigger.
#     Script changes go to S3 and SM-A immediately re-bootstraps nodes
#     so the cluster always runs the committed version of the scripts.
#     SM-B fires automatically via EventBridge when SM-A succeeds.
#
#   DISPATCH (manual): Honour trigger_bootstrap toggle (default true).
#     Uncheck trigger_bootstrap to do an S3-sync-only dispatch.
#     To inject config only (no bootstrap), use deploy-post-bootstrap.yml.

name: Deploy SSM Bootstrap to Development

on:
  push:
    branches: [develop]
    paths:
      - 'sm-a/boot/**'
      - 'system/**'
      - 'scripts/cd/**'
  workflow_dispatch:
    inputs:
      trigger_bootstrap:
        description: "Trigger SM-A Step Functions bootstrap on nodes (full re-bootstrap)"
        type: boolean
        default: true

permissions:
  id-token: write      # OIDC for aws-actions/configure-aws-credentials
  contents: read       # actions/checkout

concurrency:
  group: deploy-ssm-bootstrap-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Bootstrap Development
    uses: ./.github/workflows/_deploy-ssm-automation.yml
    with:
      environment: development
      cdk-environment: development
      # Push events: always trigger bootstrap so nodes run the committed scripts.
      # Dispatch: honour the explicit toggle (default true — uncheck for S3-sync-only).
      trigger-bootstrap: ${{ github.event_name == 'push' || github.event.inputs.trigger_bootstrap == 'true' }}
    secrets: inherit
