# @format
name: "Setup Node.js and Install Dependencies"
description: >
  Installs Node.js, yarn dependencies for scripts/, and optionally yarn
  dependencies for infra/. Use install-infra: 'true' when the job needs to
  import from infra/lib/ (e.g. test-ami-build.ts imports aws-cdk-lib via
  configurations.ts).

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "22"
  install-infra:
    description: "Also install infra/ workspace deps (needed when tsx imports from infra/lib/)"
    required: false
    default: "false"

outputs:
  cache-hit:
    description: "Whether script dependency cache was hit"
    value: ${{ steps.cache-deps.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Cache Script Dependencies
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: scripts/node_modules
        key: scripts-deps-${{ runner.os }}-node${{ inputs.node-version }}-${{ hashFiles('scripts/package.json') }}
        restore-keys: |
          scripts-deps-${{ runner.os }}-node${{ inputs.node-version }}-

    - name: Install Script Dependencies
      shell: bash
      working-directory: scripts
      run: |
        yarn install
        echo "✓ scripts/ deps ready"

    - name: Install Infra Dependencies
      # No --immutable: runs in analysis/test jobs where the lockfile may lag
      # behind package.json. Deploy jobs manage infra deps themselves with
      # --immutable to enforce reproducibility.
      if: inputs.install-infra == 'true'
      shell: bash
      working-directory: infra
      run: |
        yarn install
        echo "✓ infra/ deps ready"

    - name: Verify Installation
      shell: bash
      run: |
        echo "node:  $(node --version)"
        echo "yarn:  $(yarn --version)"
        echo "tsx:   $(npx --prefix scripts tsx --version 2>/dev/null || echo 'not found')"
