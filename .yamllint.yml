---
extends: default

# Helm chart templates use {{ }} Gotemplate syntax which is not valid YAML.
# Lint values files and manifests; skip templates/.
ignore: |
  system/charts/*/chart/templates/
  system/charts/*/chart/templates/**/*

rules:
  line-length:
    max: 200
    level: warning
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
  comments:
    min-spaces-from-content: 1
  document-start: disable
  indentation:
    spaces: 2
    indent-sequences: whatever
