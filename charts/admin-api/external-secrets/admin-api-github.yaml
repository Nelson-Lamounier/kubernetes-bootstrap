# @format
# ExternalSecret: admin-api-github
#
# Optional GitHub App credentials for admin-api. Routes return HTTP 503
# until both keys are present — pod boots without them.
#
# Source: AWS Secrets Manager secret k8s/development/tucaken-github-app
#         SSM parameter /k8s/development/tucaken-webhook-secret
# Keys consumed:
#   github_app_id          — GitHub App numeric ID (3440764)
#   github_app_private_key — RSA PEM private key
#   github_webhook_secret  — HMAC secret for verifying webhook payloads
#
# ESO refreshes every hour; Stakater Reloader rolls admin-api automatically
# when the Secret content changes.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: admin-api-github
  namespace: admin-api
  annotations:
    kubernetes.io/description: "admin-api optional GitHub App credentials — Secrets Manager + SSM"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: admin-api-github
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: GITHUB_APP_ID
      remoteRef:
        key: k8s/development/tucaken-github-app
        property: github_app_id
    - secretKey: GITHUB_PRIVATE_KEY
      remoteRef:
        key: k8s/development/tucaken-github-app
        property: github_app_private_key
    - secretKey: GITHUB_WEBHOOK_SECRET
      sourceRef:
        storeRef:
          name: aws-ssm
          kind: ClusterSecretStore
      remoteRef:
        key: /k8s/development/tucaken-webhook-secret
