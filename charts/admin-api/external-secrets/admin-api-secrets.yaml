# @format
# ExternalSecret: admin-api-secrets
#
# Hard-required runtime config for admin-api. Every key MUST exist in SSM
# for the pod to boot — cdk-monitoring/api/admin-api/src/lib/config.ts
# fails fast at startup if any of these is missing.
#
# Static literals NOT in this Secret (injected via chart `env:` instead):
#   DYNAMODB_GSI1_NAME, DYNAMODB_GSI2_NAME, AWS_DEFAULT_REGION
#
# Optional Bedrock pipeline values (assets bucket + 4 Lambda ARNs +
# strategist table) are split into admin-api-bedrock so a partially-
# deployed Bedrock stack doesn't block the entire Secret. Once those SSM
# keys land, ESO refreshes admin-api-bedrock and Reloader rolls the pod —
# no manual sync required.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: admin-api-secrets
  namespace: admin-api
  annotations:
    kubernetes.io/description: "admin-api required runtime config — Cognito + DDB content table"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: admin-api-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    # Cognito user pool — admin-api reuses the nextjs Cognito pool, so
    # the SSM keys are owned by the nextjs project namespace.
    - secretKey: COGNITO_USER_POOL_ID
      remoteRef:
        key: /nextjs/development/auth/cognito-user-pool-id
    - secretKey: COGNITO_CLIENT_ID
      remoteRef:
        key: /nextjs/development/auth/cognito-client-id
    - secretKey: COGNITO_ISSUER_URL
      remoteRef:
        key: /nextjs/development/auth/cognito-issuer-url
    # The DynamoDB content table name — published by ai-applications
    # ai-content-stack at /bedrock-dev/content-table-name.
    - secretKey: DYNAMODB_TABLE_NAME
      remoteRef:
        key: /bedrock-dev/content-table-name
