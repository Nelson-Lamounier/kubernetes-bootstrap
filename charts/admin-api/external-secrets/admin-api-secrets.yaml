# @format
# ExternalSecret: admin-api-secrets
#
# Replaces both admin-api-secrets Secret AND admin-api-config ConfigMap
# previously created by SM-B deploy.py. Both are merged into one ESO Secret.
#
# Static literals injected as Deployment env entries (not here):
#   DYNAMODB_GSI1_NAME = "gsi1-status-date"
#   DYNAMODB_GSI2_NAME = "gsi2-tag-date"
#   AWS_DEFAULT_REGION = "eu-west-1"
#
# Referenced by: cdk-monitoring/charts/admin-api/chart/templates/deployment.yaml
#   envFrom.secretRef: name: admin-api-secrets

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: admin-api-secrets
  namespace: admin-api
  annotations:
    kubernetes.io/description: "admin-api runtime secrets + config from SSM — replaces SM-B Secret+ConfigMap"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: admin-api-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: COGNITO_USER_POOL_ID
      remoteRef:
        key: /nextjs/development/auth/cognito-user-pool-id
    - secretKey: COGNITO_CLIENT_ID
      remoteRef:
        key: /nextjs/development/auth/cognito-client-id
    - secretKey: COGNITO_ISSUER_URL
      remoteRef:
        key: /nextjs/development/auth/cognito-issuer-url
    - secretKey: DYNAMODB_TABLE_NAME
      remoteRef:
        key: /bedrock-dev/content-table-name
    - secretKey: ASSETS_BUCKET_NAME
      remoteRef:
        key: /bedrock-dev/assets-bucket-name
    - secretKey: PUBLISH_LAMBDA_ARN
      remoteRef:
        key: /bedrock-dev/pipeline-publish-function-arn
    - secretKey: ARTICLE_TRIGGER_ARN
      remoteRef:
        key: /bedrock-dev/pipeline-trigger-function-arn
    - secretKey: VERSION_HISTORY_LAMBDA_ARN
      remoteRef:
        key: /bedrock-dev/pipeline-version-history-function-arn
    - secretKey: STRATEGIST_TRIGGER_ARN
      remoteRef:
        key: /bedrock-dev/strategist-trigger-function-arn
    - secretKey: STRATEGIST_TABLE_NAME
      remoteRef:
        key: /bedrock-dev/strategist-table-name
