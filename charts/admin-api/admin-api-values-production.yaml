# @format
# admin-api — Production environment overrides.
# NOT IN USE YET. Wire up via a separate ArgoCD Application targeting the
# prod cluster (see argocd-apps/admin-api-production.yaml when created).

image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/admin-api
  # tag managed by ArgoCD Image Updater

replicas: 2                # min for HA — pdb.minAvailable=1 enforces during drain

resources:
  requests:
    cpu:    100m            # observed dev p50 × 5 — adjust after 1 week prod
    memory: 256Mi
  limits:
    cpu:    1000m
    memory: 1Gi

networkPolicy:
  enabled: true             # default-deny + selective allow in prod

observability:
  env:      production
  logLevel: info            # info in prod — debug is too noisy

# Spread replicas across nodes to survive single-node failure.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway   # don't hard-block on small clusters
    labelSelector:
      matchLabels:
        app: admin-api
