# @format
# admin-api — Development environment overrides
#
# Applied by ArgoCD on top of chart/values.yaml.
# This file is committed to Git (no sensitive values).
#
# All AWS credentials come from the EC2 Instance Profile (IMDS).
# Secrets (Cognito) and Config (DynamoDB, S3, Lambda) are managed by deploy.py.

image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/admin-api
  # tag: intentionally omitted — ArgoCD Image Updater writes the tag to
  #       chart/.argocd-source-admin-api.yaml on every successful CI push.
  #       An empty string here produces "<repo>:" which Kubernetes rejects
  #       with InvalidImageName before even attempting an ECR pull.

# HA: 2 replicas so a node drain / blueGreen scale-down keeps one serving
# (pdb.maxUnavailable=1 enforces during disruption). The admin-api is stateless
# — every request re-derives state from Postgres, and dispatched K8s Jobs are
# decoupled from the pod — so N replicas need no Redis/affinity coordination.
replicas: 2

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi

networkPolicy:
  enabled: false

# Spread the 2 replicas across nodes so a single-node failure can't take both.
# ScheduleAnyway (not DoNotSchedule) avoids scheduling stalls on a small cluster.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      # Must match the pod template labels (admin-api.selectorLabels) — the chart
      # emits app.kubernetes.io/name, NOT a bare `app` label.
      matchLabels:
        app.kubernetes.io/name: admin-api

# ── Observability — pin to development ────────────────────────────────────────
# Stamps the env label on every metric/log/span this pod emits. K8s Jobs the
# admin-api dispatches inherit DEPLOY_ENV via the centralised observabilityEnv()
# helper in src/lib/k8s-job-builder.ts, so this single line covers everything
# downstream. Do NOT default to env=development in chart/values.yaml — keep
# the env decision in this overrides file.
observability:
  env:      development
  logLevel: debug          # debug in dev — chatty, useful; flip to info in prod

# ── Filter-then-rank retrieval (Increment 2) ─────────────────────────────────
# Enable the strategist's structured pre-filter in development. admin-api forwards
# this as RETRIEVAL_PREFILTER into every strategist K8s Job. Chart default is "off";
# kept on here so dev exercises file-grained tech gating before production promotion.
retrievalPrefilter: "on"

# ── A/B free-tier harness ────────────────────────────────────────────────────
# Emails allowed to choose the free-tier resume pipeline (MODE=free) from the
# Resume Builder. Comma-separated; surfaced as me.abFreeTier and enforced on
# dispatch. Empty ⇒ gate closed. See tucaken-app admin-api isFreeTierAllowed.
abFreeTierEmails: "lamounier_88@hotmail.com"
