# @format
# admin-api — Helm chart default values.
#
# BFF for the tucaken-app TanStack application.
# Handles write operations: article publish, update, delete, asset upload.
#
# ─── Config Sources ───────────────────────────────────────────────────────────
# admin-api consumes config from three K8s resources, all managed declaratively
# (no deploy.py — that pattern was decommissioned post-Phase-2):
#
#   admin-api-secrets        (Opaque Secret, ESO-synced from SSM)
#                            → Cognito auth + non-sensitive infrastructure refs
#   platform-rds-credentials (Opaque Secret, ESO-synced from Secrets Manager)
#                            → PG_HOST, PG_PORT, PG_DATABASE, PG_USER, PG_PASSWORD
#   admin-api-job-images     (Opaque Secret, ESO-synced from SSM, mounted as files)
#                            → /etc/admin-api/images/{ingestion,article-pipeline,
#                              job-strategist} — full <repo>:<tag> URIs that
#                              admin-api reads on each Job creation. Decoupled
#                              from the Blue/Green Rollout: image updates do
#                              NOT trigger admin-api restart.
#
# AWS SDK credentials for admin-api come from the EC2 Instance Profile (IMDS).
# Pipeline Job pods (ingestion, article-pipeline, job-strategist) use Pod Identity — see each SA manifest.
# ─────────────────────────────────────────────────────────────────────────────

namespace: admin-api

# ── admin-api container image ─────────────────────────────────────────────────
# repository + tag tracked by ArgoCD Image Updater on the admin-api ArgoCD app
# (image-list: admin-api=...). On each ECR push the Updater writes the new tag
# into .argocd-source-admin-api.yaml; ArgoCD re-renders → new ReplicaSet enters
# Blue/Green pre-promotion analysis (see rollout.* below).
image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/admin-api
  tag: "latest"
  pullPolicy: IfNotPresent

# ── K8s Job image URIs (file-mounted, decoupled from admin-api Rollout) ───────
# The Job-image bytes themselves come from the admin-api-job-images ESO Secret
# (see external-secrets/admin-api-job-images.yaml). This values block only
# carries the namespace + ServiceAccount each Job runs as — those are static
# (the namespace charts in kubernetes-bootstrap declare them) and must match
# the actual K8s objects.
#
# `mountPath` is the directory where each ESO secretKey becomes a file:
#   /etc/admin-api/images/ingestion          — ESO secretKey 'ingestion'
#   /etc/admin-api/images/article-pipeline   — ESO secretKey 'article-pipeline'
#   /etc/admin-api/images/job-strategist     — ESO secretKey 'job-strategist'
jobImages:
  mountPath: /etc/admin-api/images
  ingestion:
    namespace: ingestion
    serviceAccount: ingestion-sa
  articlePipeline:
    namespace: article-pipeline
    serviceAccount: article-pipeline-sa
  strategistPipeline:
    namespace: job-strategist
    serviceAccount: job-strategist-sa

replicas: 1

# Port 3002 — admin-api (public-api uses 3001)
port: 3002

# CIDRs of the subnets that host the internet-facing ALB ENIs. The ALB
# Ingress uses target-type: ip, so traffic reaches the pod directly from
# these ranges. Once VPC CNI network-policy enforcement is enabled, the
# admin-api NetworkPolicy must allow this source or the ALB data/health
# path to :{{ .Values.port }} is dropped and the site goes down. These are
# the cluster's two public subnets (pods share them, so this also admits
# in-subnet pods on the port — acceptable for an internet-facing service
# whose real boundary is the ALB + WAF). Empty list disables the rule.
albSourceCidrs:
  - 10.0.0.0/24
  - 10.0.1.0/24

# ── Node scheduling ───────────────────────────────────────────────────────────
nodeSelector: {}

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 10m      # Observed p50: ~2m. 10m provides safe headroom for burst/startup.
    memory: 64Mi  # Observed p50: ~20Mi. 64Mi covers peak — kept at limit minimum.
  limits:
    cpu: 300m
    memory: 256Mi

# ── Security Context ──────────────────────────────────────────────────────────
# Run as non-root uid 1001 (adminapi user created in Dockerfile).
# readOnlyRootFilesystem prevents runtime writes outside /tmp.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
      - ALL

# ── ESO-managed Secrets ──────────────────────────────────────────────────────
# admin-api-secrets    — required  (Cognito + DDB content table)
# admin-api-bedrock    — optional  (assets bucket + Bedrock pipeline ARNs +
#                                   strategist table; populated as the
#                                   matching ai-applications/infra Bedrock
#                                   CDK stacks deploy)
# admin-api-job-images — optional  (file-mount of K8s Job image URIs)
# platform-rds-credentials — required (PG_HOST/PORT/DATABASE/USER/PASSWORD)
secrets:
  name: admin-api-secrets

# ── Static config literals (not in SSM — don't churn) ────────────────────────
dynamodb:
  # The application reads `gsi1pk` and `gsi2pk` attributes; these are the
  # DynamoDB GSI names that hold those keys (status+date and tag+date).
  gsi1Name: "gsi1-status-date"
  gsi2Name: "gsi2-tag-date"

awsRegion: "eu-west-1"

# Bedrock cross-region inference profile ID used for chunk enrichment (skill/tech extraction).
# In eu-west-1 direct on-demand Claude invocation is unsupported; must use an eu.* profile.
# Passed as ENRICHMENT_MODEL_ID into every ingestion Job the admin-api creates.
enrichmentModelId: "eu.anthropic.claude-haiku-4-5-20251001-v1:0"

# Bedrock cross-region inference profile ID forwarded to job-strategist K8s Jobs as RESEARCH_MODEL.
# Kept separate from enrichmentModelId so the two pipelines can diverge to different models independently.
researchModelId: "eu.anthropic.claude-haiku-4-5-20251001-v1:0"

# Filter-then-rank retrieval gate (Increment 2), forwarded by admin-api into every
# strategist K8s Job as RETRIEVAL_PREFILTER. Default "off" ⇒ pure-vector retrieval
# (fail-open). Enable per-environment in the overlay (admin-api-values*.yaml); keep
# the chart default off so production stays on the safe path until promoted.
retrievalPrefilter: "off"

# Bedrock cross-region inference profile ID forwarded to article-pipeline K8s Jobs as FOUNDATION_MODEL
# (writer agent) and QA_MODEL (QA agent). Claude Sonnet 4.x uses the date-free profile format.
foundationModelId: "eu.anthropic.claude-sonnet-4-6"

# ── ServiceAccount ────────────────────────────────────────────────────────────
# Named SA so the cross-namespace RoleBinding in the ingestion namespace
# (admin-api-job-creator) can grant Job CRUD + pod log read.
serviceAccount:
  name: admin-api

# ── Health probes ─────────────────────────────────────────────────────────────
# Split probes after the observability rollout:
#   /livez  — process alive (no DB touch — transient PG outage must NOT
#             trigger a restart storm).
#   /readyz — DB reachable. Failing pulls the pod from the Service
#             endpoint until it recovers, no restart.
probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /livez
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

# ── Observability — OTel + pino + prom-client ────────────────────────────────
# otlpEndpoint points at the Alloy DaemonSet's OTLP/HTTP receiver. Alloy fans
# traces to Tempo (and span metrics to Mimir if enabled). The Service is
# annotated for prometheus.io/scrape on `/metrics`.
observability:
  serviceName:    admin-api
  env:            development
  logLevel:       info
  otlpEndpoint:   http://alloy.monitoring.svc.cluster.local:4318
  # Continuous profiling. Set to "" (empty string) to disable the SDK at
  # runtime — useful when iterating locally with `helm upgrade --set`.
  pyroscopeServer: http://pyroscope.monitoring.svc.cluster.local:4040

# ── WAF Annotator (PostSync Job) ──────────────────────────────────────────────
# Reads the WAF ACL ARN from SSM and annotates the Ingress at sync time.
# Mirrors the tucaken-app pattern — ARN never hardcoded in git.
# Job only renders when wafAnnotator.roleArn is non-empty.
wafAnnotator:
  ssmPath: "/k8s/development/eks/waf-acl-arn"
  roleArn: ""  # set in admin-api-values-eks.yaml

# ── Ingress ───────────────────────────────────────────────────────────────────
# Disabled by default; the EKS overlay (admin-api-values-eks.yaml) flips
# `enabled: true` and supplies the host. Renders an `Ingress` resource the
# AWS Load Balancer Controller folds into the shared `public` ALB via
# IngressGroup. ACM cert is auto-discovered in the ALB's region by Host SAN
# match (Plan 5b § 0.2) — no certificate-arn annotation needed.
ingress:
  enabled: false
  host: ""
  groupName: public
  groupOrder: 100
  healthcheckPath: /readyz
  # WAFv2 WebACL ARN attached to the shared ALB. Set on exactly ONE
  # Ingress in the IngressGroup (admin-api by convention since it
  # carries the most security-sensitive paths). The ALB controller
  # treats this as an ALB-level setting; conflicting values across
  # Ingresses in the same group cause the controller to error.
  wafAclArn: ""

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 3002

# ── HorizontalPodAutoscaler ───────────────────────────────────────────────────
# Disabled by default; the EKS overlay (admin-api-values-eks.yaml) enables it.
hpa:
  enabled: false
  # Floor of 2: with a single replica, one unhealthy pod is a total outage —
  # on 2026-07-05 a wedged pod (pg pool exhausted, readyz 503, livez 200) was
  # the only replica and took the whole admin API down for an hour.
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilization: 70

# ── PodDisruptionBudget ───────────────────────────────────────────────────────
# With the HPA floor of 2, maxUnavailable: 1 keeps at least one replica
# serving through CA scale-down or node drain events.
pdb:
  enabled: true
  maxUnavailable: 1

# ── Topology Spread Constraints ───────────────────────────────────────────────
# Empty by default (replicas: 1 — no spread needed).
# Set when scaling to replicas > 1 to enforce maxSkew: 1 across nodes.
topologySpreadConstraints: []

# ── Argo Rollouts — Blue/Green Strategy ───────────────────────────────────────
# Mirrors the nextjs configuration. Pre-promotion analysis runs Prometheus
# queries against the preview ReplicaSet's Traefik metrics; if either error
# rate or P95 latency breach the threshold the rollout pauses and does NOT
# auto-promote. Manual promotion uses:
#   kubectl argo rollouts promote admin-api -n admin-api
rollout:
  blueGreen:
    autoPromotionEnabled: false   # require explicit promote step
    autoPromotionSeconds: 0
    scaleDownDelaySeconds: 30
  analysis:
    interval: 60s
    count: 3
    failureLimit: 1
    consecutiveErrorLimit: 5
    errorRateThreshold: 0.05      # < 5% 5xx
    latencyThresholdMs: 1500      # admin-api routes are pure PG / K8s-API calls
                                  # — tighter than nextjs (which renders pages)

# ── Account-deletion sweep (CronJob) ──────────────────────────────────────────
# Daily hard-delete pass for users whose 30-day soft-delete grace has
# expired. See charts/admin-api/chart/templates/account-sweep-cronjob.yaml
# and admin-api/src/scripts/account-sweep.ts in the tucaken-app repo.
#
# Enabled 2026-05-20 after cdk-monitoring EksPodIdentity-development
# deployed cognito-idp:Admin{Disable,Enable,Delete}User on the admin-api IRSA.
# Verify CronJob health: kubectl -n admin-api get cronjob account-sweep
accountSweep:
  enabled:    true
  # 03:00 UTC every day — quietest period for the cluster.
  schedule:   "0 3 * * *"
  graceDays:  30

# ---------------------------------------------------------------------------
# GitHub installation reconciliation sweep
# ---------------------------------------------------------------------------
# Backstop for orphaned GitHub App installations (live on GitHub, no active
# owner in RDS). Source: admin-api/src/scripts/reconcile-github-installations.ts.
# Destructive action is opt-in: `apply: false` runs dry (logs orphans only).
# Flip `apply: true` only after reviewing a dry-run's logged orphan list.
# Uses the same admin-api-secrets (GITHUB_APP_ID / GITHUB_PRIVATE_KEY) + RDS
# credentials as the API rollout. Verify: kubectl -n admin-api get cronjob
# reconcile-github-installations
reconcileGithubInstallations:
  enabled:    true
  # 03:30 UTC daily — after account-sweep (which revokes on hard-delete).
  schedule:   "30 3 * * *"
  # Dry-run by default. Set true to actually uninstall orphans.
  apply:      false
  # Skip installations younger than this (races the connect flow).
  graceHours: 1

# ---------------------------------------------------------------------------
# Deferred-enrichment backlog sweep
# ---------------------------------------------------------------------------
# RETIRED (2026-07-06): LLM chunk enrichment is disabled for every tier —
# the golden-set A/B (rag_eval_runs cff9c15b vs 5515e590, recall@8 identical)
# and a real-JD replay (run f133155f, 5/5 queries byte-identical top-15)
# showed no retrieval benefit for ~99% of ingestion LLM spend. The sweep is
# therefore suspended: admin-api's enrichmentEnv() kill switch already makes
# every dispatched Job exit before any Bedrock call, so this flag is the
# belt-and-braces layer that stops the no-op dispatches too. Re-enable only
# alongside reverting enrichmentEnv() (tucaken-app admin-api/src/lib/
# entitlements.ts) — e.g. for a contextual-embedding trial.
# Original purpose: daily drain of chunks left enrichment_status IN
# ('pending','skipped_quota') by a deferred/deadline-stopped ingestion pass,
# one run-reenrich Job per premium/admin user with a backlog. Source:
# admin-api/src/scripts/reenrich-sweep.ts.
reenrichSweep:
  enabled:          false
  # 04:30 UTC daily — after the 03:00/03:30 sweeps, still in the quiet window.
  schedule:         "30 4 * * *"
  # Cap dispatched Jobs per run (Bedrock stampede guard).
  maxSweepJobs:     10
  # Backlogs smaller than this wait for the repo's next ordinary sync.
  minPendingChunks: 25

# ---------------------------------------------------------------------------
# Redis read cache (BFF hot-key cache; see kubernetes-bootstrap/CONTEXT.md)
# HOST/PORT/TLS are stable cluster coordinates → static env literals.
# REDIS_CACHE_PASSWORD is synced by external-secrets/admin-api-redis-cache.yaml
# and consumed via envFrom (optional). Host unset ⇒ cache disabled (fail-open).
# ---------------------------------------------------------------------------
redisCache:
  host: redis-cache-master.redis-cache.svc.cluster.local
  port: 6379
  tls: false
  defaultTtlSeconds: 3600
