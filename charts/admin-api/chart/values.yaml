# @format
# admin-api — Helm chart default values.
#
# BFF for the start-admin TanStack application.
# Handles write operations: article publish, update, delete, asset upload.
#
# ─── Zero-Secret Design ───────────────────────────────────────────────────────
# This service uses ONLY TWO Kubernetes resources for env injection:
#
#   admin-api-secrets   (K8s Opaque Secret)  — Cognito auth creds ONLY
#   admin-api-config    (K8s ConfigMap)       — DynamoDB, S3, Lambda refs
#
# Both are managed exclusively by deploy.py.
# AWS SDK credentials come from EC2 Instance Profile (IMDS) — NOT from K8s.
#
# ─── Route Ownership ──────────────────────────────────────────────────────────
# The Traefik IngressRoute is owned by deploy.py (Step 5), NOT ArgoCD.
# ingress.enabled is therefore false — this chart never creates an IngressRoute.
# ─────────────────────────────────────────────────────────────────────────────

namespace: admin-api

image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/admin-api
  tag: "latest" # Overridden by ArgoCD Image Updater write-back
  pullPolicy: IfNotPresent

replicas: 1

# Port 3002 — admin-api (public-api uses 3001)
port: 3002

# ── Node scheduling ───────────────────────────────────────────────────────────
nodeSelector:
  node-pool: general

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 10m      # Observed p50: ~2m. 10m provides safe headroom for burst/startup.
    memory: 64Mi  # Observed p50: ~20Mi. 64Mi covers peak — kept at limit minimum.
  limits:
    cpu: 300m
    memory: 256Mi

# ── Security Context ──────────────────────────────────────────────────────────
# Run as non-root uid 1001 (adminapi user created in Dockerfile).
# readOnlyRootFilesystem prevents runtime writes outside /tmp.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
      - ALL

# ── K8s resources (deploy.py as sole owner) ───────────────────────────────────
secrets:
  # Name of the K8s Secret managed by deploy.py.
  # Contains: COGNITO_USER_POOL_ID, COGNITO_CLIENT_ID, COGNITO_ISSUER_URL
  name: admin-api-secrets

# ── Health probes ─────────────────────────────────────────────────────────────
probes:
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

# ── Ingress (disabled — owned by deploy.py) ───────────────────────────────────
ingress:
  enabled: false

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 3002

# ── PodDisruptionBudget ───────────────────────────────────────────────────────
# Prevents the sole admin-api replica from being evicted simultaneously
# during CA scale-down or node drain events.
pdb:
  enabled: true
  minAvailable: 1

# ── Topology Spread Constraints ───────────────────────────────────────────────
# Empty by default (replicas: 1 — no spread needed).
# Set when scaling to replicas > 1 to enforce maxSkew: 1 across nodes.
topologySpreadConstraints: []
