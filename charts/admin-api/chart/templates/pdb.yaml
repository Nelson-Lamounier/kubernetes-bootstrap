{{- if .Values.pdb.enabled }}
# ---------------------------------------------------------------
# PodDisruptionBudget — protects admin-api availability during
# voluntary disruptions (CA scale-down, spot reclamation, drain).
#
# maxUnavailable: 1 allows Karpenter to evict the pod for bin-packing
# while ensuring at most 1 disruption at a time.
# ---------------------------------------------------------------
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "admin-api.fullLabels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "admin-api.selectorLabels" . | nindent 6 }}
{{- end }}
