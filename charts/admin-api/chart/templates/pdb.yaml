{{- if .Values.pdb.enabled }}
# ---------------------------------------------------------------
# PodDisruptionBudget — protects admin-api availability during
# voluntary disruptions (CA scale-down, spot reclamation, drain).
#
# maxUnavailable: 1 — allows Karpenter to evict one pod at a time for
# bin-packing. For replicas: 1, this permits brief eviction+reschedule;
# for replicas > 1, it guarantees at least one pod remains available.
# ---------------------------------------------------------------
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "admin-api.fullLabels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "admin-api.selectorLabels" . | nindent 6 }}
{{- end }}
