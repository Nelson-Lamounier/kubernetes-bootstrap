# ── admin-api Deployment ──────────────────────────────────────────────────────
#
# BFF for the start-admin TanStack application.
#
# Environment injection:
#   secretRef:    admin-api-secrets   — Cognito auth creds (K8s Opaque Secret)
#   configMapRef: admin-api-config    — DynamoDB, S3, Lambda refs (plain ConfigMap)
#
# AWS credentials: NOT injected — resolved via EC2 Instance Profile (IMDS).
#
# IngressRoute: NOT defined here — owned by deploy.py (Step 5).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "admin-api.fullLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "admin-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "admin-api.fullLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: admin-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.port }}
              name: http
              protocol: TCP
          env:
            # K8s Job image URIs — written by ArgoCD Image Updater on each
            # ECR push. Image Updater watches the 3 ECR repos declared in
            # argocd-apps/admin-api.yaml `image-list` and writes the new
            # tags to .argocd-source-admin-api.yaml; ArgoCD then re-renders
            # this template so the env values pick up the new tags.
            - name: INGESTION_IMAGE
              value: "{{ .Values.ingestionImage.repository }}:{{ .Values.ingestionImage.tag }}"
            - name: ARTICLE_PIPELINE_IMAGE
              value: "{{ .Values.articlePipelineImage.repository }}:{{ .Values.articlePipelineImage.tag }}"
            - name: STRATEGIST_PIPELINE_IMAGE
              value: "{{ .Values.strategistPipelineImage.repository }}:{{ .Values.strategistPipelineImage.tag }}"
            # Static K8s wiring for Job creation by admin-api routes.
            - name: INGESTION_NAMESPACE
              value: {{ .Values.ingestionImage.namespace | quote }}
            - name: INGESTION_SERVICE_ACCOUNT
              value: {{ .Values.ingestionImage.serviceAccount | quote }}
            - name: ARTICLE_PIPELINE_NAMESPACE
              value: {{ .Values.articlePipelineImage.namespace | quote }}
            - name: ARTICLE_PIPELINE_SERVICE_ACCOUNT
              value: {{ .Values.articlePipelineImage.serviceAccount | quote }}
            - name: STRATEGIST_PIPELINE_NAMESPACE
              value: {{ .Values.strategistPipelineImage.namespace | quote }}
            - name: STRATEGIST_PIPELINE_SERVICE_ACCOUNT
              value: {{ .Values.strategistPipelineImage.serviceAccount | quote }}
          envFrom:
            # admin-api runtime config — ESO syncs SSM (Cognito + RDS PG creds
            # via separate ExternalSecrets) into a single K8s Opaque Secret.
            - secretRef:
                name: {{ .Values.secrets.name }}
            # platform-rds-credentials — PG_HOST/PORT/DATABASE/USER/PASSWORD
            # synced from Secrets Manager via ESO. Same pattern other
            # PG-consuming pods use across the cluster.
            - secretRef:
                name: platform-rds-credentials
                optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
      volumes:
        - name: tmp
          emptyDir: {}
---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: admin-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "admin-api.fullLabels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "admin-api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
