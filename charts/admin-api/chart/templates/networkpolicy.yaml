# ── admin-api NetworkPolicy ───────────────────────────────────────────────────
#
# Default-deny with targeted allow rules:
#   Ingress: Only Traefik (from kube-system) on port 3002
#   Egress:  DynamoDB/S3/Lambda (AWS APIs) + Cognito JWKS endpoint + DNS
#
# AWS API calls go via the VPC endpoint or NAT gateway — no special rule
# needed beyond allowing all egress (both are reachable from the pod network).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-api-network-policy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "admin-api.fullLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "admin-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow the internet-facing ALB (Ingress class alb, target-type: ip) to
    # reach pods directly. ALB ENIs live in the public subnets; with the VPC
    # CNI network-policy agent this path is denied unless explicitly allowed,
    # which would take admin.nelsonlamounier.com down. Pods share these
    # subnets, so this also admits in-subnet pods on the port — acceptable
    # for an internet-facing service fronted by ALB + WAF.
    {{- with .Values.albSourceCidrs }}
    - from:
        {{- range . }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ $.Values.port }}
    {{- end }}

    # Allow Traefik ingress controller from kube-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: {{ .Values.port }}

    # Allow Prometheus scraping from monitoring namespace (if metrics added later)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.port }}

    # Allow in-cluster BFF calls from tucaken-app (server-to-server, no public exposure)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tucaken-app
      ports:
        - protocol: TCP
          port: {{ .Values.port }}

  egress:
    # Allow all egress — AWS API endpoints (DynamoDB, S3, Lambda, Cognito JWKS)
    # are reachable via NAT gateway. Restricting to specific CIDR ranges
    # is impractical for multi-service AWS workloads.
    - {}
