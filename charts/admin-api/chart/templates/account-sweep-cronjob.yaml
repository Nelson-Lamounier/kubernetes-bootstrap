{{- if .Values.accountSweep.enabled }}
# @format
# K8s CronJob: account-sweep
#
# Daily hard-delete pass for users whose 30-day soft-delete grace has
# expired. Source: admin-api/src/scripts/account-sweep.ts.
#
# For each row WHERE deleted_at < NOW() - INTERVAL '30 days':
#   1. cognito-idp:AdminDeleteUser  (frees the email for re-registration)
#   2. DELETE FROM users WHERE id   (children CASCADE)
#
# Stripe customer deletion is intentionally NOT performed here — Stripe
# recommends retaining customers for invoice/tax records, and the
# subscription has already been cancelled at termination time.
#
# Runs as the admin-api ServiceAccount so the existing IRSA grants apply
# (see cdk-monitoring EksPodIdentityStack case 'admin-api'). Required IAM:
#   cognito-idp:AdminDeleteUser on the user pool.
#
# Override defaults in values.yaml — `enabled: false` keeps the chart
# rendering valid without scheduling the Job in environments that don't
# need it yet.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: account-sweep
  namespace: {{ .Values.namespace }}
  labels:
    app: account-sweep
    app.kubernetes.io/part-of: admin-api
spec:
  # Default 03:00 UTC daily — quietest period for the cluster.
  schedule: {{ .Values.accountSweep.schedule | quote }}
  # Don't run if the previous run is still active. Failed runs surface as
  # Job objects until the next sweep — operators can inspect logs.
  concurrencyPolicy: Forbid
  # Keep one successful + one failed run for fast triage.
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  # When the cluster wakes up after a long downtime we do NOT want a
  # cascade of missed runs — only the most recent matters.
  startingDeadlineSeconds: 300
  jobTemplate:
    metadata:
      labels:
        app: account-sweep
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: account-sweep
        spec:
          restartPolicy: OnFailure
          # Pod-level securityContext mirrors the API Rollout. The image's
          # USER is the NAME `adminapi` (non-numeric), so `runAsNonRoot`
          # alone is unverifiable by the kubelet and the pod is rejected
          # with CreateContainerConfigError before the container starts —
          # the numeric runAsUser here is what makes the check pass.
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          serviceAccountName: {{ .Values.serviceAccount.name }}
          containers:
            - name: sweep
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
              command: ["node", "dist/scripts/account-sweep.js"]
              env:
                - name: GRACE_DAYS
                  value: {{ .Values.accountSweep.graceDays | default 30 | quote }}
                - name: DEPLOY_ENV
                  value: {{ .Values.observability.env | quote }}
                - name: LOG_LEVEL
                  value: {{ .Values.observability.logLevel | default "info" | quote }}
                - name: OTEL_SERVICE_NAME
                  value: "account-sweep"
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: "http://alloy.monitoring.svc.cluster.local:4318"
                - name: OTEL_RESOURCE_ATTRIBUTES
                  value: "deployment.environment={{ .Values.observability.env }},k8s.namespace.name={{ .Values.namespace }},job.kind=account-sweep"
                - name: AWS_REGION
                  value: {{ .Values.awsRegion | default "eu-west-1" | quote }}
              envFrom:
                # Same secrets as the API rollout so the Pool/Cognito config
                # paths resolve identically.
                - secretRef:
                    name: {{ .Values.secrets.name }}
                - secretRef:
                    name: platform-rds-credentials
              resources:
                requests:
                  cpu: "20m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: ["ALL"]
{{- end }}
