{{- if .Values.ingress.enabled }}
# admin-api ALB Ingress — folded into the shared `public` IngressGroup
# (Plan 5b § 0.6). The AWS Load Balancer Controller merges this with
# every other workload Ingress sharing `group.name: public` into one
# ALB; per-host listener rules are ordered by `group.order`.
#
# Cert handling: TLS terminates at the ALB. The controller auto-discovers
# the matching ACM certificate in eu-west-1 by Host-SAN match against
# the wildcards provisioned in `EksAlbCertsStack`. No certificate-arn
# annotation needed.
#
# DNS: ExternalDNS reads `external-dns.alpha.kubernetes.io/hostname` and
# upserts the corresponding A/AAAA alias record in the relevant Route53
# zone (cross-account assume into `Route53DnsValidationRole` per Plan 5b
# § 0.3).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "admin-api.fullLabels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.groupName | quote }}
    alb.ingress.kubernetes.io/group.order: {{ .Values.ingress.groupOrder | quote }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.healthcheckPath | quote }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.host | quote }}
    {{- with .Values.ingress.wafAclArn }}
    alb.ingress.kubernetes.io/wafv2-acl-arn: {{ . | quote }}
    {{- end }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-api
                port:
                  number: {{ .Values.service.port }}
{{- end }}
