# @format
# admin-api — EKS overlay.
#
# Activates the ALB Ingress for the EKS cluster. Single file across
# environments per Plan 5b § 0.6 (solo-developer, no env prefixes on
# hostnames). The shared `public` ALB serves admin-api at
# `https://admin.nelsonlamounier.com/`.
#
# Phase 4 of Plan 5b will add a WAF IP-allowlist scoped to this Host
# header so admin-api is reachable only from the operator's allowlist.
# the dedicated `general` ASG.
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 70

wafAnnotator:
  ssmPath: "/k8s/development/eks/waf-acl-arn"
  # Pod Identity role that has ssm:GetParameter on the path above.
  # Read via: aws ssm get-parameter --name /k8s/development/eks/waf-annotator-role-arn
  roleArn: "arn:aws:iam::771826808455:role/eks-public-waf-annotator-development"

ingress:
  enabled: true
  host: admin.nelsonlamounier.com
  groupName: public
  groupOrder: 100
  healthcheckPath: /readyz
  wafAclArn: ""  # populated at runtime by the waf-annotator PostSync Job

# ---------------------------------------------------------------------------
# Topology Spread Constraints — AZ resilience
# ---------------------------------------------------------------------------
# Active when replicas > 1. ScheduleAnyway prevents scheduling stalls on
# a single-AZ dev cluster while still nudging the scheduler toward balance.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: admin-api

# ---------------------------------------------------------------------------
# Resource requests/limits — sized from observed usage, not copy-paste
# ---------------------------------------------------------------------------
# 24h live profile (Prometheus, 2026-07-05): CPU ~30m avg with bursts to
# 332m; memory working set 110–144Mi. Requests are what Karpenter reserves
# (cost); the old blanket 100m/256Mi block reserved ~3× actual use across
# the web tier. CPU request also anchors the HPA (70% target → scale-out
# at 35m sustained), so it stays at 50m rather than lower to avoid
# burst-flapping. CPU limit keeps 500m for the observed 332m bursts —
# the base file's 300m would throttle them.
resources:
  requests:
    cpu: "50m"
    memory: "160Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
