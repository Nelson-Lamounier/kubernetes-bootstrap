# @format
# admin-api — EKS overlay.
#
# Activates the ALB Ingress for the EKS cluster. Single file across
# environments per Plan 5b § 0.6 (solo-developer, no env prefixes on
# hostnames). The shared `public` ALB serves admin-api at
# `https://admin.nelsonlamounier.com/`.
#
# Phase 4 of Plan 5b will add a WAF IP-allowlist scoped to this Host
# header so admin-api is reachable only from the operator's allowlist.
# the dedicated `general` ASG.
ingress:
  enabled: true
  host: admin.nelsonlamounier.com
  groupName: public
  groupOrder: 100
  healthcheckPath: /readyz
  # Populated post-deploy from SSM `/k8s/development/eks/waf-acl-arn`
  # (written by EksPublicWafStack). Leave empty until the WAF is
  # deployed; the conditional annotation simply omits when blank.
  wafAclArn: ""

# ---------------------------------------------------------------------------
# Topology Spread Constraints — AZ resilience
# ---------------------------------------------------------------------------
# Active when replicas > 1. ScheduleAnyway prevents scheduling stalls on
# a single-AZ dev cluster while still nudging the scheduler toward balance.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: admin-api
