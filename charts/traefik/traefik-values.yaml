# @format
# Traefik Helm values — EKS V1 (Deployment + AWS NLB IP-mode).
#
# Compatible with Traefik Helm chart v3.x (traefik/traefik).
#
# Why Deployment, not DaemonSet:
#   - EKS workload nodes are Karpenter-provisioned and ephemeral. A
#     DaemonSet would churn pods every time Karpenter scales.
#   - The AWS Load Balancer Controller fronts the Service with an NLB
#     in IP target mode, so traffic reaches pod IPs directly without
#     hostNetwork.
#
# Why NLB IP target type:
#   - NodePort/instance-mode targets churn with Karpenter node lifecycle
#     and need security-group rules per node. IP-mode targets the pods
#     directly, surviving node replacement.

deployment:
  kind: Deployment
  replicas: 3

# Service of type LoadBalancer — ALB controller provisions an NLB.
service:
  enabled: true
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
  spec:
    externalTrafficPolicy: Cluster

# Spread Traefik replicas across AZs for HA without hard pinning.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
          topologyKey: topology.kubernetes.io/zone

# Traefik is platform-tier ingress — schedule on the system MNG so it
# stays up regardless of Karpenter NodePool state. (Pure workloads
# stay tolerationless and land on Karpenter-provisioned nodes.)
tolerations:
  - key: dedicated
    value: system
    effect: NoSchedule

# Entry points exposed via the NLB Service.
ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
    tls:
      enabled: true
  metrics:
    port: 9100
    expose:
      default: false
    exposedPort: 9100
    protocol: TCP

# Prometheus metrics retained from the kubeadm setup.
metrics:
  prometheus:
    enabled: true
    addEntryPointsLabels: true
    addServicesLabels: true
    entryPoint: metrics

# Logs to stdout — container runtime collects them.
logs:
  general:
    level: INFO
  access:
    enabled: true

# IngressRoute CRDs are unchanged from kubeadm; workloads reference
# them as before. Providers stay default (KubernetesIngress + CRD).
providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true
