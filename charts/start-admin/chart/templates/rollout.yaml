# ---------------------------------------------------------------
# Blue/Green Rollout — Argo Rollouts progressive delivery
#
# Two full ReplicaSets run side by side:
#   activeService  → receives production traffic (start-admin)
#   previewService → receives zero traffic until promoted (start-admin-preview)
#
# Pre-promotion analysis queries Prometheus for error rate and
# P95 latency. If metrics breach thresholds, the rollout pauses
# and does NOT promote automatically.
#
# After manual promotion, the preview becomes active and the old
# ReplicaSet scales down after scaleDownDelaySeconds.
# ---------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: start-admin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "start-admin.fullLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "start-admin.selectorLabels" . | nindent 6 }}
  strategy:
    blueGreen:
      activeService: start-admin
      previewService: start-admin-preview
      autoPromotionEnabled: {{ .Values.rollout.blueGreen.autoPromotionEnabled }}
      {{- if .Values.rollout.blueGreen.autoPromotionSeconds }}
      autoPromotionSeconds: {{ .Values.rollout.blueGreen.autoPromotionSeconds }}
      {{- end }}
      scaleDownDelaySeconds: {{ .Values.rollout.blueGreen.scaleDownDelaySeconds | default 30 }}
      prePromotionAnalysis:
        templates:
          - templateName: start-admin-bluegreen-analysis
        args:
          - name: service-name
            value: "start-admin"
  template:
    metadata:
      labels:
        {{- include "start-admin.fullLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: start-admin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.port }}
              name: http
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.name }}
            # ESO syncs SSM into a K8s Secret (not a ConfigMap). optional: true
            # so the pod can start before the start-admin-config ExternalSecret
            # is provisioned.
            - secretRef:
                name: start-admin-config
                optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
      volumes:
        - name: tmp
          emptyDir: {}
