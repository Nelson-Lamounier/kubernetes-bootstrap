{{- if .Values.pdb.enabled }}
# ---------------------------------------------------------------
# PodDisruptionBudget — protects availability during node drains
#
# Ensures at least {{ .Values.pdb.minAvailable }} pod(s) remain
# available during voluntary disruptions (node maintenance,
# cluster upgrades, CA scale-down, spot instance reclamation).
# ---------------------------------------------------------------
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: start-admin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "start-admin.fullLabels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "start-admin.selectorLabels" . | nindent 6 }}
{{- end }}
