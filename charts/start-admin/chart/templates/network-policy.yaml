{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: start-admin-allow-traefik
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "start-admin.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "start-admin.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from Traefik (kube-system namespace) — regular pods
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: {{ .Values.port }}
          protocol: TCP
    # Allow traffic from Traefik hostNetwork pods (node IPs).
    # Traefik uses hostNetwork: true, so direct traffic appears from
    # node IPs. Calico cannot match namespaceSelector for these.
    - from:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.nodesCidr | default "10.0.0.0/16" }}
      ports:
        - port: {{ .Values.port }}
          protocol: TCP
    # Allow VXLAN-tunnelled traffic from other nodes.
    # Cross-node traffic uses VXLAN tunnel addresses (pod CIDR) as source,
    # e.g., 192.168.28.2 for the control plane's tunnel endpoint.
    - from:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.podCidr | default "192.168.0.0/16" }}
      ports:
        - port: {{ .Values.port }}
          protocol: TCP
    # Allow traffic from monitoring namespace (Prometheus scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: {{ .Values.port }}
          protocol: TCP
{{- end }}
