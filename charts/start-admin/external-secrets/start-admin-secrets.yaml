# @format
# ExternalSecret: start-admin-secrets
#
# Replaces the start-admin-secrets K8s Secret previously created by SM-B deploy.py.
# start-admin also needs ADMIN_API_URL — injected as a literal env var in the Deployment
# (static in-cluster DNS: http://admin-api.admin-api:3002).
#
# Referenced by: cdk-monitoring/charts/start-admin/chart/templates/deployment.yaml
#   envFrom.secretRef: name: start-admin-secrets

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: start-admin-secrets
  namespace: start-admin
  annotations:
    kubernetes.io/description: "start-admin Cognito auth secrets from SSM"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: start-admin-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: AUTH_COGNITO_DOMAIN
      remoteRef:
        key: /nextjs/development/auth/cognito-domain
    - secretKey: AUTH_COGNITO_ID
      remoteRef:
        key: /nextjs/development/auth/cognito-client-id
