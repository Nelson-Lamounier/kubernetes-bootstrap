# @format
# ExternalSecret: datadog-credentials
# Namespace: article-pipeline
#
# Provides DD_API_KEY to article-pipeline Job pods for Datadog LLM
# Observability. The Job spec references this Kubernetes Secret via
# valueFrom.secretKeyRef; the API key is never embedded directly in the Job spec.
#
# Source: AWS Secrets Manager JSON secret k8s/development/datadog-credentials
# with shape { "DD_API_KEY": "..." }.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: datadog-credentials
  namespace: article-pipeline
  annotations:
    kubernetes.io/description: "Datadog API key for article-pipeline LLM Observability Jobs"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: datadog-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: DD_API_KEY
      remoteRef:
        key: k8s/development/datadog-credentials
        property: DD_API_KEY
