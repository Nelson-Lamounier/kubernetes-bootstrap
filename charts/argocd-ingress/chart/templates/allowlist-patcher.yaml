# @format
# allowlist-patcher — PostSync hook that patches the admin-ip-allowlist
# Middleware with real CIDRs from the ESO-managed Secret.
#
# Flow on every ArgoCD sync:
#   1. ArgoCD renders the admin-ip-allowlist Middleware with sourceRange: []
#   2. PostSync hook fires this Job.
#   3. Job reads .data.ipv4 / .data.ipv6 from the ESO-managed Secret
#      admin-ip-allowlist and PATCHes /spec/ipAllowList/sourceRange.
#   4. ignoreDifferences + RespectIgnoreDifferences on the Application
#      stops selfHeal from reverting the patch on subsequent reconciles.
#
# Rotation: update SSM /k8s/{env}/monitoring/allow-ipv{4,6}, trigger
# an ArgoCD sync of argocd-ingress — ESO refreshes within 5m and the
# Job re-patches.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-allowlist-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "argocd-ingress.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-allowlist-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "argocd-ingress.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["admin-ip-allowlist"]
    verbs: ["get"]
  - apiGroups: ["traefik.io"]
    resources: ["middlewares"]
    resourceNames: ["admin-ip-allowlist"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-allowlist-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "argocd-ingress.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: argocd-allowlist-patcher
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: argocd-allowlist-patcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-allowlist-patcher
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    {{- include "argocd-ingress.labels" . | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "argocd-ingress.labels" . | nindent 8 }}
        platform.engineering/role: allowlist-patcher
    spec:
      serviceAccountName: argocd-allowlist-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          image: alpine/k8s:1.31.4
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: TARGET_NAMESPACE
              value: {{ .Values.namespace | quote }}
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              SECRET_JSON=""
              for i in $(seq 1 30); do
                SECRET_JSON=$(kubectl -n "$TARGET_NAMESPACE" get secret admin-ip-allowlist -o json 2>/dev/null || true)
                [ -n "$SECRET_JSON" ] && break
                echo "waiting for ESO to populate admin-ip-allowlist (attempt $i/30)"
                sleep 5
              done
              if [ -z "$SECRET_JSON" ]; then
                echo "ERROR: admin-ip-allowlist Secret not populated by ESO within 150s"
                exit 1
              fi
              IPV4_B64=$(echo "$SECRET_JSON" | sed -n 's/.*"ipv4":[[:space:]]*"\([^"]*\)".*/\1/p')
              IPV6_B64=$(echo "$SECRET_JSON" | sed -n 's/.*"ipv6":[[:space:]]*"\([^"]*\)".*/\1/p')
              IPV4=$(echo -n "$IPV4_B64" | base64 -d)
              IPV6=$(echo -n "$IPV6_B64" | base64 -d)
              CIDRS_JSON=$(printf '%s,%s' "$IPV4" "$IPV6" | tr ',' '\n' | awk 'NF' \
                | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
                | awk 'BEGIN{printf "["} {if (NR>1) printf ","; printf "\"%s\"", $0} END{printf "]"}')
              if [ "$CIDRS_JSON" = "[]" ]; then
                echo "ERROR: ESO Secret produced no CIDRs (ipv4=\"$IPV4\" ipv6=\"$IPV6\")"
                exit 1
              fi
              echo "patching middleware admin-ip-allowlist sourceRange=$CIDRS_JSON"
              kubectl -n "$TARGET_NAMESPACE" patch middleware.traefik.io admin-ip-allowlist --type=json \
                -p "[{\"op\":\"replace\",\"path\":\"/spec/ipAllowList/sourceRange\",\"value\":${CIDRS_JSON}}]"
