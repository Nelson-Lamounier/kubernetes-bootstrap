# @format
# Traefik Middlewares for ArgoCD namespace
#
# Traefik v3 blocks cross-namespace middleware references by default.
# These duplicate the cluster-wide middlewares into the argocd namespace
# so IngressRoutes here are self-contained.
#
# admin-ip-allowlist: starts with empty sourceRange — patched by the
# allowlist-patcher PostSync job. ignoreDifferences on the Application
# prevents selfHeal from reverting the patch.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-ip-allowlist
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "argocd-ingress.labels" . | nindent 4 }}
spec:
  ipAllowList:
    sourceRange:
      {{- if .Values.adminAccess.allowedIps }}
      {{- range .Values.adminAccess.allowedIps }}
      - {{ . | quote }}
      {{- end }}
      {{- else }}
      []
      {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "argocd-ingress.labels" . | nindent 4 }}
spec:
  rateLimit:
    average: 100
    burst: 50
