# @format
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-job-watcher
  namespace: {{ .Values.namespace }}
  labels:
    app: platform-job-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-job-watcher
  template:
    metadata:
      annotations:
        # Roll the pod whenever the watcher config changes. The app loads its
        # watcher entries once at startup, so without this a ConfigMap update
        # (e.g. adding a pipeline_runs watcher) would not take effect until a
        # manual restart. Hashing the rendered ConfigMap forces a rollout.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        app: platform-job-watcher
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      # Image runs as appuser (uid 1001, ai-applications Dockerfile).
      # Restricted-PSA-compliant: non-root, no privilege escalation, no caps,
      # read-only root fs (the watcher writes nothing; /tmp is an emptyDir
      # in case a library needs scratch space).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: watcher
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["node", "dist/run-watcher.js"]
          ports:
            - containerPort: 9100
              name: metrics
              protocol: TCP
          env:
            - name: WATCHER_CONFIG_PATH
              value: /etc/watcher/config.yaml
            # ── Observability ────────────────────────────────────────────────
            - name: OTEL_SERVICE_NAME
              value: "platform-job-watcher"
            - name: OTEL_SERVICE_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4318"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment={{ .Values.observability.env | default "dev" }},k8s.namespace.name={{ .Values.namespace }}"
            - name: PYROSCOPE_SERVER_ADDRESS
              value: "http://pyroscope.monitoring.svc.cluster.local:4040"
            - name: DEPLOY_ENV
              value: {{ .Values.observability.env | default "dev" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.observability.logLevel | default "info" | quote }}
          envFrom:
            - secretRef:
                name: platform-rds-credentials
          volumeMounts:
            - name: watcher-config
              mountPath: /etc/watcher
              readOnly: true
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 9100
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
      volumes:
        - name: watcher-config
          configMap:
            name: platform-job-watcher-config
        - name: tmp
          emptyDir: {}
