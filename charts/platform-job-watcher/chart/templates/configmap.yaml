# @format
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-job-watcher-config
  namespace: {{ .Values.namespace }}
  labels:
    app: platform-job-watcher
data:
  config.yaml: |
    watchers:
    {{- range .Values.config.watchers }}
      - namespace: {{ .namespace }}
        dbTable: {{ .dbTable }}
        staleAfterMinutes: {{ .staleAfterMinutes }}
        {{- with .statusColumn }}
        statusColumn: {{ . }}
        {{- end }}
        {{- with .staleColumn }}
        staleColumn: {{ . }}
        {{- end }}
        {{- with .errorColumn }}
        errorColumn: {{ . }}
        {{- end }}
        {{- with .completedColumn }}
        completedColumn: {{ . }}
        {{- end }}
        {{- with .failedValue }}
        failedValue: {{ . | quote }}
        {{- end }}
        {{- with .errorValue }}
        errorValue: {{ . | quote }}
        {{- end }}
        {{- with .terminalStatuses }}
        terminalStatuses:
          {{- range . }}
          - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- with .jobLabelKey }}
        jobLabelKey: {{ . }}
        {{- end }}
        {{- with .linkedTable }}
        linkedTable: {{ . }}
        {{- end }}
        {{- with .linkedVia }}
        linkedVia: {{ . }}
        {{- end }}
        {{- with .linkedStatusColumn }}
        linkedStatusColumn: {{ . }}
        {{- end }}
        {{- with .linkedFromValue }}
        linkedFromValue: {{ . }}
        {{- end }}
        {{- with .linkedToValue }}
        linkedToValue: {{ . }}
        {{- end }}
    {{- end }}
