# @format
# platform-job-watcher — Development environment overrides
image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/platform-job-watcher
  # Seed tag so the first deploy has a valid image; ArgoCD Image Updater
  # writes newer tags back from here on each ECR push.
  tag: "be8314767c3cf82baa346eaaff07b11c65a6ad0c-r1"

namespace: platform

# ── Observability — pin to development ────────────────────────────────────────
observability:
  env:      development
  logLevel: debug

config:
  watchers:
    - namespace: resume-import
      dbTable: resume_imports
      staleAfterMinutes: 15
    # Coach + strategist runs. pipeline_runs has no started_at/completed_at/error_code
    # and uses 'complete' (not 'completed') as its success status — so the override
    # fields are REQUIRED; the resume_imports defaults would error + mis-sweep.
    - namespace: job-strategist
      dbTable: pipeline_runs
      # 30 min (matches production): the strategist writer alone can stream for
      # 11-17 min; at 15 min the sweep marked ACTIVE runs failed mid-write
      # (run 30fe4f66, 2026-07-08) and the job died before persisting.
      staleAfterMinutes: 30
      statusColumn: status
      staleColumn: created_at
      errorColumn: error_message
      completedColumn: updated_at
      failedValue: failed
      errorValue: "Pipeline timed out or was interrupted before completion"
      terminalStatuses:
        - complete
        - failed
      # Strategist/coach Jobs stamp `pipeline-run-id` (= pipeline_runs PK), not
      # the resume_imports `import-id`. Without this the event fast path no-ops
      # and failures reconcile only via the 30-min stale sweep above.
      jobLabelKey: pipeline-run-id
      # When a pipeline_run is failed, also fail the job_applications row it
      # points at (reference_id -> id) if it's still 'analysing' — otherwise the
      # application tag stays stuck spinning "Analysing" forever. Guarded to the
      # latest run per application so a concurrent re-run is never clobbered.
      linkedTable: job_applications
      linkedVia: reference_id
      linkedStatusColumn: kanban_status
      linkedFromValue: analysing
      linkedToValue: failed
