# @format
# platform-job-watcher — Production environment overrides.
# NOT IN USE YET.

image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/platform-job-watcher

namespace: platform

observability:
  env:      production
  logLevel: info

resources:
  requests:
    memory: 256Mi
    cpu:    100m
  limits:
    memory: 512Mi
    cpu:    500m

config:
  # Add prod namespaces as the platform grows. Each entry watches a
  # namespace's Jobs and reconciles into a PG table.
  watchers:
    - namespace:         resume-import
      dbTable:           resume_imports
      staleAfterMinutes: 15
    - namespace:         article-pipeline
      dbTable:           pipeline_runs
      staleAfterMinutes: 30
    - namespace:         job-strategist
      dbTable:           pipeline_runs
      staleAfterMinutes: 30
