# @format
# platform-job-watcher — Production environment overrides.
# NOT IN USE YET.

image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/platform-job-watcher

namespace: platform

observability:
  env:      production
  logLevel: info

resources:
  requests:
    memory: 256Mi
    cpu:    100m
  limits:
    memory: 512Mi
    cpu:    500m

config:
  # Add prod namespaces as the platform grows. Each entry watches a
  # namespace's Jobs and reconciles into a PG table.
  watchers:
    - namespace:         resume-import
      dbTable:           resume_imports
      staleAfterMinutes: 15
    # pipeline_runs has no started_at/completed_at/error_code and uses 'complete'
    # (not 'completed') for success — override fields REQUIRED, else the defaults
    # error + would mark successful runs failed.
    - namespace:         article-pipeline
      dbTable:           pipeline_runs
      staleAfterMinutes: 30
      statusColumn:      status
      staleColumn:       created_at
      errorColumn:       error_message
      completedColumn:   updated_at
      failedValue:       failed
      errorValue:        "Pipeline timed out or was interrupted before completion"
      terminalStatuses:
        - complete
        - failed
    - namespace:         job-strategist
      dbTable:           pipeline_runs
      staleAfterMinutes: 30
      statusColumn:      status
      staleColumn:       created_at
      errorColumn:       error_message
      completedColumn:   updated_at
      failedValue:       failed
      errorValue:        "Pipeline timed out or was interrupted before completion"
      terminalStatuses:
        - complete
        - failed
      # Strategist/coach Jobs stamp `pipeline-run-id` (= pipeline_runs PK), not
      # the resume_imports `import-id`. Without this the event fast path no-ops
      # and failures reconcile only via the 30-min stale sweep above.
      jobLabelKey:       pipeline-run-id
