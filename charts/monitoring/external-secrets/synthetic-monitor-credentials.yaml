# @format
# ExternalSecret: synthetic-monitor-secret
#
# Credentials for the synthetic monitor CronJob (auth + resume-import probe).
# Provision these SSM parameters first (dev account, eu-west-1):
#   /k8s/{env}/synthetic-monitor/username      — a DEDICATED Cognito user in the
#                                                admin group, used only by the probe
#   /k8s/{env}/synthetic-monitor/password      — that user's password (SecureString)
#   /k8s/{env}/synthetic-monitor/cognito-client-id — the admin-api app client id
#
# The Cognito user pool app client must allow the USER_PASSWORD_AUTH flow.
#
# Consumed by: charts/monitoring/chart/templates/synthetic-monitor/cronjob.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: synthetic-monitor-secret
  namespace: monitoring
  annotations:
    kubernetes.io/description: "Synthetic monitor — Cognito synthetic-user creds + app client id"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: synthetic-monitor-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: SYNTHETIC_USERNAME
      remoteRef:
        key: /k8s/development/synthetic-monitor/username
    - secretKey: SYNTHETIC_PASSWORD
      remoteRef:
        key: /k8s/development/synthetic-monitor/password
    - secretKey: COGNITO_CLIENT_ID
      remoteRef:
        key: /k8s/development/synthetic-monitor/cognito-client-id
