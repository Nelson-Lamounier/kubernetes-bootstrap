# @format
# ExternalSecret: grafana-rds-credentials
#
# Extracts the postgres password from the platform-rds Secrets Manager secret
# so Grafana can connect to the RDS PostgreSQL datasource via PgBouncer.
# Uses the same source secret as the platform-rds chart ESO — no duplication
# in Secrets Manager.
#
# ESO store: aws-secretsmanager (ambient Pod Identity auth)
# Secret path: k8s-development/platform-rds/credentials
# Namespace: monitoring
#
# Consumer:
#   Grafana deployment env var GRAFANA_RDS_PASSWORD
#   → interpolated in grafana-datasources ConfigMap (rds-postgres datasource)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-rds-credentials
  namespace: monitoring
  annotations:
    kubernetes.io/description: "RDS postgres password for Grafana rds-postgres datasource"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: grafana-rds-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      engineVersion: v2
      type: Opaque
      data:
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: password
