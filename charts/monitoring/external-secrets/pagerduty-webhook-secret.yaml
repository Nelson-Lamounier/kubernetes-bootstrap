# @format
# ExternalSecret: pagerduty-webhook-secret
#
# Optional — only required when /ack-pagerduty should enforce HMAC
# signature verification (defence-in-depth alongside basic auth at ingress).
#
# Provision the SSM parameter at /k8s/{env}/pagerduty-webhook-secret with
# the Webhook Subscription's signing secret from PagerDuty:
#   PagerDuty UI → Service → Integrations → Webhook Subscription →
#                  Generate / Reveal Signing Secret
#
# When this Secret is absent, the deployment env-var `PD_WEBHOOK_SECRET`
# is empty and the sink skips HMAC verification — basic auth at the
# Traefik ingress still applies. With it set, only payloads signed by
# PagerDuty's secret are accepted.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pagerduty-webhook-secret
  namespace: monitoring
  annotations:
    kubernetes.io/description: "PagerDuty Webhook V3 signing secret for /ack-pagerduty HMAC verification"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: pagerduty-webhook-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: secret
      remoteRef:
        key: /k8s/development/pagerduty-webhook-secret
