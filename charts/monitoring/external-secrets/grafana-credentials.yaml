# @format
# ExternalSecret: grafana-credentials
#
# Resolves grafana-admin-password from SSM and creates the
# grafana-credentials Secret. The admin-user key is static ("admin").
#
# Referenced by: charts/monitoring/chart/templates/grafana/deployment.yaml
# SSM path: /k8s/{env}/grafana-admin-password

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-credentials
  namespace: monitoring
  annotations:
    kubernetes.io/description: "Grafana admin credentials from SSM"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: grafana-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      data:
        admin-user: "admin"
        admin-password: "{{ .adminPassword }}"
  data:
    - secretKey: adminPassword
      remoteRef:
        key: /k8s/development/grafana-admin-password
