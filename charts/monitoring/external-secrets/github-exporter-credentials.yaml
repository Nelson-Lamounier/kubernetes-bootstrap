# @format
# ExternalSecret: github-actions-exporter-credentials
#
# Resolves GitHub token, webhook token, and org from SSM.
#
# Referenced by: charts/monitoring/chart/templates/github-actions-exporter/deployment.yaml
# SSM paths: /k8s/{env}/github-token, /k8s/{env}/github-webhook-token, /k8s/{env}/github-org

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-actions-exporter-credentials
  namespace: monitoring
  annotations:
    kubernetes.io/description: "GitHub Actions Exporter credentials from SSM"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: github-actions-exporter-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: github-token
      remoteRef:
        key: /k8s/development/github-token
    - secretKey: github-webhook-token
      remoteRef:
        key: /k8s/development/github-webhook-token
    - secretKey: github-org
      remoteRef:
        key: /k8s/development/github-org
