# @format
# ExternalSecret: prometheus-basic-auth-secret
#
# Resolves the htpasswd-formatted string from SSM.
# Value format: "user:bcrypt_hash" (htpasswd / nginx auth_basic_user_file compatible).
#
# Referenced by: charts/monitoring/chart/templates/prometheus/auth-proxy.yaml
#   (nginx auth_basic_user_file — replaces kubeadm-era Traefik basicauth-middleware)
# SSM path: /k8s/{env}/monitoring/prometheus-basic-auth

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: prometheus-basic-auth-secret
  namespace: monitoring
  annotations:
    kubernetes.io/description: "Prometheus basic-auth credentials from SSM"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: prometheus-basic-auth-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: users
      remoteRef:
        key: /k8s/development/monitoring/prometheus-basic-auth
