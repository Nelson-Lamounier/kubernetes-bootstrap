# @format
# monitoring — EKS overlay.
#
# `node-pool=monitoring` selector with a `dedicated=monitoring:NoSchedule`
# tolerance — neither exists on EKS. Both are blanked so Karpenter
# admits the pods naturally.
#
# Storage: EKS uses the EBS CSI driver (aws-ebs-csi-driver managed addon).
# `ebs-sc` StorageClass (ebs.csi.aws.com, gp3) is defined in the monitoring
# chart templates and provisioned before PVCs. `gp2` (in-tree provisioner)
# was the dev cluster default before the EBS CSI migration; all components
# have been updated to use ebs-sc. Each component's `pvc.storageClass` is
# set one-by-one because the chart doesn't expose a global storage default.
#
# Per Plan 5 spec § 8 (and 5b carryover): cluster-local TSDB (Prometheus,
# Loki, Tempo) is treated as ephemeral on cluster bring-up. Fresh PVCs
# is the expected behaviour; dashboards-as-code in git carry over.
# `null` (not `{}`) so Helm's deep-merge actually replaces the chart's
# top-level nodeSelector. An empty map merges-into rather than overrides.
nodeSelector: null

# Restrict DaemonSets (node-exporter, process-exporter, promtail) to workload
# nodes only. System nodes are at the 17-pod EC2 limit; DaemonSet pods land
# on system nodes by default because they have the dedicated=system toleration.
# matchFields nodeAffinity injected by the DaemonSet controller pins each pod
# to a specific node — if that node is full the pod stays Pending forever.
daemonSetNodeSelector:
  node-role: workload

# Tolerate the system node taint so monitoring pods can land on system nodes.
tolerations:
  - key: dedicated
    operator: Equal
    value: system
    effect: NoSchedule

# AZ pinning: require eu-west-1b so all monitoring PVCs land in one AZ.
# MNG spans eu-west-1a + eu-west-1b; without this constraint pods split
# across AZs and each cluster restart accumulates orphan EBS volumes.
# Prefer system nodes within that AZ to avoid idle Karpenter workload nodes.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
                - eu-west-1b
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node-role
              operator: In
              values:
                - system

prometheus:
  pvc:
    storageClass: ebs-sc

grafana:
  pvc:
    storageClass: ebs-sc
  alerting:
    snsTopicArn: "arn:aws:sns:eu-west-1:771826808455:k8s-bootstrap-alarm"
    awsRegion: eu-west-1

loki:
  pvc:
    storageClass: ebs-sc

tempo:
  pvc:
    storageClass: ebs-sc

pyroscope:
  pvc:
    storageClass: ebs-sc

alertmanager:
  pvc:
    storageClass: ebs-sc

# Alloy — disable CloudWatch scrapers on EKS.
#
# On kubeadm the EC2 instance profile granted logs:FilterLogEvents etc.
# On EKS pods need an explicit Pod Identity association; none is wired for
# Alloy yet. Disabling prevents loki.source.cloudwatch from being rendered
# in the ConfigMap, which caused CrashLoopBackOff ("component not found").
# Re-enable once a PodIdentityAssociation + CloudWatch policy is added for
# the alloy service account.
alloy:
  awsLogs:
    cloudtrail:
      enabled: false
    ssmAutomation:
      enabled: false
    lambdaLogs:
      enabled: false

# Namespace-level ResourceQuota — caps the SUM of requests across ALL pods in
# the monitoring namespace (23 pods: prometheus, tempo, loki, pyroscope,
# steampipe, grafana + renderer, exporters, alloy, yace, ...). It is not
# per-workload; whichever pod asks when the budget is full is refused.
#
# requests.memory 3Gi -> 4Gi: measured steady-state was 3056Mi/3072Mi (16Mi
# free), so a rolling update — which needs a transient +1 surge pod — had
# nowhere to place it. That deadlocked YACE's reloader-triggered restart
# (FailedCreate: exceeded quota) and blocked monitoring-allowlist-patcher.
# 4Gi leaves ~1Gi headroom, enough for the largest single surge pod
# (prometheus ~784Mi) during any component's rollout. CPU is fine (825m/1500m).
resourceQuota:
  hard:
    requests.cpu: "1500m"
    requests.memory: 4Gi
    limits.cpu: "6"
    # 8Gi -> 12Gi (2026-07): summed pod limits reached exactly 8Gi and the
    # quota refused even a 32Mi surge pod, deadlocking rollouts (the
    # auth-proxy checksum/config roll hit FailedCreate the same way YACE
    # and the allowlist-patcher did before it). Limits are overcommit caps,
    # not reservations — 12Gi restores rolling-update headroom while
    # requests (the real scheduling reservation) stay capped at 4Gi.
    limits.memory: 12Gi
