{{- if .Values.alloy.ingress.enabled }}
# ALB cannot strip path prefixes natively. A small nginx proxy sits between
# the ALB and Alloy, rewriting /faro/* → /* before forwarding to the Faro
# receiver port.
#
# CORS is split across two owners:
#   - Preflights (OPTIONS) are answered HERE. Alloy's faro.receiver uses Go's
#     rs/cors with a fixed allowed-header list that rejects x-faro-session-id
#     and traceparent — both sent by the Faro SDK (+ web-tracing) — and
#     rs/cors omits *all* CORS headers from a rejected preflight, so browsers
#     block the POST with "No Access-Control-Allow-Origin header".
#   - Actual POST responses keep getting their CORS headers from Alloy's
#     cors_allowed_origins config (verified working). nginx must NOT add
#     headers on that path or the duplicate ACAO would also break CORS.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: faro-proxy-nginx
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "alloy" | nindent 4 }}
data:
  nginx.conf: |
    events {}
    http {
      # Echo only origins Alloy already trusts (same values list drives
      # Alloy's cors_allowed_origins). Unknown origins map to "" — nginx
      # drops add_header with an empty value, so they get no CORS headers.
      map $http_origin $cors_origin {
        default "";
        {{- range .Values.alloy.ingress.corsAllowedOrigins }}
        {{ . | quote }} $http_origin;
        {{- end }}
      }
      server {
        listen 8080;
        location /faro/ {
          # See ConfigMap header comment: preflights must not reach Alloy.
          if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "content-type, x-faro-session-id, x-api-key, traceparent" always;
            add_header Access-Control-Max-Age "3600" always;
            add_header Vary "Origin" always;
            return 204;
          }
          proxy_pass http://alloy.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.alloy.service.faroPort }}/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: faro-proxy
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "alloy" | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faro-proxy
  template:
    metadata:
      labels:
        app: faro-proxy
    spec:
      # Run nginx as its unprivileged uid (101); pid/cache dirs on emptyDirs
      # so the root fs stays read-only. This container terminates
      # internet-originated RUM traffic behind the ALB — not as root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /run
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: faro-proxy-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: faro-proxy
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "alloy" | nindent 4 }}
spec:
  selector:
    app: faro-proxy
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alloy-faro-ingress
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "alloy" | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/group.name: public
    alb.ingress.kubernetes.io/group.order: "202"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /faro/
    alb.ingress.kubernetes.io/success-codes: "200,404"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /faro
            pathType: Prefix
            backend:
              service:
                name: faro-proxy
                port:
                  number: 8080
{{- end }}
