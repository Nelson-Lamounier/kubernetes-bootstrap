apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "alloy" | nindent 4 }}
data:
  config.alloy: |
    // =========================================================================
    // Grafana Alloy — Faro Collector Pipeline
    // Receives client-side telemetry from Grafana Faro SDK and forwards:
    //   • Logs → Loki
    //   • Traces → Tempo (via OTLP)
    // =========================================================================

    // --- Faro Receiver ---
    // Listens for Faro SDK payloads (Web Vitals, JS errors, client spans, logs)
    faro.receiver "default" {
      server {
        listen_address = "0.0.0.0"
        listen_port    = {{ .Values.alloy.service.faroPort }}

        cors_allowed_origins = [{{ range $i, $origin := .Values.alloy.ingress.corsAllowedOrigins }}{{ if $i }}, {{ end }}{{ $origin | quote }}{{ end }}]
      }

      output {
        logs   = [loki.process.faro.receiver]
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    // --- Relabel Faro Logs ---
    // Inject the job="faro" static label required by the RUM dashboard queries
    loki.process "faro" {
      forward_to = [loki.write.default.receiver]
      
      stage.static_labels {
        values = {
          job = "faro",
        }
      }
    }

    // --- Loki Writer ---
    // Forwards Faro logs (JS errors, console logs, Web Vitals events) to Loki
    loki.write "default" {
      endpoint {
        url = "http://loki.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.loki.service.port }}/loki/api/v1/push"
      }
    }

    // --- OTLP Receiver (server-side workloads) ---
    // admin-api and tucaken-app SSR push traces here via OTEL_EXPORTER_OTLP_
    // ENDPOINT=http://alloy.monitoring:4318. The receiver continues whatever
    // trace context the upstream caller (Faro browser → SSR → admin-api → pg)
    // already carries — Tempo renders one waterfall.
    otelcol.receiver.otlp "default" {
      http {
        endpoint = "0.0.0.0:{{ .Values.alloy.service.otlpHttpPort }}"
      }
      grpc {
        endpoint = "0.0.0.0:{{ .Values.alloy.service.otlpGrpcPort }}"
      }

      output {
        traces = [otelcol.processor.batch.default.input]
        // Logs/metrics receivers can be added later; for now only traces
        // flow through this pipeline. Server logs ship via stdout → Loki.
      }
    }

    // --- Batch processor ---
    // Coalesces span exports to reduce egress to Tempo. 5s/512 spans is the
    // OTel Collector default — matches Tempo's ingestion sweet spot.
    otelcol.processor.batch "default" {
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    // --- OTLP Exporter (Tempo) ---
    // Forwards both Faro client spans and OTLP server spans to Tempo.
    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "tempo.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.tempo.service.otlpGrpcPort }}"

        tls {
          insecure = true
        }
      }
    }

    // --- Self-monitoring ---
    // Expose Alloy internal metrics for Prometheus scraping
    prometheus.exporter.self "default" {
    }

    {{- if .Values.alloy.kubernetesEvents.enabled }}
    // =========================================================================
    // Kubernetes events → Loki
    // =========================================================================
    // Streams every K8s Event (kubectl get events) cluster-wide. Used by the
    // resume-import dashboard's "K8s events" panel and the cluster-events
    // explore view. Requires the ServiceAccount/ClusterRole defined in
    // templates/alloy/rbac.yaml.
    loki.source.kubernetes_events "cluster" {
      job_name   = "integrations/kubernetes/eventhandler"
      log_format = "logfmt"
      forward_to = [loki.process.kube_events.receiver]
    }
    loki.process "kube_events" {
      forward_to = [loki.write.default.receiver]
      // Parse fields the dashboard filters on. The Alloy events source emits
      // logfmt with keys: name, namespace, reason, type, regarding_*, etc.
      stage.logfmt {
        mapping = {
          "namespace" = "",
          "reason"    = "",
          "type"      = "",
          "name"      = "",
        }
      }
      stage.labels {
        values = {
          job       = "integrations/kubernetes/eventhandler",
          namespace = "",
          type      = "",
          reason    = "",
        }
      }
    }
    {{- end }}

    // =========================================================================
    // AWS log scrapers — CloudWatch Logs → Loki
    // =========================================================================
    // Each block polls a CW Log Group every 1m and writes to Loki with a
    // stable `job` label that the infra-lifecycle / edge-cdn / lambda-services
    // dashboards filter on. IAM permissions live on the EC2 instance profile.

    {{- if .Values.alloy.awsLogs.cloudtrail.enabled }}
    loki.source.awsfirehose "cloudtrail" {
      // Polling adapter (no Firehose required) — name kept for back-compat.
      forward_to = [loki.process.cloudtrail.receiver]
    }
    loki.source.cloudwatch "cloudtrail" {
      region          = "{{ .Values.alloy.awsLogs.region }}"
      log_group_name  = "{{ .Values.alloy.awsLogs.cloudtrail.logGroupName }}"
      poll_interval   = "1m"
      forward_to      = [loki.process.cloudtrail.receiver]
    }
    loki.process "cloudtrail" {
      forward_to = [loki.write.default.receiver]
      stage.json {
        expressions = {
          eventName     = "eventName",
          eventSource   = "eventSource",
          awsRegion     = "awsRegion",
          eventTime     = "eventTime",
          userIdentity  = "userIdentity.type",
        }
      }
      stage.labels {
        values = {
          job          = "cloudtrail",
          eventName    = "",
          eventSource  = "",
        }
      }
    }
    {{- end }}

    {{- if .Values.alloy.awsLogs.ssmAutomation.enabled }}
    loki.source.cloudwatch "ssm_automation" {
      region          = "{{ .Values.alloy.awsLogs.region }}"
      log_group_name  = "{{ .Values.alloy.awsLogs.ssmAutomation.logGroupName }}"
      poll_interval   = "30s"
      forward_to      = [loki.process.ssm_automation.receiver]
    }
    loki.process "ssm_automation" {
      forward_to = [loki.write.default.receiver]
      stage.static_labels {
        values = { job = "ssm-automation" }
      }
      // SM-A boot scripts emit `[boot]` / `[control_plane]` / `[worker]`
      // prefixes — extract them as a `step` label so panels can group.
      stage.regex {
        expression = "\\[(?P<step>boot|control_plane|worker|kubeadm)\\]"
      }
      stage.labels {
        values = { step = "" }
      }
    }
    {{- end }}

    {{- if .Values.alloy.awsLogs.cloudfrontLogs.enabled }}
    // CloudFront standard logs ship to S3 — Alloy polls the bucket prefix.
    // For realtime logs (Kinesis), swap this for loki.source.kinesis_firehose.
    loki.source.aws_s3 "cloudfront" {
      bucket          = "{{ .Values.alloy.awsLogs.cloudfrontLogs.bucket }}"
      key_prefix      = "{{ .Values.alloy.awsLogs.cloudfrontLogs.prefix }}"
      region          = "{{ .Values.alloy.awsLogs.region }}"
      forward_to      = [loki.process.cloudfront.receiver]
    }
    loki.process "cloudfront" {
      forward_to = [loki.write.default.receiver]
      stage.static_labels {
        values = { job = "cloudfront-logs" }
      }
      // CF logs are TSV — extract status, edge-result, and origin-latency.
      stage.regex {
        expression = "(?P<date>\\S+)\\s+(?P<time>\\S+)\\s+(?P<edge>\\S+)\\s+(?P<bytes>\\S+)\\s+(?P<client_ip>\\S+)\\s+(?P<method>\\S+)\\s+(?P<host>\\S+)\\s+(?P<uri>\\S+)\\s+(?P<status>\\d+)\\s+(?P<referer>\\S+)\\s+(?P<ua>\\S+)"
      }
      stage.labels {
        values = { status = "", edge = "", method = "" }
      }
    }
    {{- end }}

    {{- if .Values.alloy.awsLogs.lambdaLogs.enabled }}
    // Discover every /aws/lambda/* log group at startup. New Functions are
    // picked up on Alloy restart — acceptable for our deploy cadence.
    loki.source.cloudwatch "lambda_all" {
      region                = "{{ .Values.alloy.awsLogs.region }}"
      log_group_name_prefix = "{{ .Values.alloy.awsLogs.lambdaLogs.logGroupPrefix }}"
      poll_interval         = "30s"
      forward_to            = [loki.process.lambda_all.receiver]
    }
    loki.process "lambda_all" {
      forward_to = [loki.write.default.receiver]
      stage.static_labels {
        values = { job = "cloudwatch" }
      }
      // Surface the Lambda function name as a label so panels can filter.
      stage.regex {
        expression = "/aws/lambda/(?P<function>[^\\s]+)"
        source     = "__path__"
      }
      stage.labels {
        values = { function = "" }
      }
    }
    {{- end }}
