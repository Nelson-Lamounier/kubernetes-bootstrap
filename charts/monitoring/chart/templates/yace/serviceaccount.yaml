{{- if .Values.yace.enabled }}
# ServiceAccount for YACE (yet-another-cloudwatch-exporter).
# AWS credentials come from EKS Pod Identity — the association
# monitoring/yace -> yace CloudWatch-read role is defined in tucaken-infra
# EksPodIdentityStack (purpose: 'yace'). No IRSA annotation, no static keys.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: yace
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring.fullLabels" "yace" | nindent 4 }}
{{- end }}
