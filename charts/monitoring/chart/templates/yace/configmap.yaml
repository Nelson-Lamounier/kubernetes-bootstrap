{{- if .Values.yace.enabled }}
# YACE config — discovers AWS resources by tag (resourcegroupstaggingapi) and
# pulls their CloudWatch metrics via GetMetricData, re-exposing them as
# aws_<service>_* Prometheus series. Tag-based discovery means a rename or a new
# resource is picked up automatically — no hardcoded identifiers (the failure
# that broke the old Grafana CloudWatch panels for both RDS and the ALB).
#
# Two discovery jobs:
#   - AWS/RDS            -> aws_rds_*             (platform Postgres)
#   - AWS/ApplicationELB -> aws_applicationelb_*  (public ingress ALB + target
#                                                  groups; feeds the Networking
#                                                  dashboard's edge + Faro rows)
#
# period/length {{ .Values.yace.period }}s matches the scrape economics in
# docs/projects/rds-observability-yace-migration.md (~$2/mo at 300s). Statistics
# are Average for gauges, Sum for counters, p95 for the ALB latency SLO.
apiVersion: v1
kind: ConfigMap
metadata:
  name: yace-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring.fullLabels" "yace" | nindent 4 }}
data:
  config.yaml: |
    apiVersion: v1alpha1
    sts-region: {{ .Values.yace.region }}
    discovery:
      exportedTagsOnMetrics:
        AWS/RDS:
          - Name
        AWS/ApplicationELB:
          - ingress.k8s.aws/stack
      jobs:
        - type: AWS/RDS
          regions:
            - {{ .Values.yace.region }}
          period: {{ .Values.yace.period }}
          length: {{ .Values.yace.period }}
          # searchTags empty => all RDS instances in the region. The platform
          # DB is the only one in this account; narrow with a tag here if that
          # changes.
          searchTags: []
          metrics:
            # ── instance health ──────────────────────────────────────────
            - name: CPUUtilization
              statistics: [Average]
            - name: DatabaseConnections
              statistics: [Average]
            - name: FreeableMemory
              statistics: [Average]
            - name: FreeStorageSpace
              statistics: [Average]
            - name: ReadIOPS
              statistics: [Average]
            - name: WriteIOPS
              statistics: [Average]
            - name: ReadLatency
              statistics: [Average]
            - name: WriteLatency
              statistics: [Average]
            # ── compute & burst credits ──────────────────────────────────
            - name: CPUCreditBalance
              statistics: [Average]
            - name: CPUCreditUsage
              statistics: [Average]
            - name: SwapUsage
              statistics: [Average]
            - name: BurstBalance
              statistics: [Average]
            - name: EBSIOBalance%
              statistics: [Average]
            - name: EBSByteBalance%
              statistics: [Average]
            # ── throughput & network ─────────────────────────────────────
            - name: NetworkReceiveThroughput
              statistics: [Average]
            - name: NetworkTransmitThroughput
              statistics: [Average]
            - name: ReadThroughput
              statistics: [Average]
            - name: WriteThroughput
              statistics: [Average]
            - name: DiskQueueDepth
              statistics: [Average]
            - name: TransactionLogsGeneration
              statistics: [Average]
            # ── DB load (Performance Insights) ───────────────────────────
            - name: DBLoad
              statistics: [Average]
            - name: DBLoadCPU
              statistics: [Average]
            - name: DBLoadNonCPU
              statistics: [Average]
            - name: MaximumUsedTransactionIDs
              statistics: [Maximum]
            # ── connection failures ──────────────────────────────────────
            - name: IamDbAuthConnectionFailure
              statistics: [Sum]
            - name: IamDbAuthConnectionSuccess
              statistics: [Sum]
        # ── Application Load Balancer — public ingress edge ──────────────────
        # Discovered by the AWS LB Controller tags on the ALB (searchTags empty
        # => every ALB in the region; there is one public ALB in this account).
        # Metrics exist at two dimension levels: LoadBalancer only, and
        # LoadBalancer+TargetGroup. dimensionNameRequirements is left empty so
        # YACE fans out both — the Networking dashboard selects the LB level with
        # {dimension_TargetGroup=""} and a per-target-group level with
        # {dimension_TargetGroup=~"..."}, mirroring the RDS dimension pattern.
        - type: AWS/ApplicationELB
          regions:
            - {{ .Values.yace.region }}
          period: {{ .Values.yace.period }}
          length: {{ .Values.yace.period }}
          searchTags: []
          metrics:
            # ── request volume, latency, HTTP codes (LB + per-target-group) ──
            - name: RequestCount
              statistics: [Sum]
            - name: TargetResponseTime
              statistics: [Average, p95]
            - name: HTTPCode_Target_2XX_Count
              statistics: [Sum]
            - name: HTTPCode_Target_4XX_Count
              statistics: [Sum]
            - name: HTTPCode_Target_5XX_Count
              statistics: [Sum]
            # ── connection health (LB level) ─────────────────────────────────
            - name: ActiveConnectionCount
              statistics: [Sum]
            - name: NewConnectionCount
              statistics: [Sum]
            - name: RejectedConnectionCount
              statistics: [Sum]
            - name: TargetConnectionErrorCount
              statistics: [Sum]
            - name: HTTPCode_ELB_5XX_Count
              statistics: [Sum]
            # ── target-group host health (per-target-group) ──────────────────
            - name: HealthyHostCount
              statistics: [Average]
            - name: UnHealthyHostCount
              statistics: [Average]
{{- end }}
