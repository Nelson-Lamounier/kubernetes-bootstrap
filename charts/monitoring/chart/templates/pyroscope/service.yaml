{{- if .Values.pyroscope.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "pyroscope" | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "monitoring.selectorLabels" "pyroscope" | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.pyroscope.service.httpPort }}
      targetPort: {{ .Values.pyroscope.service.httpPort }}
      protocol: TCP
{{- end }}
