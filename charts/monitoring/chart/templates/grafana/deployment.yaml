apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{.Values.namespace}}
  labels: {{- include "monitoring.fullLabels" "grafana" | nindent 4}}
spec:
  replicas: {{.Values.grafana.replicas}}
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      {{- include "monitoring.selectorLabels" "grafana" | nindent 6}}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/grafana/configmap.yaml") . | sha256sum }}
      labels: {{- include "monitoring.fullLabels" "grafana" | nindent 8}}
    spec:
      serviceAccountName: grafana
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      nodeSelector: {{- toYaml .Values.nodeSelector | nindent 8}}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: grafana
          image: {{.Values.grafana.image}}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-password
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_SERVER_ROOT_URL
              value: "https://{{ .Values.adminAccess.hostname }}/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            # --- Disable broken preinstalled "Drilldown" app plugins ---
            # grafana-lokiexplore-app (Logs Drilldown) auto-updates from the
            # catalog to a React-19 build that needs the host to expose
            # `react/jsx-runtime`. Grafana 11.6 under a sub-path 404s that
            # module, so the app's preload throws during page bootstrap and
            # intermittently breaks dashboards that trip it (panels never issue
            # queries). We don't use these apps; stop auto-installing them and
            # disable loading the broken one.
            - name: GF_PLUGINS_PREINSTALL_DISABLED
              value: "true"
            - name: GF_PLUGINS_DISABLE_PLUGINS
              value: "grafana-lokiexplore-app"
            # --- Session and Auth Hardening ---
            - name: GF_AUTH_LOGIN_MAXIMUM_INACTIVE_LIFETIME_DURATION
              value: "30m"
            - name: GF_AUTH_LOGIN_MAXIMUM_LIFETIME_DURATION
              value: "12h"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            # --- RDS PostgreSQL datasource password (interpolated in datasources.yaml) ---
            - name: GRAFANA_RDS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-rds-credentials
                  key: password
            # --- SNS region for alerting ---
            - name: AWS_REGION
              value: "{{ .Values.grafana.alerting.awsRegion }}"
            # --- Unified Alerting ---
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "true"
            # External labels appended to EVERY Grafana-managed alert rule
            # (rendered on the data source side, so we don't have to edit
            # 12 individual rule blocks). The `environment` label is the
            # routing key the Alertmanager dev-blackhole matcher uses
            # (charts/monitoring/chart/templates/alertmanager/configmap.yaml):
            #   - dev cluster   (environment=development) → blackhole → 0 SNS emails
            #   - prod cluster  (environment=production)  → severity routing → SNS pages
            # Same chart, different .Values.environment — production-ready by design.
            - name: GF_UNIFIED_ALERTING_EXTERNAL_LABELS
              value: "environment={{ .Values.environment }}"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: alerting
              mountPath: /etc/grafana/provisioning/alerting
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources: {{- toYaml .Values.grafana.resources | nindent 12}}
          readinessProbe:
            httpGet:
              path: /grafana/api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /grafana/api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: alerting
          configMap:
            name: grafana-alerting
        - name: dashboards
          projected:
            sources:
            {{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
              - configMap:
                  name: grafana-dashboards-{{ trimSuffix ".json" (base $path) }}
            {{- end }}
