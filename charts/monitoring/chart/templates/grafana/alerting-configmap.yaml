apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "grafana" | nindent 4 }}
data:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
{{- if .Values.grafana.alerting.snsTopicArn }}
      - orgId: 1
        name: sns
        receivers:
          - uid: sns-receiver
            type: sns
            settings:
              topic_arn: "{{ .Values.grafana.alerting.snsTopicArn }}"
              region: "{{ .Values.grafana.alerting.awsRegion }}"
            disableResolveMessage: false
{{- else }}
      []
{{- end }}

  # Mute timing that silences non-critical (warning) notifications 24/7.
  # Warnings stay visible in the Grafana Alerting UI but are NOT delivered to
  # the SNS/email contact point. To route warnings to a real channel later
  # (e.g. Slack), add that contact point and drop the mute_time_intervals
  # reference on the warning route in policies.yaml below.
  mutetimes.yaml: |
    apiVersion: 1
    muteTimes:
      - orgId: 1
        name: mute-warnings
        time_intervals:
          - times:
              - start_time: '00:00'
                end_time: '24:00'

  policies.yaml: |
    apiVersion: 1
    policies:
{{- if .Values.grafana.alerting.snsTopicArn }}
      - orgId: 1
        receiver: sns
        group_by:
          - grafana_folder
          - alertname
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - receiver: sns
            matchers:
              - severity = critical
            continue: false
          # Warnings are muted 24/7 (see mutetimes.yaml) so they never email.
          # They remain visible in the Grafana Alerting UI for triage.
          - receiver: sns
            matchers:
              - severity = warning
            continue: false
            mute_time_intervals:
              - mute-warnings
{{- else }}
      []
{{- end }}

  rules.yaml: |
    apiVersion: 1
    # deleteRules tombstones: Grafana file provisioning UPSERTS rules and never
    # deletes ones removed from the files — a rule removed from `groups` lingers
    # in Grafana's DB (provenance=file), so the admin API also refuses to delete
    # it (409 provenanceMismatch). The only code-driven way to remove a
    # provisioned rule is to list its UID here. Keep these entries permanently
    # (idempotent no-ops once deleted). Added 2026-07-01 for the DynamoDB rules
    # dropped when the workload migrated to RDS.
    deleteRules:
      - orgId: 1
        uid: alert-dynamodb-error-rate
      - orgId: 1
        uid: alert-dynamodb-latency
    groups:
      - orgId: 1
        name: Cluster Health
        folder: Infrastructure Alerts
        interval: 1m
        rules:
          - uid: alert-node-down
            title: Node Down
            condition: C
            # Key on node READINESS, not the node-exporter scrape `up`. A
            # Karpenter-consolidated node drains while still Ready and then its
            # kube_node_status_condition series simply disappears — so it never
            # trips this rule (noDataState: OK resolves the vanished instance).
            # The old `up{job="node-exporter"} == 0` fired for ~2 min on every
            # scale-down (target unreachable before service-discovery dropped it),
            # then self-resolved via MissingSeries — pure node-churn alert spam.
            # Now only a node that EXISTS and stays NotReady for 5m pages.
            noDataState: OK
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  # Only ESTABLISHED nodes. A freshly-provisioned Karpenter node
                  # is legitimately NotReady for several minutes while it boots,
                  # registers with the kubelet and the CNI comes up — keying on
                  # readiness alone (the previous fix) still tripped on that window
                  # and then resolved via MissingSeries when the node became Ready
                  # or was consolidated. The `and on(node) time()-kube_node_created
                  # > 900` guard drops any node younger than 15 min from the query
                  # entirely, so provisioning churn never fires; only a node that
                  # has existed >15 min and then goes NotReady (for: 5m) pages.
                  expr: kube_node_status_condition{condition="Ready",status="true"} and on(node) (time() - kube_node_created > 900)
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: lt
                        params: [1]
                  refId: C
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ "{{$labels.node}}" }} is NotReady"
              description: "A Kubernetes node has been NotReady for more than 5 minutes (node still exists — not a scale-down). Check the node and its kubelet."

          - uid: alert-high-cpu
            title: High Node CPU Usage
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [85]
                  refId: C
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on {{ "{{$labels.instance}}" }}"
              description: "CPU usage is above 85% for more than 5 minutes."

          - uid: alert-high-memory
            title: High Node Memory Usage
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [85]
                  refId: C
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ "{{$labels.instance}}" }}"
              description: "Memory usage is above 85% for more than 5 minutes."

          - uid: alert-pod-crashloop
            title: Pod CrashLooping
            condition: C
            # Absence of the series == no crashlooping pods == healthy, not NoData.
            noDataState: OK
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: prometheus
                model:
                  # `sum by (...)` preserves labels through the expression
                  # pipeline. Previous form used `reducer: last` over a
                  # bare increase() expression, which stripped labels and
                  # rendered annotations as "Pod [no value]/[no value] is
                  # crash-looping" — the rule sat in NoData forever and
                  # real crashloops slipped through silently.
                  expr: |
                    sum by (namespace, pod, container) (
                      increase(kube_pod_container_status_restarts_total[15m])
                    ) > 3
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
                  refId: C
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ "{{$labels.namespace}}" }}/{{ "{{$labels.pod}}" }} is crash-looping"
              description: "Container {{ "{{$labels.container}}" }} has restarted more than 3 times in 15 minutes."

          - uid: alert-pod-not-ready
            title: Pod Not Ready
            condition: C
            noDataState: OK
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  # Filters that prevent paging on legitimately non-Ready pods:
                  #   * `unless` Succeeded/Failed phase — completed Job/CronJob
                  #     pods report ready=false until garbage-collected; those
                  #     are not failures.
                  #   * `unless` owner_kind="Job" — defence in depth for Jobs
                  #     that haven't yet flipped to Succeeded/Failed phase.
                  # The bare `kube_pod_status_ready{condition="true"} == 0`
                  # was paging on every overnight migration/cronjob completion,
                  # producing 70+ SNS emails/day on the dev cluster.
                  expr: |
                    (kube_pod_status_ready{condition="true"} == 0)
                      unless on(namespace, pod) (kube_pod_status_phase{phase=~"Succeeded|Failed"} == 1)
                      unless on(namespace, pod) (kube_pod_owner{owner_kind="Job"} == 1)
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: lt
                        params: [1]
                  refId: C
            # 15m absorbs Karpenter node consolidation, image pulls, and
            # rolling updates without paging — long-lived not-ready pods
            # past this window are genuine failures worth a notification.
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ "{{$labels.namespace}}" }}/{{ "{{$labels.pod}}" }} is not ready"
              description: "Pod has been in a non-ready state for more than 15 minutes (Job/CronJob completions excluded)."

          # ─────────────────────────────────────────────────────────────
          # Job Failed — terminal-state alert for batch workloads
          #
          # Closes the largest signal gap in the cluster. Over the last
          # 14 days 60+ Jobs hit BackoffLimitExceeded / DeadlineExceeded
          # (incl. platform-rds-bootstrap, migration-024-once, two
          # ecr-token-refresh runs, headlamp/token-pusher) and no rule
          # caught them — the only signal was Pod Not Ready cycling
          # through the backoff retries, producing 5-10 false-positive
          # emails per failed Job. kube_job_failed reports once when the
          # Job reaches terminal failure, so this fires exactly once per
          # incident.
          # ─────────────────────────────────────────────────────────────
          - uid: alert-job-failed
            title: Job Failed
            condition: C
            noDataState: OK
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  # Exclude rag-eval: a weekly, non-production quality eval whose
                  # failure is a signal to look at eval quality, not a cluster
                  # incident — it should never page critical. Real batch failures
                  # (migrations, reconcilers, bootstrap) still fire.
                  expr: kube_job_failed{condition="true", job_name!~"rag-eval.*"} == 1
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
                  refId: C
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "Job {{ "{{$labels.namespace}}" }}/{{ "{{$labels.job_name}}" }} failed"
              description: "Kubernetes Job reached terminal failure (BackoffLimitExceeded or DeadlineExceeded). Inspect pod logs before TTL clean-up."

          # ─────────────────────────────────────────────────────────────
          # Pod Stuck Pending — scheduling deadlock catcher
          #
          # The pushgateway AZ deadlock (2026-05-15..18) sat Pending for
          # 3d7h with no signal. A pod stuck Pending past 10m means the
          # scheduler can't satisfy constraints (zonal EBS mismatch,
          # nodeSelector with no matching node, resource quota, etc.).
          # Exclude Job-owned pods — they can legitimately be Pending
          # during scale-up to new Karpenter nodes.
          # ─────────────────────────────────────────────────────────────
          - uid: alert-pod-pending-stuck
            title: Pod Stuck Pending
            condition: C
            noDataState: OK
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: |
                    (kube_pod_status_phase{phase="Pending"} == 1)
                      unless on(namespace, pod) (kube_pod_owner{owner_kind="Job"} == 1)
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
                  refId: C
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ "{{$labels.namespace}}" }}/{{ "{{$labels.pod}}" }} stuck Pending"
              description: "Pod has been Pending for 10+ minutes — check scheduler/Karpenter events for unsatisfiable constraints (AZ, taints, resources)."

          # ─────────────────────────────────────────────────────────────
          # Image Pull Failure — fires on ImagePullBackOff / ErrImagePull
          #
          # Catches downstream effects of ECR token refresh failures
          # (ecr-token-refresh Job has failed twice in 14d) and bad image
          # tags before they cascade into Deployment unavailability.
          # ─────────────────────────────────────────────────────────────
          - uid: alert-image-pull-failure
            title: Image Pull Failure
            condition: C
            # No ImagePullBackOff/ErrImagePull series == no failures == healthy.
            noDataState: OK
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: |
                    kube_pod_container_status_waiting_reason{reason=~"ImagePullBackOff|ErrImagePull"} == 1
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
                  refId: C
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ "{{$labels.namespace}}" }}/{{ "{{$labels.pod}}" }} cannot pull image"
              description: "Container {{ "{{$labels.container}}" }} is in {{ "{{$labels.reason}}" }} — check image tag, registry credentials, and ECR token refresh."

      - orgId: 1
        name: Application Health
        folder: Infrastructure Alerts
        interval: 1m
        rules:
          - uid: alert-high-error-rate
            title: High Application Error Rate
            condition: C
            # Ratio query yields NoData when there is zero traffic (0/0) — that
            # is not an error condition, so do not alert on NoData.
            noDataState: OK
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: (sum(rate(http_requests_total{code=~"5.."}[5m])) / sum(rate(http_requests_total[5m]))) * 100
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [5]
                  refId: C
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Application error rate exceeds 5%"
              description: "More than 5% of HTTP requests are returning 5xx errors for over 5 minutes."

          - uid: alert-high-latency
            title: High Application Latency (P95)
            condition: C
            # No request-duration series when there is no traffic — not a fault.
            noDataState: OK
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [2]
                  refId: C
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Application P95 latency exceeds 2 seconds"
              description: "The 95th percentile HTTP request latency is above 2s for more than 5 minutes."

          # A Job Strategist analyse/coach pipeline run failed. These runs invoke
          # Bedrock (Sonnet) — a failure means wasted spend + a user with no result.
          # Fires immediately (for: 0m) on any failure in the last 10m → SNS.
          - uid: alert-strategist-run-failed
            title: Job Strategist pipeline run failed
            condition: C
            # No failed-run counter increase == no failures == healthy.
            noDataState: OK
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  # 'by (operation)' preserves a label — the auth-proxy 403s on a
                  # fully label-stripped sum(). Fires per operation (analyse/coach).
                  expr: sum by (operation) (increase(job_strategist_runs_total{outcome="failed"}[10m]))
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
                  refId: C
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Job Strategist {{ "{{ $labels.operation }}" }} run failed"
              description: "A job-strategist {{ "{{ $labels.operation }}" }} pipeline run failed in the last 10 minutes (job_strategist_runs_total{outcome=\"failed\"}). Inspect pipeline_runs.error_message and the job-strategist pod logs."

      - orgId: 1
        name: Storage Health
        folder: Infrastructure Alerts
        interval: 1m
        rules:
          - uid: alert-disk-space-low
            title: Disk Space Low
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [80]
                  refId: C
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Disk space above 80% on {{ "{{$labels.instance}}" }}"
              description: "Filesystem {{ "{{$labels.mountpoint}}" }} is {{ "{{$labels.instance}}" }} above 80% usage."

          - uid: alert-disk-space-critical
            title: Disk Space Critical
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [90]
                  refId: C
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "CRITICAL: Disk space above 90% on {{ "{{$labels.instance}}" }}"
              description: "Filesystem {{ "{{$labels.mountpoint}}" }} on {{ "{{$labels.instance}}" }} is above 90% — immediate action required."

          # ---------------------------------------------------------------
          # Tracing Alerts
          # ---------------------------------------------------------------
          # NOTE: the DynamoDB error-rate/latency alerts were removed 2026-07-01.
          # The workload migrated from DynamoDB to RDS/Postgres, so the
          # traces_spanmetrics_*{db_system="dynamodb"} series no longer exist.
          # The rules therefore sat permanently in NoData and — because
          # noDataState defaulted to NoData — fired a false "DynamoDB" alert
          # through the SNS contact point, emailing on every evaluation.
          # RDS instance health is covered via CloudWatch (see database.json).
          - uid: alert-span-ingestion-down
            title: Span Ingestion Stopped
            condition: C
            # NoData here is the signal: zero spans ingested == pipeline down.
            noDataState: Alerting
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: sum(rate(traces_spanmetrics_calls_total[5m]))
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: lt
                        params: [0.001]
                  refId: C
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "No spans ingested for 10 minutes"
              description: "Span ingestion rate is near zero — check OTel SDK, Tempo, or network connectivity."
