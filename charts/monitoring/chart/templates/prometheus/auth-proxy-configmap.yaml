{{- if .Values.prometheus.ingress.enabled }}
# Rendered separately from the prometheus-auth-proxy-nginx consumers so the Deployment's
# checksum/config annotation can hash THIS file without self-recursion.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-auth-proxy-nginx
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "prometheus" | nindent 4 }}
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8080;

        # ALB health check — unauthenticated passthrough
        location = /-/healthy {
          proxy_pass http://prometheus.{{ .Values.namespace }}.svc.cluster.local:9090/prometheus/-/healthy;
        }

        # External dead-man's-switch probe (Route53 health check via the
        # public ALB — EksDeadmanStack in tucaken-infra). Exact-match, so
        # it takes precedence over the authenticated /prometheus/ prefix
        # below. Liveness-only: proxies Prometheus's own /-/healthy and
        # exposes no metric data. Without this the external path returned
        # nginx's 401 regardless of Prometheus health, which is why the
        # 2026-07-17 22h crashloop was invisible from outside.
        location = /prometheus/-/healthy {
          proxy_pass http://prometheus.{{ .Values.namespace }}.svc.cluster.local:9090/prometheus/-/healthy;
        }

        # All Prometheus UI + API paths — basic auth required
        location /prometheus/ {
          auth_basic           "Prometheus";
          auth_basic_user_file /etc/nginx/htpasswd;
          proxy_pass           http://prometheus.{{ .Values.namespace }}.svc.cluster.local:9090;
          proxy_set_header     Host             $host;
          proxy_set_header     X-Real-IP        $remote_addr;
          proxy_set_header     X-Forwarded-For  $proxy_add_x_forwarded_for;
          proxy_set_header     X-Forwarded-Proto https;
        }
      }
    }
{{- end }}
