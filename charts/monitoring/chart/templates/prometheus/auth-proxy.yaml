{{- if .Values.prometheus.ingress.enabled }}
# nginx auth proxy — sits between the ALB and Prometheus.
#
# The ALB Ingress (ingressroute.yaml) points to this proxy on port 8080.
# All /prometheus/* requests require HTTP Basic Auth via the
# prometheus-basic-auth-secret (htpasswd-format value from SSM).
# The /-/healthy path is passed through unauthenticated so the ALB
# target health check succeeds without credentials.
#
# Internal cluster traffic (Grafana datasource, Prometheus self-scrape)
# continues to hit prometheus:9090 directly — no auth required there.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-auth-proxy-nginx
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "prometheus" | nindent 4 }}
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8080;

        # ALB health check — unauthenticated passthrough
        location = /-/healthy {
          proxy_pass http://prometheus.{{ .Values.namespace }}.svc.cluster.local:9090/prometheus/-/healthy;
        }

        # External dead-man's-switch probe (Route53 health check via the
        # public ALB — EksDeadmanStack in tucaken-infra). Exact-match, so
        # it takes precedence over the authenticated /prometheus/ prefix
        # below. Liveness-only: proxies Prometheus's own /-/healthy and
        # exposes no metric data. Without this the external path returned
        # nginx's 401 regardless of Prometheus health, which is why the
        # 2026-07-17 22h crashloop was invisible from outside.
        location = /prometheus/-/healthy {
          proxy_pass http://prometheus.{{ .Values.namespace }}.svc.cluster.local:9090/prometheus/-/healthy;
        }

        # All Prometheus UI + API paths — basic auth required
        location /prometheus/ {
          auth_basic           "Prometheus";
          auth_basic_user_file /etc/nginx/htpasswd;
          proxy_pass           http://prometheus.{{ .Values.namespace }}.svc.cluster.local:9090;
          proxy_set_header     Host             $host;
          proxy_set_header     X-Real-IP        $remote_addr;
          proxy_set_header     X-Forwarded-For  $proxy_add_x_forwarded_for;
          proxy_set_header     X-Forwarded-Proto https;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-auth-proxy
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "prometheus" | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-auth-proxy
  template:
    metadata:
      labels:
        app: prometheus-auth-proxy
    spec:
      # Run nginx as its unprivileged uid (101). Listen port is already 8080
      # (unprivileged); pid file and cache dirs move to emptyDirs so the root
      # filesystem stays read-only. This container terminates internet
      # traffic behind the ALB — it should not run as root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: htpasswd
              mountPath: /etc/nginx/htpasswd
              subPath: users
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /run
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: prometheus-auth-proxy-nginx
        - name: htpasswd
          secret:
            secretName: prometheus-basic-auth-secret
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-auth-proxy
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "prometheus" | nindent 4 }}
spec:
  selector:
    app: prometheus-auth-proxy
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
