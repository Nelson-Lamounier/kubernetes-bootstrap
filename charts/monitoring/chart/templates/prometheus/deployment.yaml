apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{.Values.namespace}}
  labels: {{- include "monitoring.fullLabels" "prometheus" | nindent 4}}
spec:
  replicas: {{.Values.prometheus.replicas}}
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      {{- include "monitoring.selectorLabels" "prometheus" | nindent 6}}
  template:
    metadata:
      # No checksum/config or checksum/rules annotations on purpose: they rolled
      # the pod on every config/rule edit, and Prometheus' WAL replay takes
      # minutes (and OOM-risked the pod). The config + projected-rules ConfigMaps
      # are mounted without subPath, so kubelet updates the files in place; the
      # configmap-reload sidecar watches them and POSTs /-/reload, giving a hot
      # reload with no restart and no WAL replay.
      labels: {{- include "monitoring.fullLabels" "prometheus" | nindent 8}}
    spec:
      serviceAccountName: prometheus
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsNonRoot: true
      nodeSelector: {{- toYaml .Values.nodeSelector | nindent 8}}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Spread prometheus replicas across nodes to prevent both pods
      # landing on the same node after a restart or rolling update.
      # ScheduleAnyway is used (not DoNotSchedule) so scheduling is never
      # hard-blocked on a 2-node cluster where maxSkew may already be violated.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "monitoring.selectorLabels" "prometheus" | nindent 14}}
      containers:
        - name: prometheus
          image: {{.Values.prometheus.image}}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.prometheus.retention }}"
            - "--storage.tsdb.retention.size={{ .Values.prometheus.retentionSize }}"
            - "--web.enable-lifecycle"
            - "--web.external-url=/prometheus"
            - "--web.enable-remote-write-receiver"
            - "--enable-feature=exemplar-storage,native-histograms"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
            - name: nextjs-metrics-token
              mountPath: /etc/prometheus/secrets/nextjs-metrics-token
              readOnly: true
          resources: {{- toYaml .Values.prometheus.resources | nindent 12}}
          readinessProbe:
            httpGet:
              path: /prometheus/-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /prometheus/-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
        # ── configmap-reload sidecar ────────────────────────────────────────
        # Watches the mounted config + rules dirs; on change it POSTs Prometheus'
        # /-/reload (enabled via --web.enable-lifecycle). This replaces the
        # checksum-annotation rollout: a rule/config edit now hot-reloads with no
        # pod restart and no WAL replay.
        - name: configmap-reload
          image: {{ .Values.prometheus.reloadSidecarImage }}
          args:
            - "--volume-dir=/etc/prometheus"
            - "--volume-dir=/etc/prometheus/rules"
            - "--webhook-url=http://127.0.0.1:9090/prometheus/-/reload"
            - "--webhook-method=POST"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: rules
              mountPath: /etc/prometheus/rules
              readOnly: true
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 20m
              memory: 32Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          projected:
            sources:
              - configMap:
                  name: prometheus-rules
                  optional: true
              - configMap:
                  name: prometheus-rules-cost
                  optional: true
              - configMap:
                  name: prometheus-rules-dora
                  optional: true
              - configMap:
                  name: prometheus-rules-infra
                  optional: true
              - configMap:
                  name: prometheus-rules-observability
                  optional: true
        - name: nextjs-metrics-token
          secret:
            secretName: nextjs-metrics-token
            optional: true
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
