{{- if .Values.infra.alertsEnabled }}
# ---------------------------------------------------------------------------
# Infrastructure alerting rules — pod readiness, health probes, secrets.
#
# These alerts complement SLO burn-rate alerts (rules-configmap.yaml) with
# lower-level signals: unhealthy pods, sustained probe failures, etc.
# Rendered into /etc/prometheus/rules/infra.yml inside the prometheus pod.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules-infra
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "prometheus" | nindent 4 }}
data:
  infra.yml: |
    groups:
      - name: infra:readiness
        rules:
          # admin-api sustained readyz failure — indicates DB (pgbouncer → RDS)
          # connectivity loss. /livez passes but /readyz returns 503.
          # Fires after 5 minutes to avoid alerting on transient probe failures.
          - alert: AdminApiNotReady
            expr: |
              kube_pod_container_status_ready{
                namespace="admin-api",
                container="admin-api"
              } == 0
            for: 5m
            labels:
              severity: critical
              service:  admin-api
              team:     platform
            annotations:
              summary: "admin-api pod not ready for > 5 minutes"
              description: >
                admin-api /readyz is returning non-2xx. The pod is alive (livez OK)
                but its DB readiness check is failing. Check pgbouncer connectivity:
                kubectl logs -n platform -l app=pgbouncer --tail=100

          # tucaken-app readyz failure — SSR pod unhealthy
          - alert: TucakenAppNotReady
            expr: |
              kube_pod_container_status_ready{
                namespace="tucaken-app",
                container="tucaken-app"
              } == 0
            for: 5m
            labels:
              severity: critical
              service:  tucaken-app
              team:     platform
            annotations:
              summary: "tucaken-app pod not ready for > 5 minutes"
              description: >
                tucaken-app /readyz is returning non-2xx. Check pod logs:
                kubectl logs -n tucaken-app -l app.kubernetes.io/name=tucaken-app --tail=100

      - name: infra:karpenter
        rules:
          # Karpenter controller completely down — node provisioning and termination
          # are paused. NodeClaims with karpenter.sh/termination finalizers will
          # accumulate as etcd ghosts until the controller is restored.
          # Root cause pattern: dev-shutdown scaled karpenter namespace;
          # dev-start did not restore replicas.
          - alert: KarpenterControllerDown
            expr: |
              kube_deployment_status_replicas_ready{
                namespace="karpenter",
                deployment="karpenter"
              } == 0
            for: 2m
            labels:
              severity: critical
              service:  karpenter
              team:     platform
            annotations:
              summary: "Karpenter controller has 0 ready replicas"
              description: >
                Karpenter deployment has no ready pods for > 2 minutes.
                Node provisioning and termination are completely paused.
                NodeClaims with pending finalizers will accumulate in etcd.
                Fix: kubectl scale deploy karpenter -n karpenter --replicas=2
                Or run: just dev-start (which now restores replicas automatically).

          # Multiple nodes stuck in Unknown for > 30 minutes — proxy signal for
          # Karpenter termination finalizers not being cleared. One Unknown node
          # is tolerated (transient during rolling updates); >1 sustained is
          # always a Karpenter controller availability problem.
          - alert: KarpenterZombieNodesAccumulating
            expr: |
              count(
                kube_node_status_condition{condition="Ready",status="unknown"} == 1
              ) > 1
            for: 30m
            labels:
              severity: warning
              service:  karpenter
              team:     platform
            annotations:
              summary: "{{`{{ $value }}`}} nodes stuck in Ready=Unknown for > 30 minutes"
              description: >
                Multiple nodes have been in Ready=Unknown state for over 30 minutes.
                This indicates Karpenter termination finalizers are not being cleared,
                typically because the Karpenter controller is down or has no AWS credentials.
                Check: kubectl get nodeclaims -o wide
                Check: kubectl get pods -n karpenter

      - name: app:abuse
        rules:
          # admin-api 429 spike — sustained share of responses are rate-limited.
          # Signals bot/credential-stuffing traffic or quota saturation. The
          # app-level per-IP limiter and edge WAF return 429; a high ratio over
          # 10m is abuse or a misbehaving client, not normal usage.
          - alert: AdminApiRateLimitSpike
            expr: |
              sum(rate(http_requests_total{service="admin-api",status_code="429"}[5m]))
              /
              clamp_min(sum(rate(http_requests_total{service="admin-api"}[5m])), 1)
              > 0.05
            for: 10m
            labels:
              severity: warning
              service:  admin-api
              team:     platform
            annotations:
              summary: "admin-api 429 rate > 5% of traffic for > 10 minutes"
              description: >
                More than 5% of admin-api responses are HTTP 429 (rate limited)
                over the last 5m, sustained 10m. Likely bot/abuse or limiter
                saturation. Inspect the edge WAF sampled requests for the rate
                rule and admin-api access logs in Loki for the offending IPs.

          # tucaken-app 429 spike — SSR surface. Auth server functions throw
          # 429 via the token-bucket limiter; same abuse signal.
          - alert: TucakenAppRateLimitSpike
            expr: |
              sum(rate(ssr_requests_total{service="tucaken-app",status_code="429"}[5m]))
              /
              clamp_min(sum(rate(ssr_requests_total{service="tucaken-app"}[5m])), 1)
              > 0.05
            for: 10m
            labels:
              severity: warning
              service:  tucaken-app
              team:     platform
            annotations:
              summary: "tucaken-app 429 rate > 5% of traffic for > 10 minutes"
              description: >
                More than 5% of tucaken-app SSR responses are HTTP 429 over the
                last 5m, sustained 10m. Auth endpoints are being hammered or the
                token-bucket limiter is saturated. Check Loki:
                kubectl logs -n tucaken-app -l app.kubernetes.io/name=tucaken-app
                | grep auth_rate_limited

      # -------------------------------------------------------------------
      # Database — PgBouncer pool health + postgres_exporter liveness.
      # CloudWatch-sourced RDS alarms (CPU credits, memory, storage, disk
      # queue, connections) live with the RDS stack as CloudWatch Alarms —
      # Prometheus cannot see AWS/RDS metrics.
      # -------------------------------------------------------------------
      - name: infra:database
        rules:
          - alert: PgBouncerDown
            expr: |
              max(pgbouncer_up) == 0 or absent(pgbouncer_up)
            for: 2m
            labels:
              severity: critical
              service:  pgbouncer
              team:     platform
            annotations:
              summary: "PgBouncer is down — no pod can reach Postgres"
              description: >
                pgbouncer_up is 0 or the exporter stopped reporting. All DB traffic
                (admin-api, public-api, workers) flows through PgBouncer.
                kubectl -n platform get pods -l app=pgbouncer

          - alert: PgBouncerClientsWaiting
            expr: |
              sum(pgbouncer_pools_client_waiting_connections) > 0
            for: 5m
            labels:
              severity: warning
              service:  pgbouncer
              team:     platform
            annotations:
              summary: "PgBouncer clients waiting for a server connection > 5m"
              description: >
                Clients are queueing because the <=20 server-side pool is fully in
                use — RDS connection pressure or slow queries. Check
                pgbouncer_pools_client_maxwait_seconds and the PI DB-load panel.

          - alert: PgBouncerClientMaxWaitHigh
            expr: |
              max(pgbouncer_pools_client_maxwait_seconds) > 5
            for: 2m
            labels:
              severity: warning
              service:  pgbouncer
              team:     platform
            annotations:
              summary: "PgBouncer client max wait > 5s"
              description: >
                A client has waited over 5 seconds for a pooled connection.

          - alert: PostgresExporterDown
            expr: |
              max(pg_up) == 0 or absent(pg_up)
            for: 10m
            labels:
              severity: warning
              service:  postgres-exporter
              team:     platform
            annotations:
              summary: "postgres_exporter not reporting pg_stat metrics"
              description: >
                pg_up is 0 or absent — the exporter cannot reach Postgres, so
                engine-health metrics (connections by state, cache hit, deadlocks)
                are blind. Usually a stale RDS host/password after a rotation.

          # ── RDS infra alerts — now possible because YACE scrapes AWS/RDS
          # CloudWatch metrics into Prometheus (aws_rds_*). Previously these had
          # no home: a Prometheus rule cannot evaluate a CloudWatch metric.
          # The {dimension_DBInstanceIdentifier!=""} selector picks the single
          # per-instance series (YACE also emits global/EngineName/DatabaseClass).
          - alert: RdsCpuCreditBalanceLow
            expr: |
              min(aws_rds_cpucredit_balance_average{dimension_DBInstanceIdentifier!=""}) < 30
            for: 10m
            labels:
              severity: critical
              service:  rds
              team:     platform
            annotations:
              summary: "RDS CPU credit balance < 30 — burst exhaustion imminent"
              description: >
                The burstable t4g instance is draining CPU credits; at zero it
                throttles to baseline and refuses connections (the failure that
                forced t4g.micro -> small). Check the compute & burst-credit row
                and query load.

          - alert: RdsFreeStorageSpaceLow
            expr: |
              min(aws_rds_free_storage_space_average{dimension_DBInstanceIdentifier!=""}) < 2e9
            for: 5m
            labels:
              severity: critical
              service:  rds
              team:     platform
            annotations:
              summary: "RDS free storage < 2 GB"
              description: >
                Free storage on the 20 GiB gp2 volume is below 2 GB. RDS stops
                accepting writes at zero. Grow allocatedStorage or prune data.

          - alert: RdsFreeableMemoryLow
            expr: |
              min(aws_rds_freeable_memory_average{dimension_DBInstanceIdentifier!=""}) < 128e6
            for: 5m
            labels:
              severity: warning
              service:  rds
              team:     platform
            annotations:
              summary: "RDS freeable memory < 128 MB"
              description: >
                Low freeable memory on the 2 GiB instance drives swap and cache
                eviction. Correlate with SwapUsage and the cache-hit ratio.

          - alert: RdsConnectionsHigh
            expr: |
              max(aws_rds_database_connections_average{dimension_DBInstanceIdentifier!=""}) > 145
            for: 5m
            labels:
              severity: warning
              service:  rds
              team:     platform
            annotations:
              summary: "RDS connections > 145 (~80% of max_connections)"
              description: >
                Approaching the ~181 max_connections ceiling for db.t4g.small.
                PgBouncer should cap this — check for a pool leak or a client
                bypassing the pooler.

          - alert: RdsDiskQueueDepthHigh
            expr: |
              max(aws_rds_disk_queue_depth_average{dimension_DBInstanceIdentifier!=""}) > 5
            for: 10m
            labels:
              severity: warning
              service:  rds
              team:     platform
            annotations:
              summary: "RDS disk queue depth > 5 sustained — storage-bound"
              description: >
                Sustained outstanding IO indicates the gp2 volume is the
                bottleneck. Check EBS IO balance and throughput panels.

          - alert: RdsTransactionIdWraparoundRisk
            expr: |
              max(aws_rds_maximum_used_transaction_ids_maximum{dimension_DBInstanceIdentifier!=""}) > 1.5e9
            for: 10m
            labels:
              severity: critical
              service:  rds
              team:     platform
            annotations:
              summary: "RDS transaction ID age > 1.5 billion — wraparound risk"
              description: >
                Autovacuum is falling behind on freezing; approaching the ~2.1
                billion wraparound ceiling risks a forced read-only shutdown.
                Investigate autovacuum and long-running transactions.

      # ── Cluster networking — VPC CNI IP capacity + ALB edge errors ──────────
      # CNI series come from the aws-node scrape (awscni_*, verified live).
      # ALB series come from YACE (aws_applicationelb_*, AWS/ApplicationELB
      # discovery job) — previously unalertable because a Prometheus rule cannot
      # evaluate a CloudWatch metric. LB-level series carry no TargetGroup, so
      # {dimension_TargetGroup=""} isolates them from the per-target-group fan-out.
      - name: infra:network
        rules:
          - alert: VpcCniIpExhaustion
            expr: |
              count((awscni_total_ip_addresses - awscni_assigned_ip_addresses) <= 0) > 0
            for: 5m
            labels:
              severity: critical
              service:  vpc-cni
              team:     platform
            annotations:
              summary: "A node has exhausted its VPC CNI IP pool"
              description: >
                One or more nodes have zero free ENI IP addresses — new pods on
                that node will hang in ContainerCreating (failed to assign an IP).
                Karpenter should add capacity; if it does not, check the ENI/IP
                limit for the instance type and the IP-pool utilisation panel.
                kubectl get pods -A --field-selector status.phase=Pending

          - alert: VpcCniIpPoolHigh
            expr: |
              max(awscni_assigned_ip_addresses / clamp_min(awscni_total_ip_addresses, 1)) > 0.9
            for: 10m
            labels:
              severity: warning
              service:  vpc-cni
              team:     platform
            annotations:
              summary: "VPC CNI IP-pool utilisation > 90% on a node"
              description: >
                A node is within 10% of IP exhaustion for > 10m. Pod scheduling
                headroom on that node is nearly gone. Correlate with the ENI
                allocated-vs-max and IP-utilisation panels on the Networking
                dashboard.

          - alert: AlbTarget5xxHigh
            expr: |
              sum(aws_applicationelb_httpcode_target_5_xx_count_sum{dimension_TargetGroup=""}) > 10
            for: 5m
            labels:
              severity: warning
              service:  alb
              team:     platform
            annotations:
              summary: "ALB targets returning > 10 5xx per 5m window"
              description: >
                Backends behind the public ALB are erroring. These are
                target-generated 5xx (the app), not the ALB itself. Check the
                HTTP-target-codes panel and the failing workload's logs.

          - alert: AlbElb5xxHigh
            expr: |
              sum(aws_applicationelb_httpcode_elb_5_xx_count_sum{dimension_TargetGroup=""}) > 5
            for: 5m
            labels:
              severity: critical
              service:  alb
              team:     platform
            annotations:
              summary: "ALB is generating 5xx (no healthy targets / capacity)"
              description: >
                ELB-generated 5xx mean the ALB could not route a request — usually
                no healthy targets, target group draining, or connection limits.
                Distinct from target 5xx. Check target-group health and the
                healthy-host-count panel.
{{- end }}
