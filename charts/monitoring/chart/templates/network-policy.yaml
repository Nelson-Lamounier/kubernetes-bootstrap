{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-allow-internal
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector: {}
      ports:
        - port: 9100
          protocol: TCP
    - from:
        - namespaceSelector: {}
      ports:
        - port: 3100
          protocol: TCP
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
        # Pyroscope HTTP — workloads push pprof profiles every 10s.
        - port: 4040
          protocol: TCP
        # Alertmanager HTTP — Prometheus pushes firing alerts; ops UI.
        - port: 9093
          protocol: TCP
        # Pushgateway HTTP — short-lived K8s Jobs push terminal metrics.
        - port: 9091
          protocol: TCP
    # Grafana and Prometheus need ipBlock instead of namespaceSelector
    # because Traefik runs with hostNetwork: true — its traffic comes
    # from the node IP, which doesn't match namespace-based selectors.
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 3000
          protocol: TCP
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 9090
          protocol: TCP
    # Alloy Faro port — receives client-side RUM telemetry via Traefik
    # (hostNetwork), so needs ipBlock like Grafana/Prometheus above.
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 12347
          protocol: TCP
    # faro-proxy (nginx) — ALB target for the public /faro endpoint. The ALB
    # (target-type ip) sends health checks + RUM traffic to the pod on 8080
    # from the ALB ENI, which is neither a pod nor in-namespace, so only the
    # ipBlock rules apply. ENIs live in the VPC, so the VPC CIDR is sufficient.
    # Without this the target reports Target.Timeout and /faro returns 504.
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - port: 8080
          protocol: TCP
{{- end }}
