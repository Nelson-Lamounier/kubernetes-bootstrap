# StorageClass for EBS CSI driver (aws-ebs-csi-driver managed addon).
# Named ebs-sc to distinguish from the legacy in-tree gp2 class.
# All monitoring PVCs reference this class explicitly — no default-class
# annotation to avoid disrupting other cluster workloads.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-sc
  labels: {{- include "monitoring.fullLabels" "prometheus" | nindent 4 }}
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
parameters:
  type: gp3
