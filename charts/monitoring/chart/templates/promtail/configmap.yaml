apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring.fullLabels" "promtail" | nindent 4 }}
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.loki.service.port }}/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - action: replace
            replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
      - job_name: journal
        journal:
          json: false
          max_age: 12h
          path: /var/log/journal
          labels:
            job: systemd-journal
        relabel_configs:
          # Always carry the systemd unit + hostname for filtering.
          - source_labels: [__journal__systemd_unit]
            target_label: unit
          - source_labels: [__journal__hostname]
            target_label: node
          # Tag kernel events distinctly. Loki query pattern:
          #   {job="systemd-journal", stream="kernel"}
          # Drives the "OOM kills + segfaults + NIC drops" panel on
          # node-os.json. Falls through to the generic stream otherwise.
          - source_labels: [__journal__transport]
            regex:          'kernel'
            target_label:   stream
            replacement:    'kernel'
          # journald priority (0..7, syslog levels). 0=emerg, 3=err.
          - source_labels: [__journal_priority]
            target_label:   priority
        pipeline_stages:
          # Cheap label extraction so dashboards can filter without
          # Loki-side `|~`. Each event class becomes its own discrete
          # label (oom_event=present | crash_event=segfault | nic_event=present)
          # so panels can `{job="systemd-journal", oom_event=""}` etc.
          - match:
              selector: '{job="systemd-journal"} |~ "Killed process|oom-kill|Out of memory"'
              stages:
                - labels:
                    oom_event: ""
          - match:
              selector: '{job="systemd-journal"} |~ "segfault at"'
              stages:
                - labels:
                    crash_event: "segfault"
          - match:
              selector: '{job="systemd-journal"} |~ "NIC Link is Down|carrier lost"'
              stages:
                - labels:
                    nic_event: ""
