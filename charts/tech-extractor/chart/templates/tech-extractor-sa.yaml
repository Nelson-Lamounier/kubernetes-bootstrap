# @format
# ServiceAccount mounted by tech-extractor Job pods.
#
# No AWS Pod Identity association is required: tech-extractor calls no Bedrock
# and needs no AWS APIs. It connects to the platform RDS (PG_* from the
# platform-rds-credentials Secret) and to GitHub (per-Job installation token).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.techExtractorServiceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: tech-extractor
