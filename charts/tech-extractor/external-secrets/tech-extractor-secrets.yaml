# @format
# ExternalSecret: tech-extractor-secrets
#
# Provides a fallback GitHub PAT to tech-extractor Jobs as GITHUB_TOKEN. In
# practice admin-api injects a per-user GitHub App installation token as an
# explicit env var that overrides this; this static secret is the fallback and
# satisfies envFrom at pod start. Reuses the same Secrets Manager source as
# ingestion (bedrock-development/github-token).
#
# ESO store: aws-secretsmanager
# Secret path: bedrock-development/github-token
# Namespace: tech-extractor
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tech-extractor-secrets
  namespace: tech-extractor
  annotations:
    kubernetes.io/description: "GitHub PAT fallback for tech-extractor Jobs — sensitive, 15m refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: tech-extractor-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        GITHUB_TOKEN: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: bedrock-development/github-token
        property: token
