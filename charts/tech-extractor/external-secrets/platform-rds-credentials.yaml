# @format
# ExternalSecret: platform-rds-credentials
#
# Provides PostgreSQL connection env vars to the tech-extractor K8s Job for
# connecting to the platform RDS database via PgBouncer.
#
# ESO store: aws-secretsmanager (ambient EC2 instance profile auth)
# Secret path: k8s-development/platform-rds/credentials
# Namespace: tech-extractor
#
# Consumers: tech-extractor Job (PG_HOST, PG_PORT, PG_DATABASE, PG_USER, PG_PASSWORD)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-rds-credentials
  namespace: tech-extractor
  annotations:
    kubernetes.io/description: "Platform RDS credentials for tech-extractor Jobs — sensitive, 15m refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: platform-rds-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        PG_HOST: pgbouncer.platform.svc.cluster.local
        PG_PORT: "5432"
        PG_DATABASE: tucaken
        PG_USER: "{{ .username }}"
        PG_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: password
