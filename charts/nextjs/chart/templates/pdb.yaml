{{- if .Values.pdb.enabled }}
# ---------------------------------------------------------------
# PodDisruptionBudget — protects availability during node drains
#
# maxUnavailable: 1 allows Karpenter to evict pods for bin-packing
# while ensuring at most 1 disruption at a time.
# ---------------------------------------------------------------
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nextjs
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nextjs.fullLabels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "nextjs.selectorLabels" . | nindent 6 }}
{{- end }}
