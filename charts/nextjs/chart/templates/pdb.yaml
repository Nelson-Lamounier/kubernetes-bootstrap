{{- if .Values.pdb.enabled }}
# ---------------------------------------------------------------
# PodDisruptionBudget — protects availability during node drains
#
# maxUnavailable: 1 — allows Karpenter to evict one pod at a time for
# bin-packing. For replicas: 1, this permits brief eviction+reschedule;
# for replicas > 1, it guarantees at least one pod remains available.
# ---------------------------------------------------------------
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nextjs
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nextjs.fullLabels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "nextjs.selectorLabels" . | nindent 6 }}
{{- end }}
