{{- /*
ingressroute-patcher — PostSync hook that closes the only gap ESO can't
cover natively: writing the CloudFront origin secret into the Traefik
IngressRoute matchRule, which is a literal string field on a CRD spec.

Flow on every ArgoCD sync:
  1. ArgoCD applies the IngressRoute with cloudfront.originSecret rendered
     as the never-matching placeholder from chart/values.yaml.
  2. PostSync hook fires this Job.
  3. Job reads .data.value from the ESO-managed Secret
     nextjs-cloudfront-origin-secret and PATCHes /spec/routes/0/match on
     the IngressRoute with the assembled rule.
  4. argocd-apps/nextjs.yaml ignoreDifferences + RespectIgnoreDifferences
     stops selfHeal from reverting the patched matchRule on subsequent
     reconciles.

Rotation: update SSM, trigger an ArgoCD sync — ESO has refreshed the
Secret within 5m, the Job re-patches with the new value, no IngressRoute
recreation required. selfHeal does NOT auto-trigger on Secret content
changes, so the sync trigger is required.
*/ -}}
{{- if .Values.ingress.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nextjs-ingressroute-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nextjs.fullLabels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nextjs-ingressroute-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nextjs.fullLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["nextjs-cloudfront-origin-secret"]
    verbs: ["get"]
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes"]
    resourceNames: ["nextjs"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nextjs-ingressroute-patcher
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nextjs.fullLabels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: nextjs-ingressroute-patcher
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: nextjs-ingressroute-patcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nextjs-ingressroute-patcher
  namespace: {{ .Values.namespace }}
  annotations:
    # PostSync: run after every ArgoCD sync, after the IngressRoute has
    # been (re)applied with the placeholder matchRule.
    argocd.argoproj.io/hook: PostSync
    # BeforeHookCreation: delete the previous Job before creating a new
    # one, so re-syncs don't accumulate completed Jobs.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    {{- include "nextjs.fullLabels" . | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "nextjs.selectorLabels" . | nindent 8 }}
        platform.engineering/role: ingressroute-patcher
    spec:
      serviceAccountName: nextjs-ingressroute-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          # Official upstream kubectl image (no Bitnami archive risk).
          image: registry.k8s.io/kubectl:v1.31.0
          imagePullPolicy: IfNotPresent
          # Required: the nextjs namespace has a ResourceQuota that
          # rejects pods without explicit requests + limits.
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # Helm renders these literals at template time. Single quotes
            # in shell prevent backtick re-evaluation inside matchRule.
            - name: TARGET_NAMESPACE
              value: {{ .Values.namespace | quote }}
            - name: TARGET_HOST
              value: {{ .Values.ingress.host | quote }}
            - name: TARGET_PATH_RULE
              value: {{ .Values.ingress.matchRule | quote }}
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              SECRET_B64=""
              for i in $(seq 1 30); do
                SECRET_B64=$(kubectl -n "$TARGET_NAMESPACE" get secret nextjs-cloudfront-origin-secret \
                  -o jsonpath='{.data.value}' 2>/dev/null || true)
                [ -n "$SECRET_B64" ] && break
                echo "waiting for ESO to populate nextjs-cloudfront-origin-secret (attempt $i/30)"
                sleep 5
              done
              if [ -z "$SECRET_B64" ]; then
                echo "ERROR: nextjs-cloudfront-origin-secret was not populated by ESO within 150s"
                exit 1
              fi
              VALUE=$(echo -n "$SECRET_B64" | base64 -d)
              # Backticks inside expanded variables are not re-evaluated by
              # the shell, so $TARGET_PATH_RULE keeps its `/` literally.
              RULE="Host(\`${TARGET_HOST}\`) && ${TARGET_PATH_RULE} && HeaderRegexp(\`X-CloudFront-Origin-Secret\`, \`${VALUE}\`)"
              echo "patching ingressroute.traefik.io/nextjs in $TARGET_NAMESPACE (host=$TARGET_HOST)"
              kubectl -n "$TARGET_NAMESPACE" patch ingressroute.traefik.io nextjs --type=json \
                -p "[{\"op\":\"replace\",\"path\":\"/spec/routes/0/match\",\"value\":\"${RULE}\"}]"
{{- end }}
