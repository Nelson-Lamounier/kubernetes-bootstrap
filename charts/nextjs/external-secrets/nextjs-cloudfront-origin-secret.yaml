# @format
# ExternalSecret: nextjs-cloudfront-origin-secret
#
# Hydrates the CloudFront origin secret into a K8s Secret in nextjs-app.
# Consumed at sync time by the ingressroute-patcher Job (Helm-rendered
# PostSync hook in charts/nextjs/chart/templates/ingressroute-patcher.yaml),
# which reads .data.value and rewrites the IngressRoute matchRule to embed
# the actual secret. This replaces the now-deleted deploy.py (Step 5).
#
# Refresh: every 5 minutes — bounds the worst-case rotation window. After
# rotating /k8s/{env}/cloudfront-origin-secret in SSM, trigger an ArgoCD
# sync of the nextjs Application to re-run the patcher Job; selfHeal does
# not auto-trigger on Secret content changes.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nextjs-cloudfront-origin-secret
  namespace: nextjs-app
  annotations:
    kubernetes.io/description: "CloudFront origin secret for Traefik IngressRoute matchRule — patched in by PostSync hook"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: nextjs-cloudfront-origin-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: value
      remoteRef:
        key: /k8s/development/cloudfront-origin-secret
