# @format
# ExternalSecret: nextjs-secrets
#
# Resolves sensitive nextjs runtime secrets from SSM.
# SSM paths: /nextjs/development/auth/* and /k8s/development/* and /bedrock-dev/*
# Secrets Manager paths: bedrock-dev/bedrock-api-key
#
# Referenced by: cdk-monitoring/charts/nextjs/chart/templates/deployment.yaml
#   envFrom.secretRef: name: nextjs-secrets

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nextjs-secrets
  namespace: nextjs-app
  annotations:
    kubernetes.io/description: "nextjs sensitive runtime secrets from SSM"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: nextjs-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: /nextjs/development/auth/nextauth-secret
    - secretKey: NEXTAUTH_URL
      remoteRef:
        key: /nextjs/development/auth/nextauth-url
    - secretKey: CLOUDFRONT_ORIGIN_SECRET
      remoteRef:
        key: /k8s/development/cloudfront-origin-secret
    - secretKey: REVALIDATION_SECRET
      remoteRef:
        key: /bedrock-dev/revalidation-secret
    - secretKey: BEDROCK_AGENT_API_KEY
      sourceRef:
        storeRef:
          name: aws-secretsmanager
          kind: ClusterSecretStore
      remoteRef:
        key: bedrock-dev/bedrock-api-key
