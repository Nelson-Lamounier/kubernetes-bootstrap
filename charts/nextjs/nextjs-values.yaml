# @format
# Development environment overrides — lower resources, single replica.
#
# NOTE: image.tag is intentionally absent here.
# ArgoCD Image Updater owns image.tag via its git write-back to
# .argocd-source-nextjs.yaml. Hardcoding a tag in this file creates
# a competing source of truth that prevents Argo Rollouts from detecting
# a genuine image change and spawning a green ReplicaSet.

image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/nextjs-frontend
  # tag: managed by ArgoCD Image Updater → .argocd-source-nextjs.yaml

replicas: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilization: 80

resourceQuota:
  hard:
    requests.cpu: "750m"
    requests.memory: 768Mi
    limits.cpu: "1500m"
    limits.memory: 1536Mi
    persistentvolumeclaims: "1"

pdb:
  enabled: true

# Traefik IngressRoute — Host() match clause.
# matchRule + originSecret defaults live in chart/values.yaml; the runtime
# secret value is patched in by the ingressroute-patcher PostSync hook.
ingress:
  enabled: true
  host: "nelsonlamounier.com"

# Re-enabled for EKS (2026-07-05). The old disable rationale was
# kubeadm-specific: Calico did not enforce ipBlock rules for traffic from
# the host network namespace (kubelet probes, hostNetwork Traefik), so the
# policy silently blocked probes. On EKS the VPC CNI network-policy agent
# enforces ipBlock normally, the ALB (target-type: ip) and kubelet probes
# both arrive from 10.0.0.0/16 sources that the template's ipBlock rule
# admits, and admin-api has run the same pattern live without incident.
networkPolicy:
  enabled: true

# Blue-green auto-promotion — ArgoCD Image Updater + Argo Rollouts promote the
# rollout themselves; the deploy pipeline has no manual promote step (mirrors
# the tucaken-app dev rollout). A non-zero autoPromotionSeconds auto-promotes
# after the soak even with autoPromotionEnabled=false (Argo Rollouts behaviour),
# so the green ReplicaSet swings to stable ~120s after it goes Healthy.
rollout:
  blueGreen:
    autoPromotionEnabled: false
    autoPromotionSeconds: 120
    scaleDownDelaySeconds: 30
