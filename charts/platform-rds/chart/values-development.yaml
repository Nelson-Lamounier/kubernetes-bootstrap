# @format
# Development environment value overrides for platform-rds chart.
# ArgoCD application references this file in spec.source.helm.valueFiles.

# ─── Environment identity ───────────────────────────────────────────────────
# Stamps every PgBouncer / bootstrap / migration Job's logs + spans with
# env=development. Mirrors the pattern in admin-api, tucaken-app, and
# platform-job-watcher dev values files.
observability:
  env:      development
  logLevel: debug

bootstrap:
  enabled: true
  image:
    # ECR image for the DDL bootstrap / migration PostSync hook.
    # AUTO-BUMPED by the ai-applications `deploy-platform-rds-bootstrap` workflow
    # (CI git-writeback) on each new migration image; do NOT hand-edit the tag.
    # Break-glass manual apply: ai-applications `just db-bootstrap-run`.
    #
    # 2026-07-05 MANUAL SYNC: the CI git-writeback to this file drifted from SSM
    # — SSM /k8s/development/job-images/platform-rds-bootstrap already pointed at
    # 2d2774d (2026-07-03) but this file was stuck at c0e075f (2026-05-20, before
    # the checksummed migration ledger #243/#247), so the deployed runner still
    # re-ran every migration and flooded RDS logs with `relation "resume_imports"
    # already exists`. Re-aligned to the SSM/ECR image that carries the ledger.
    repository: "771826808455.dkr.ecr.eu-west-1.amazonaws.com/platform-rds-bootstrap"
    tag: "2d2774d69827442aebbf659baddb5cb9dd23a10b-r1"

# ── PgBouncer — single replica is fine for dev ──────────────────────────────
pgbouncer:
  replicas: 1

# ── Metrics exporter — pgbouncer-exporter sidecar on port 9127 ──────────────
metricsExporter:
  enabled: true

# ── postgres_exporter — RDS engine metrics (pg_stat_*) on port 9187 ─────────
postgresExporter:
  enabled: true
