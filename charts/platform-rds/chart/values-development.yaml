# @format
# Development environment value overrides for platform-rds chart.
# ArgoCD application references this file in spec.source.helm.valueFiles.
bootstrap:
  image:
    # ECR image for the DDL bootstrap Job.
    # Build and push before first deploy:
    #   docker build -t <account>.dkr.ecr.eu-west-1.amazonaws.com/platform-rds-bootstrap:latest \
    #     ai-applications/applications/platform-rds-bootstrap/
    #   docker push <account>.dkr.ecr.eu-west-1.amazonaws.com/platform-rds-bootstrap:latest
    repository: "<account>.dkr.ecr.eu-west-1.amazonaws.com/platform-rds-bootstrap"
    tag: latest
