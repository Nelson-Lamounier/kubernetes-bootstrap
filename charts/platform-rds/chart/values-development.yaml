# @format
# Development environment value overrides for platform-rds chart.
# ArgoCD application references this file in spec.source.helm.valueFiles.

# ─── Environment identity ───────────────────────────────────────────────────
# Stamps every PgBouncer / bootstrap / migration Job's logs + spans with
# env=development. Mirrors the pattern in admin-api, tucaken-app, and
# platform-job-watcher dev values files.
observability:
  env:      development
  logLevel: debug

bootstrap:
  enabled: true
  image:
    # ECR image for the chart's `bootstrap-job` ledger PostSync hook.
    #
    # AUTO-TRACKED by ArgoCD Image Updater (annotations on the platform-rds
    # Application): newest-build picks the latest platform-rds-bootstrap image
    # in ECR and writes the tag back to the git override file
    # (.argocd-source-platform-rds-eks-development.yaml), which overrides the
    # value below. So this tag is the *seed / fallback*; the override file is
    # what actually deploys. This replaces the manual SSM-sync that drifted once
    # (c0e075f May vs SSM 2d2774d Jul) and shipped a pre-ledger runner that
    # flooded RDS logs with `relation "resume_imports" already exists`.
    #
    # Break-glass manual apply: ai-applications `just db-bootstrap-run`.
    repository: "771826808455.dkr.ecr.eu-west-1.amazonaws.com/platform-rds-bootstrap"
    tag: "2d2774d69827442aebbf659baddb5cb9dd23a10b-r1"

# ── PgBouncer — single replica is fine for dev ──────────────────────────────
pgbouncer:
  replicas: 1

# ── Metrics exporter — pgbouncer-exporter sidecar on port 9127 ──────────────
metricsExporter:
  enabled: true

# ── postgres_exporter — RDS engine metrics (pg_stat_*) on port 9187 ─────────
postgresExporter:
  enabled: true
