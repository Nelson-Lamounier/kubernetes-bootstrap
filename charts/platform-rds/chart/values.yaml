# @format
namespace: platform

pgbouncer:
  image:
    # Bitnami purged most images from docker.io/bitnami/* in 2025 and moved
    # the archived tags under docker.io/bitnamilegacy/*. Pinning here to
    # keep the cluster pullable; review for a maintained alternative
    # (Bitnami Premium, official Postgres + sidecar, or edoburu/pgbouncer)
    # before next major upgrade.
    repository: bitnamilegacy/pgbouncer
    tag: "1.23.1"
  poolMode: transaction
  maxClientConn: 200
  defaultPoolSize: 20
  replicas: 1
  # ── PgBouncer listen port (non-default override) ──────────────────────
  # PgBouncer's documented default is 6432. This chart deliberately uses
  # 5432 so consumer Pods, ExternalSecrets, and Grafana datasources can
  # use the canonical "Postgres port" without an extra translation step.
  #
  # CONSEQUENCES — read before port-forwarding or editing probes:
  #   • Service port  = 5432  (clients connect to :5432, not :6432)
  #   • Container port = 5432 (env PGBOUNCER_PORT=5432 overrides default)
  #   • Service `targetPort: 5432` (NOT 6432 like upstream Bitnami chart)
  #   • Run `kubectl get svc pgbouncer -n platform -o yaml` to verify —
  #     do not assume PgBouncer's default in any debugging session.
  #
  # The override is surfaced via the
  # `nelsonlamounier.com/upstream-port-override` annotation on the
  # Service so `kubectl describe svc` shows the deviation at a glance.
  port: 5432

bootstrap:
  # Disabled until the platform-rds-bootstrap ECR image exists.
  # When enabled, the chart renders a PostSync Job that runs idempotent DDL.
  enabled: false
  image:
    repository: ""
    tag: latest
  serviceAccountName: platform-rds-bootstrap-sa

awsRegion: "eu-west-1"

migration:
  enabled: false
  articlesTable: ""
  strategistTable: ""

# ── Observability — neutral chart default; per-env files override ───────────
# Set env=development in values-development.yaml and env=production in
# values-production.yaml. This block keeps templates from blowing up when
# neither file is applied (e.g. local helm template).
observability:
  env:      development
  logLevel: info

# ── PgBouncer metrics — opt-in sidecar ──────────────────────────────────────
# pgbouncer itself only exposes stats via its admin SQL console (SHOW STATS
# / SHOW POOLS), not HTTP. The community exporter
# (prometheuscommunity/pgbouncer-exporter) connects to that console and
# republishes as Prometheus metrics on :9127. Off in this chart; flip on
# in values-{env}.yaml when ready — it adds one sidecar container + one
# Service port and the database.json dashboard panels populate.
metricsExporter:
  enabled: false
  image:   prometheuscommunity/pgbouncer-exporter:v0.12.0
  port:    9127

# ── postgres_exporter — RDS engine metrics (pg_stat_*) for Prometheus ────────
# Standalone Deployment + Service (not a sidecar) connecting directly to RDS.
# Enable per-env; the database.json engine-health panels then gain a Prometheus
# source alongside the live-SQL panels, and the PostgresExporterDown alert clears.
postgresExporter:
  enabled: false
  image:   quay.io/prometheuscommunity/postgres-exporter:v0.15.0
  port:    9187
