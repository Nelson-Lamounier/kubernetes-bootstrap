# @format
namespace: platform

pgbouncer:
  image:
    # Bitnami purged most images from docker.io/bitnami/* in 2025 and moved
    # the archived tags under docker.io/bitnamilegacy/*. Pinning here to
    # keep the cluster pullable; review for a maintained alternative
    # (Bitnami Premium, official Postgres + sidecar, or edoburu/pgbouncer)
    # before next major upgrade.
    repository: bitnamilegacy/pgbouncer
    tag: "1.23.1"
  poolMode: transaction
  maxClientConn: 200
  defaultPoolSize: 20
  replicas: 1

bootstrap:
  # Disabled until the platform-rds-bootstrap ECR image exists.
  # When enabled, the chart renders a PostSync Job that runs idempotent DDL.
  enabled: false
  image:
    repository: ""
    tag: latest
  serviceAccountName: platform-rds-bootstrap-sa

awsRegion: "eu-west-1"

migration:
  enabled: false
  articlesTable: ""
  strategistTable: ""
