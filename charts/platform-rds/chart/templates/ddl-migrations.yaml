# =============================================================================
# Migration 007 — resume_imports active-index widening
#
# Splits the import pipeline added 'analyzing' (gap analysis, A3) and
# 'confirmed' (enrichment dispatch, A2) states. Widen the active-imports
# partial index so an import stuck in either stays visible to monitoring.
# Supersedes ai-applications migration 018 (which added 'confirmed' only).
# DROP IF EXISTS + CREATE makes it idempotent.
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: migration-007-resume-imports-active-index
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    kubernetes.io/description: "DDL: widen idx_resume_imports_status_active"
  labels:
    app: platform-rds-migration
    migration: "007"
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  activeDeadlineSeconds: 180
  template:
    metadata:
      labels:
        app: platform-rds-migration
        migration: "007"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.bootstrap.serviceAccountName }}
      containers:
        - name: migrate
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              set -eu
              psql "$DATABASE_URL" <<'SQL'

              DROP INDEX IF EXISTS idx_resume_imports_status_active;

              CREATE INDEX idx_resume_imports_status_active
                ON resume_imports (status)
                WHERE status IN ('queued', 'parsing', 'extracting_career',
                                 'analyzing', 'confirmed', 'enriching');

              SELECT 'migration-007: idx_resume_imports_status_active OK' AS status;
              SQL
          env:
            - name: DATABASE_URL
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/$(PGDATABASE)"
          envFrom:
            - secretRef:
                name: platform-rds-credentials
                optional: false
            - secretRef:
                name: platform-rds-config
                optional: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
