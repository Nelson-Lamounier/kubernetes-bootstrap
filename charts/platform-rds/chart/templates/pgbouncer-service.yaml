# @format
# Service: pgbouncer
#
# ClusterIP service exposing PgBouncer as the single database endpoint for
# all pods in the cluster.
#
# Connection string for all consumers:
#   host=pgbouncer.platform.svc.cluster.local port=5432
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: {{ .Values.namespace }}
  labels:
    app: pgbouncer
spec:
  type: ClusterIP
  selector:
    app: pgbouncer
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
