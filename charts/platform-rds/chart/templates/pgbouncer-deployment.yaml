# @format
# PgBouncer Deployment
#
# Connection pooler in front of Platform RDS.
# All pods in the cluster connect to
#   pgbouncer.platform.svc.cluster.local:{{ "{{ .Values.pgbouncer.port }}" }}
# NEVER directly to RDS.
#
# ⚠ NON-DEFAULT LISTEN PORT — see values.yaml `pgbouncer.port`.
# PgBouncer's documented default is 6432; this Deployment deliberately
# binds {{ "{{ .Values.pgbouncer.port }}" }} via env PGBOUNCER_PORT so
# consumers don't need a translation step. The matching Service
# annotation `nelsonlamounier.com/upstream-port-override` surfaces this.
#
# Pool mode: transaction (correct for stateless HTTP handlers)
# Max server connections: 20 (well under RDS t4g.micro limit of ~85)
# Max client connections: 200 (multiplexes all K8s pods)
#
# optional: false on secretKeyRef holds the pod in Pending until ESO syncs the
# secrets — no initContainer or kubectl access required.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: {{ .Values.namespace }}
  labels:
    app: pgbouncer
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: connection-pooler
spec:
  replicas: {{ .Values.pgbouncer.replicas }}
  # Zero-downtime rolls. pgbouncer is the single DB front door for every job;
  # the default RollingUpdate (25% maxUnavailable) removes the only dev replica
  # BEFORE its replacement is Ready, opening a connection-refused gap on every
  # image bump / Reloader secret roll. An in-flight strategist run hit that gap
  # (ECONNREFUSED, run bd55b680, 2026-07-20) and died with no retry. maxSurge:1
  # + maxUnavailable:0 brings the new pod up and Ready first, then drains the
  # old — no gap, even at replicas:1 (the brief 2-pod overlap is transient, and
  # pgbouncer opens server conns lazily so it does not double the RDS pool).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      annotations:
        # Reloader rolls pgbouncer when its RDS Secrets change — ESO refreshing
        # platform-rds-config on an endpoint rename, or platform-rds-credentials
        # on a master-password rotation. Env is read once at boot, so without
        # this the pooler keeps a dead host / stale password until a manual roll.
        secret.reloader.stakater.com/reload: "platform-rds-config,platform-rds-credentials"
      labels:
        app: pgbouncer
    spec:
      containers:
      - name: pgbouncer
        image: {{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}
        ports:
        # Port name `pgbouncer-pg` matches the Service port name —
        # makes the connection-pooler indirection visible in
        # `kubectl get pod/svc -o yaml` and `kubectl describe`.
        - containerPort: {{ .Values.pgbouncer.port }}
          name: pgbouncer-pg
        env:
        - name: POSTGRESQL_HOST
          valueFrom:
            secretKeyRef:
              name: platform-rds-config
              key: PGHOST
              optional: false
        - name: POSTGRESQL_PORT
          value: "5432"
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: platform-rds-config
              key: PGDATABASE
              optional: false
        # Bitnami pgbouncer uses POSTGRESQL_DATABASE as the upstream (RDS) name
        # and PGBOUNCER_DATABASE as the frontend name clients connect with.
        # Without PGBOUNCER_DATABASE the frontend defaults to "postgres", and
        # any client requesting `tucaken` is rejected with "no such database".
        # Pin both to the same value so client-side and upstream names match.
        - name: PGBOUNCER_DATABASE
          valueFrom:
            secretKeyRef:
              name: platform-rds-config
              key: PGDATABASE
              optional: false
        - name: POSTGRESQL_USERNAME
          valueFrom:
            secretKeyRef:
              name: platform-rds-credentials
              key: PGUSER
              optional: false
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: platform-rds-credentials
              key: PGPASSWORD
              optional: false
        # Bitnami legacy 1.23.1 image errors with "PGBOUNCER_PORT: value is
        # not an integer" if this env var is unset, even though the docs
        # claim a default of 5432. Setting explicitly from values so the
        # listen port stays in one source of truth (values.pgbouncer.port).
        - name: PGBOUNCER_PORT
          value: {{ .Values.pgbouncer.port | quote }}
        - name: PGBOUNCER_POOL_MODE
          value: {{ .Values.pgbouncer.poolMode }}
        - name: PGBOUNCER_MAX_CLIENT_CONN
          value: {{ .Values.pgbouncer.maxClientConn | quote }}
        - name: PGBOUNCER_DEFAULT_POOL_SIZE
          value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
        # Force TLS on the egress hop to RDS. AWS RDS PostgreSQL is configured
        # with rds.force_ssl=1, so plain TCP connections fail with
        # "no pg_hba.conf entry … no encryption". `require` enables TLS without
        # certificate verification, which matches the cluster trust model:
        # admin-api→pgbouncer is intra-cluster plain TCP; pgbouncer→RDS leaves
        # the cluster and must be encrypted.
        - name: PGBOUNCER_SERVER_TLS_SSLMODE
          value: require
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        # End-to-end SELECT 1 round-trip through PgBouncer to RDS.
        # The previous TCP probe only confirmed PgBouncer was listening,
        # masking upstream failures — pgbouncer-7fc6b8c79-whj69 sat
        # Ready=False for 4 straight hours on 2026-05-11 because the
        # upstream connection broke after pgbouncer started. An exec
        # probe that actually issues a query catches credential drift,
        # RDS unavailability, and network partitions immediately.
        # PGCONNECT_TIMEOUT bounds the probe at 3s so we still fail fast.
        livenessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - 'PGCONNECT_TIMEOUT=3 PGPASSWORD="$POSTGRESQL_PASSWORD" /opt/bitnami/postgresql/bin/psql -h 127.0.0.1 -p 5432 -U "$POSTGRESQL_USERNAME" -d "$POSTGRESQL_DATABASE" -tAc "SELECT 1" >/dev/null'
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - 'PGCONNECT_TIMEOUT=3 PGPASSWORD="$POSTGRESQL_PASSWORD" /opt/bitnami/postgresql/bin/psql -h 127.0.0.1 -p 5432 -U "$POSTGRESQL_USERNAME" -d "$POSTGRESQL_DATABASE" -tAc "SELECT 1" >/dev/null'
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      {{- if .Values.metricsExporter.enabled }}
      # ── PgBouncer metrics exporter (sidecar) ────────────────────────────
      # Connects to the colocated PgBouncer admin console over loopback,
      # runs SHOW STATS / SHOW POOLS, exposes Prometheus metrics on
      # :{{ .Values.metricsExporter.port }}. Prometheus auto-discovers via
      # the prometheus.io/scrape annotation on the pgbouncer Service.
      - name: pgbouncer-exporter
        image: {{ .Values.metricsExporter.image }}
        args:
          - --pgBouncer.connectionString=postgres://$(POSTGRESQL_USERNAME):$(POSTGRESQL_PASSWORD)@127.0.0.1:5432/pgbouncer?sslmode=disable
          - --web.listen-address=:{{ .Values.metricsExporter.port }}
        env:
          - name: POSTGRESQL_USERNAME
            valueFrom:
              secretKeyRef:
                name: platform-rds-credentials
                key:  PGUSER
          - name: POSTGRESQL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: platform-rds-credentials
                key:  PGPASSWORD
        ports:
          - containerPort: {{ .Values.metricsExporter.port }}
            name: metrics
            protocol: TCP
        resources:
          requests:
            cpu:    10m
            memory: 32Mi
          limits:
            cpu:    50m
            memory: 64Mi
      {{- end }}
