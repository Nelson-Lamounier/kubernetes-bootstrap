{{- if .Values.bootstrap.enabled }}
# @format
# Bootstrap Job — Platform RDS DDL
#
# Runs as ArgoCD PostSync hook after every sync.
# Idempotent DDL (CREATE TABLE IF NOT EXISTS, CREATE EXTENSION IF NOT EXISTS).
#
# Connects DIRECTLY to RDS (not via PgBouncer).
# Reason: PgBouncer may not be ready on first deploy. This Job uses PGHOST
# from platform-rds-config which points to the RDS endpoint directly.
# After bootstrap, all application pods connect via PgBouncer.
#
# ArgoCD hook lifecycle:
#   PostSync → Job runs after all resources synced
#   BeforeHookCreation → old completed Job deleted before new one is created
#
# Gated by .Values.bootstrap.enabled so the hook can be disabled until the
# platform-rds-bootstrap ECR image exists. When disabled the chart still
# renders pgbouncer + RBAC so admin-api can connect.
apiVersion: batch/v1
kind: Job
metadata:
  name: platform-rds-bootstrap
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    app: platform-rds-bootstrap
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: platform-rds-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.bootstrap.serviceAccountName }}
      containers:
      - name: bootstrap
        image: {{ .Values.bootstrap.image.repository }}:{{ .Values.bootstrap.image.tag }}
        env:
          # Observability — same pattern as the workload Jobs in
          # admin-api/k8s-job-builder.ts. Logs emitted via the shared
          # @bedrock/shared logger auto-pick env+trace_id from these.
          # No /metrics exposed (one-shot Job); no Pushgateway push (DDL
          # outcomes are visible from the Job's exit code + Loki stream).
          - name: DEPLOY_ENV
            value: {{ .Values.observability.env | quote }}
          - name: LOG_LEVEL
            value: {{ .Values.observability.logLevel | quote }}
          - name: OTEL_SERVICE_NAME
            value: "platform-rds-bootstrap"
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://alloy.monitoring.svc.cluster.local:4318"
          - name: OTEL_RESOURCE_ATTRIBUTES
            value: "deployment.environment={{ .Values.observability.env }},k8s.namespace.name={{ .Values.namespace }},job.kind=ddl-bootstrap"
        envFrom:
        - secretRef:
            name: platform-rds-credentials
            optional: false
        - secretRef:
            name: platform-rds-config
            optional: false
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
{{- end }}
