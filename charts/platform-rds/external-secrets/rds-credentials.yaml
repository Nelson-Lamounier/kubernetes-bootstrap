# @format
# ExternalSecret: platform-rds-credentials
#
# Extracts RDS credentials from the Secrets Manager secret created by CDK
# Credentials.fromGeneratedSecret('postgres').
# Secret JSON: { "username": "postgres", "password": "<auto>", ... }
#
# ESO store: aws-secretsmanager (ambient EC2 instance profile auth)
# Secret path: k8s-development/platform-rds/credentials
# Namespace: platform
#
# Consumers:
#   PgBouncer             (POSTGRESQL_USERNAME, POSTGRESQL_PASSWORD env vars)
#   bootstrap Job         (PGUSER, PGPASSWORD env vars — libpq native format)
#   platform-job-watcher  (PG_HOST, PG_PORT, PG_DATABASE, PG_USER, PG_PASSWORD)
#   Any future platform-namespace pod that connects via PgBouncer
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-rds-credentials
  namespace: platform
  annotations:
    kubernetes.io/description: "Platform RDS credentials from Secrets Manager — sensitive, 15m refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: platform-rds-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      engineVersion: v2
      type: Opaque
      data:
        # libpq native format — used by PgBouncer and bootstrap Job
        PGPASSWORD: "{{ .password }}"
        PGUSER: "{{ .username }}"
        # PG_* format — used by Node.js apps (platform-job-watcher)
        # PG_HOST points to PgBouncer, not the RDS endpoint directly
        PG_HOST: pgbouncer.platform.svc.cluster.local
        PG_PORT: "5432"
        PG_DATABASE: tucaken
        PG_USER: "{{ .username }}"
        PG_PASSWORD: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: password
    - secretKey: username
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: username
