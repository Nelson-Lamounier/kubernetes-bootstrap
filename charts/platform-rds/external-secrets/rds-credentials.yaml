# @format
# ExternalSecret: platform-rds-credentials
#
# Extracts RDS credentials from the Secrets Manager secret created by CDK
# Credentials.fromGeneratedSecret('postgres').
# Secret JSON: { "username": "postgres", "password": "<auto>", ... }
#
# ESO store: aws-secretsmanager (ambient EC2 instance profile auth)
# Secret path: k8s-development/platform-rds/credentials
# Namespace: platform
#
# Consumers: PgBouncer (POSTGRESQL_USERNAME, POSTGRESQL_PASSWORD env vars)
#            bootstrap Job (PGUSER, PGPASSWORD env vars)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-rds-credentials
  namespace: platform
  annotations:
    kubernetes.io/description: "Platform RDS password from Secrets Manager — sensitive, 15m refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: platform-rds-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: PGPASSWORD
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: password
    - secretKey: PGUSER
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: username
