# @format
# ExternalSecret: argocd-webhook-secret
#
# Injects webhook.github.secret into the existing argocd-secret so ArgoCD
# can verify the HMAC-SHA256 signature on GitHub push events.
#
# Without this key, ArgoCD accepts all webhook payloads without verification.
# With it set, any payload whose X-Hub-Signature-256 does not match is
# rejected — preventing spoofed sync triggers.
#
# creationPolicy: Merge — argocd-secret is owned by the ArgoCD Helm release.
#   ESO must not take ownership; it only injects the missing key.
# deletionPolicy: Retain — ESO cannot delete a secret it does not own.
#
# SSM parameter: /k8s/development/argocd-webhook-secret
#   Value: the webhook secret configured in GitHub →
#          Repository Settings → Webhooks → Secret field.
#   Provision once:
#     aws ssm put-parameter \
#       --name /k8s/development/argocd-webhook-secret \
#       --type SecureString \
#       --value "<your-webhook-secret>" \
#       --region eu-west-1 --profile dev-account
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-webhook-secret
  namespace: argocd
  annotations:
    kubernetes.io/description: "Injects webhook.github.secret into argocd-secret for GitHub push event HMAC verification"
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Retain
    template:
      metadata:
        # Explicitly empty labels so ESO does not propagate its own
        # argocd.argoproj.io/instance label onto argocd-secret.
        # Without this, ArgoCD tracks argocd-secret as a managed resource of
        # the argocd-secrets app, then prunes it because it is not in git.
        labels: {}
        annotations:
          argocd.argoproj.io/compare-options: IgnoreExtraneous
  data:
    - secretKey: webhook.github.secret
      remoteRef:
        key: /k8s/development/argocd-webhook-secret
