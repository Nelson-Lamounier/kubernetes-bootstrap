# @format
# ExternalSecret: argocd-core-secret
#
# Restores the two fields that ArgoCD auto-generates on first boot but that
# must survive argocd-secret deletion (e.g. accidental prune, DR restore):
#
#   server.secretkey  — HMAC key used to sign all ArgoCD JWT session tokens.
#                       Losing it invalidates every active session.
#                       Backed up at bootstrap: /k8s/development/argocd/server-secret-key
#
#   admin.password    — bcrypt hash of the initial admin password.
#                       ArgoCD writes a new random hash if the field is absent,
#                       rendering the SSM-stored plaintext unusable.
#                       Plaintext:    /k8s/development/argocd-admin-password
#                       Bcrypt hash:  /k8s/development/argocd/admin-password-bcrypt
#                       (hash stored once at bootstrap; re-generate if password rotated)
#
# creationPolicy: Merge — argocd-secret is owned by the ArgoCD Helm release.
#   ESO must not claim ownership; it only injects the missing keys.
# deletionPolicy: Retain — ESO cannot delete a secret it does not own.
#
# Sync-wave 2 — runs after ClusterSecretStore (wave 1) is ready.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-core-secret
  namespace: argocd
  annotations:
    kubernetes.io/description: "Injects server.secretkey and admin.password into argocd-secret from SSM"
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Retain
    template:
      metadata:
        labels: {}
        annotations:
          argocd.argoproj.io/compare-options: IgnoreExtraneous
  data:
    - secretKey: server.secretkey
      remoteRef:
        key: /k8s/development/argocd/server-secret-key
    - secretKey: admin.password
      remoteRef:
        key: /k8s/development/argocd/admin-password-bcrypt
