# @format
# Helm values for ArgoCD on EKS (consumed by
# cdk-monitoring/.github/workflows/_install-argocd.yml).
#
# Pinned to argo-cd chart 7.7.5 (matches docs/runbooks/argocd-on-eks.md).
#
# Why this file lives in kubernetes-bootstrap, not cdk-monitoring:
# kubernetes-bootstrap owns everything that runs *inside* the cluster.
# The CDK repo runs Helm against this file; updating the file is a
# pure-git change reviewed alongside other Kubernetes manifests.
#
# Every component carries a system-MNG toleration so ArgoCD pins to
# the dedicated system nodes (taint dedicated=system:NoSchedule). The
# Karpenter-provisioned workload pool stays free of platform pods.

global:
  tolerations: &systemTol
    - key: dedicated
      value: system
      effect: NoSchedule

configs:
  cm:
    # ARC controller (arc-controller) creates AutoscalingListener resources in
    # the arc-runners namespace at runtime. These are not owned by any Helm chart
    # and have no git representation. Without this exclusion, ArgoCD with prune:true
    # deletes them on every sync, causing the ARC controller to recreate them
    # immediately — a permanent OutOfSync loop.
    resource.exclusions: |
      - apiGroups:
        - actions.github.com
        kinds:
        - AutoscalingListener
        clusters:
        - "*"

    # Custom DaemonSet health check — treats a DaemonSet as Healthy when all
    # scheduled pods are on correct nodes and at least one is ready.
    # Default ArgoCD check requires numberReady == desiredNumberScheduled, which
    # deadlocks syncs indefinitely when pods are Pending due to node capacity
    # (system nodes at 17-pod limit) rather than app failures. The DaemonSet
    # controller binds each pod to a specific node via matchFields nodeAffinity
    # — if that node is full, the pod never schedules and the sync hangs forever,
    # blocking the commit that would fix the scheduling from being applied.
    resource.customizations.health.apps_DaemonSet: |
      hs = {}
      if obj.status == nil then
        hs.status = "Progressing"
        hs.message = "Waiting for status"
        return hs
      end
      local desired = obj.status.desiredNumberScheduled or 0
      local ready = obj.status.numberReady or 0
      local updated = obj.status.updatedNumberScheduled or 0
      local misscheduled = obj.status.numberMisscheduled or 0
      if desired == 0 then
        hs.status = "Healthy"
        hs.message = "No target nodes"
        return hs
      end
      if ready == desired and updated == desired then
        hs.status = "Healthy"
        hs.message = ready .. "/" .. desired .. " ready"
        return hs
      end
      if updated < desired then
        hs.status = "Progressing"
        hs.message = "Rolling update: " .. updated .. "/" .. desired .. " updated"
        return hs
      end
      if misscheduled > 0 then
        hs.status = "Degraded"
        hs.message = misscheduled .. " pods running on non-matching nodes"
        return hs
      end
      if ready >= 1 then
        hs.status = "Healthy"
        hs.message = ready .. "/" .. desired .. " ready; remaining pods pending (node capacity)"
        return hs
      end
      hs.status = "Degraded"
      hs.message = "0/" .. desired .. " pods ready"
      return hs

  params:
    # ALB controller terminates TLS upstream; ArgoCD server runs HTTP-only.
    server.insecure: true
    # ALB routes ops.nelsonlamounier.com/argocd → argocd-server without stripping
    # the prefix. rootpath tells ArgoCD to strip /argocd from incoming paths and
    # prepend it to generated redirect URLs.
    server.rootpath: "/argocd"
    # server.basehref must NOT be set here (not even to "").
    # "" written to argocd-cmd-params-cm causes ArgoCD to derive basehref from
    # rootpath (→ /argocd), then construct post-login redirects as
    # basehref + redirect_url = /argocd + /argocd/applications = /argocd/argocd/applications.
    # Absent key → ArgoCD flag default (/) is used → benign warning fires but
    # routing is correct because rootpath takes precedence for all path handling.

server:
  service:
    type: ClusterIP
  tolerations: *systemTol

controller:
  tolerations: *systemTol

repoServer:
  tolerations: *systemTol

redis:
  tolerations: *systemTol

applicationSet:
  tolerations: *systemTol

notifications:
  tolerations: *systemTol
