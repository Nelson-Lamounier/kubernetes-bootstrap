# @format
namespace: job-strategist

pipelineServiceAccount:
  name: job-strategist-sa

adminApi:
  serviceAccountName: admin-api
  namespace: admin-api

# Backstop cap on CONCURRENT pipeline pods in this namespace (strategist + coach
# + tech-extract Jobs). Defence-in-depth behind the per-user dispatch gate in
# admin-api: bounds a burst of distinct users from exhausting cluster capacity.
# ResourceQuota counts only NON-TERMINAL pods toward `pods`, so completed Jobs
# lingering for ttlSecondsAfterFinished do not consume the budget, and a pure
# count quota does not force pods to declare resource requests/limits.
resourceQuota:
  enabled: true
  maxConcurrentPods: 25

# Weekly RAG retrieval golden-set eval (templates/rag-eval-cronjob.yaml).
# DISABLED until a job-strategist image containing golden.json v2 exists
# (ai-applications feat/rag-measurement-loops merge builds it) — flip
# `enabled: true` and pin that image URI here in the same commit. The image
# is NOT managed by ArgoCD Image Updater; the latest pipeline URI lives in
# SSM /k8s/development/job-images/job-strategist.
ragEval:
  enabled: false
  schedule: "0 5 * * 1"
  image: "771826808455.dkr.ecr.eu-west-1.amazonaws.com/job-strategist:e638ee2ca6f9c33870aebae862f31292f5c6f403-r1"
  # Owner account — the only user whose repos are fully ingested on dev.
  userId: "1d4c645a-447e-4b5b-924d-19a3c75a84db"
  awsRegion: "eu-west-1"
