# @format
# ExternalSecret: platform-rds-credentials
# Namespace: job-strategist
# Consumed by job-strategist (analysis + coaching) Job pods.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-rds-credentials
  namespace: job-strategist
  annotations:
    kubernetes.io/description: "Platform RDS credentials for job-strategist Jobs — sensitive, 15m refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: platform-rds-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        PG_HOST: pgbouncer.platform.svc.cluster.local
        PG_PORT: "5432"
        PG_DATABASE: tucaken
        PG_USER: "{{ .username }}"
        PG_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: password
