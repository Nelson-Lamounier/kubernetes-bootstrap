# @format
# ExternalSecret: platform-rds-credentials
#
# Provides PostgreSQL connection env vars to job-strategist K8s Jobs.
# Two key prefixes are required:
#   PG_*   — consumed by env.ts (pipeline_runs / job_applications pool)
#   RDS_*  — consumed by RdsVectorStore.fromEnvironment() (document_embeddings)
# Both resolve to the same PgBouncer endpoint.
#
# ESO store: aws-secretsmanager (EKS Pod Identity on external-secrets SA)
# Secret path: k8s-development/platform-rds/credentials
# Namespace: job-strategist
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-rds-credentials
  namespace: job-strategist
  annotations:
    kubernetes.io/description: "Platform RDS credentials for job-strategist Jobs — PG_* and RDS_* keys, 15m refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: platform-rds-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        PG_HOST:      pgbouncer.platform.svc.cluster.local
        PG_PORT:      "5432"
        PG_DATABASE:  tucaken
        PG_USER:      "{{ .username }}"
        PG_PASSWORD:  "{{ .password }}"
        RDS_HOST:     pgbouncer.platform.svc.cluster.local
        RDS_PORT:     "5432"
        RDS_DB_NAME:  tucaken
        RDS_USER:     "{{ .username }}"
        RDS_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: password
