{{- if .Values.clusterIssuer.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.clusterIssuer.name | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  acme:
    server: {{ .Values.clusterIssuer.acmeServer | quote }}
    email: {{ .Values.clusterIssuer.email | quote }}
    privateKeySecretRef:
      name: {{ printf "%s-account-key" .Values.clusterIssuer.name | quote }}
    solvers:
      - http01:
          ingress:
            class: {{ .Values.clusterIssuer.ingressClass | quote }}
{{- end }}
