# @format
# Values for cert-manager-config — ClusterIssuer + ops Certificate.
#
# V1 EKS uses HTTP-01 via Traefik (single-cluster, no Route53
# cross-account dance). The previous kubeadm setup used DNS-01 with
# SSM-injected values; that flow is gone with the cluster.

clusterIssuer:
  enabled: true
  name: letsencrypt
  acmeServer: https://acme-v02.api.letsencrypt.org/directory
  email: lamounierleao@gmail.com
  # HTTP-01 solver via Traefik. Each ACME challenge spins up a tiny
  # Pod + Service + Ingress that Traefik routes the well-known path to.
  ingressClass: traefik

opsCertificate:
  enabled: true
  name: ops-tls-cert
  namespace: kube-system
  dnsNames:
    - ops.nelsonlamounier.com
  duration: 2160h    # 90 days (Let's Encrypt default)
  renewBefore: 720h  # 30 days before expiry
