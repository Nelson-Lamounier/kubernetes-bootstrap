# @format
# ClusterSecretStore: aws-ssm
#
# Cluster-wide secret store backed by AWS SSM Parameter Store.
# Uses the EC2 node instance profile for authentication — no explicit
# credentials required. The control plane node IAM role must have:
#   - ssm:GetParameter on arn:aws:ssm:{region}:{account}:parameter/k8s/*
#
# Region is hardcoded to eu-west-1 (single-region deployment).
# Update this value if bootstrapping a cluster in a different region.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
  annotations:
    kubernetes.io/description: "AWS SSM Parameter Store — ambient EC2 instance profile auth"
spec:
  provider:
    aws:
      service: ParameterStore
      region: eu-west-1
      # No auth block = ESO uses ambient EC2 instance profile credentials
      # (IMDS / instance metadata service on the node where ESO runs)
