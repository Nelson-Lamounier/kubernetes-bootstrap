# @format
# ClusterSecretStore: aws-secretsmanager
#
# Cluster-wide secret store backed by AWS Secrets Manager.
# Uses the EC2 node instance profile for authentication — same ambient
# credentials as the aws-ssm store. The control plane node IAM role must have:
#   - secretsmanager:GetSecretValue on arn:aws:secretsmanager:{region}:{account}:secret:bedrock-*
#
# Usage: reference this store when the secret value lives in Secrets Manager
# (e.g. RDS credentials auto-generated by CDK fromGeneratedSecret).
# Use aws-ssm for non-sensitive config parameters (hostnames, ports, names).

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
  annotations:
    kubernetes.io/description: "AWS Secrets Manager — ambient EC2 instance profile auth"
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      # No auth block = ESO uses ambient EC2 instance profile credentials
