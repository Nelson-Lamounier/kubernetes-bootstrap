# @format
# ExternalSecret: ontology-importer-secrets
#
# Provides the Anthropic API key to the ontology-importer CronJobs, which submit
# the uncertain-categorization tail to the Anthropic Batch API and poll for
# completed batches.
#
# ESO store: aws-secretsmanager (ambient EC2 instance profile auth)
# Secret path: k8s-development/ontology-importer/secrets (property: anthropic_api_key)
# Namespace: ontology-importer
#
# PROVISIONING: the SM secret `k8s-development/ontology-importer/secrets` (with
# key `anthropic_api_key`) must be created out-of-band in AWS Secrets Manager
# BEFORE this CronJob can run — ESO only reads it, it does not create it.
#
# Note: GCP_SA_JSON is intentionally NOT provisioned here. BigQuery is only used
# at refresh time (offline) to regenerate the registry seed; the CronJobs run
# against the committed pypi-top-5k seed and never call BigQuery at runtime.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ontology-importer-secrets
  namespace: ontology-importer
  annotations:
    kubernetes.io/description: "Anthropic API key for ontology-importer LLM batch categorization — sensitive, 15m refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: ontology-importer-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        ANTHROPIC_API_KEY: "{{ .anthropicApiKey }}"
  data:
    - secretKey: anthropicApiKey
      remoteRef:
        key: k8s-development/ontology-importer/secrets
        property: anthropic_api_key
