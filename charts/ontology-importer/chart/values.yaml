# @format
namespace: ontology-importer

serviceAccount:
  name: ontology-importer-sa

# Built + pushed from ai-applications/applications/ontology-importer.
# repository/tag split so ArgoCD Image Updater writes the new tag on each CI push.
image:
  repository: "771826808455.dkr.ecr.eu-west-1.amazonaws.com/ontology-importer"
  tag: "latest"
  pullPolicy: IfNotPresent

# Monthly full import (registry pull → categorize → LLM batch for the tail).
import:
  schedule: "0 2 1 * *"
  activeDeadlineSeconds: 3600
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2000m", memory: "4Gi" }

# 30-min poller that retrieves completed LLM batches and routes results.
followup:
  schedule: "*/30 * * * *"
  activeDeadlineSeconds: 900
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits:   { cpu: "1000m", memory: "1Gi" }

env:
  triggeredBy: "cronjob"
  deactivationThreshold: "3"
  logLevel: "info"

nodeSelector: {}
tolerations: []

# Bedrock Batch Inference (Layer-4 LLM classifier). Replaces the Anthropic API.
# The pod authenticates via Pod Identity (cdk-monitoring eks-pod-identity-stack);
# the batchRoleArn is the Bedrock-trusted service role provisioned by CDK and
# published to SSM /shared/ontology-importer/{env}/batch-role-arn.
bedrock:
  region: "eu-west-1"
  modelId: "anthropic.claude-haiku-4-5-20251001-v1:0"
  batchBucket: "ontology-importer-batch-development"
  batchPrefix: "batch"
  # Fill from SSM /shared/ontology-importer/development/batch-role-arn after cdk deploys.
  batchRoleArn: "REPLACE_WITH_CDK_SSM_OUTPUT"
  minRecords: "100"
