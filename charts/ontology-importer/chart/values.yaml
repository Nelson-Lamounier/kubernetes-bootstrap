# @format
namespace: ontology-importer

serviceAccount:
  name: ontology-importer-sa

# Built + pushed from ai-applications/applications/ontology-importer.
# repository/tag split so ArgoCD Image Updater writes the new tag on each CI push.
image:
  repository: "771826808455.dkr.ecr.eu-west-1.amazonaws.com/ontology-importer"
  # Fallback only — ArgoCD Image Updater writes the live tag into
  # .argocd-source-*.yaml (sha-regexp strategy). No :latest tag exists in
  # this ECR repo, so the old fallback could never pull; pin it to the
  # tag currently running so a fresh install without the write-back file
  # still deploys.
  tag: "106d9e2f5da19a7067f57cdc7116329cce475ae3-r1"
  pullPolicy: IfNotPresent

# Monthly full import (registry pull → categorize → LLM batch for the tail).
import:
  schedule: "0 2 1 * *"
  activeDeadlineSeconds: 3600
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2000m", memory: "4Gi" }

# 30-min poller that retrieves completed LLM batches and routes results.
followup:
  schedule: "*/30 * * * *"
  activeDeadlineSeconds: 900
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits:   { cpu: "1000m", memory: "1Gi" }

env:
  triggeredBy: "cronjob"
  deactivationThreshold: "3"
  logLevel: "info"

nodeSelector: {}
tolerations: []

# Bedrock Batch Inference (Layer-4 LLM classifier). Replaces the Anthropic API.
# The pod authenticates via Pod Identity (cdk-monitoring eks-pod-identity-stack).
#
# Note: BEDROCK_BATCH_ROLE_ARN and BATCH_S3_BUCKET are NOT in values — they are
# synced from SSM ParameterStore (single source of truth: CDK) by the
# ontology-importer-batch-config ExternalSecret in external-secrets/, and
# consumed by both CronJobs via envFrom.
bedrock:
  region: "eu-west-1"
  modelId: "eu.anthropic.claude-haiku-4-5-20251001-v1:0"
  batchPrefix: "batch"
  minRecords: "100"
