# @format
# 30-minute LLM batch follow-up poller.
#
# Polls the Anthropic Batch API for batches submitted by the monthly import
# CronJob, retrieves completed results, and routes them (promote / alias /
# review-queue / skip). Self-scheduled (NOT admin-api dispatched).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ontology-importer-followup
  namespace: {{ .Values.namespace }}
  labels:
    app: ontology-importer
    component: followup
spec:
  schedule: {{ .Values.followup.schedule | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: {{ .Values.followup.activeDeadlineSeconds }}
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: ontology-importer
            component: followup
        spec:
          restartPolicy: Never
          serviceAccountName: {{ .Values.serviceAccount.name }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
          nodeSelector: {{- toYaml .Values.nodeSelector | nindent 12 }}
          {{- with .Values.tolerations }}
          tolerations: {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: followup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["node", "dist/run-llm-batch-followup.js"]
              env:
                - name: TRIGGERED_BY
                  value: {{ .Values.env.triggeredBy | quote }}
                - name: DEACTIVATION_THRESHOLD
                  value: {{ .Values.env.deactivationThreshold | quote }}
                - name: LOG_LEVEL
                  value: {{ .Values.env.logLevel | quote }}
                - name: AWS_REGION
                  value: {{ .Values.bedrock.region | quote }}
                - name: BEDROCK_MODEL_ID
                  value: {{ .Values.bedrock.modelId | quote }}
                - name: BATCH_S3_PREFIX
                  value: {{ .Values.bedrock.batchPrefix | quote }}
                - name: MIN_BATCH_RECORDS
                  value: {{ .Values.bedrock.minRecords | quote }}
              envFrom:
                - secretRef:
                    name: platform-rds-credentials
                # BEDROCK_BATCH_ROLE_ARN + BATCH_S3_BUCKET — synced from SSM
                # ParameterStore (/shared/ontology-importer/{env}/batch-role-arn
                # and /batch-bucket) by the ontology-importer-batch-config
                # ExternalSecret in external-secrets/. Single source of truth: CDK.
                - secretRef:
                    name: ontology-importer-batch-config
              resources: {{- toYaml .Values.followup.resources | nindent 16 }}
