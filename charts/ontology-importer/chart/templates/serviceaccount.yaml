# @format
# ServiceAccount mounted by ontology-importer CronJob pods.
#
# No AWS Pod Identity association is required: the importer uses ESO for its
# secrets (platform RDS creds + Anthropic API key) and calls the Anthropic API
# over HTTPS. It makes no AWS API calls that would need IRSA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: ontology-importer
