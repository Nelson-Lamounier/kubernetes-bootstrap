# @format
# Monthly full ontology import.
#
# Pulls package-registry data (committed pypi-top-5k seed), categorizes new
# technologies deterministically, and submits the uncertain tail to the
# Anthropic Batch API. Completed batches are picked up later by the follow-up
# CronJob. Self-scheduled (NOT admin-api dispatched).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ontology-importer-import
  namespace: {{ .Values.namespace }}
  labels:
    app: ontology-importer
    component: import
spec:
  schedule: {{ .Values.import.schedule | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: {{ .Values.import.activeDeadlineSeconds }}
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: ontology-importer
            component: import
        spec:
          restartPolicy: Never
          serviceAccountName: {{ .Values.serviceAccount.name }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
          nodeSelector: {{- toYaml .Values.nodeSelector | nindent 12 }}
          {{- with .Values.tolerations }}
          tolerations: {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: import
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["node", "dist/run-import.js"]
              env:
                - name: TRIGGERED_BY
                  value: {{ .Values.env.triggeredBy | quote }}
                - name: DEACTIVATION_THRESHOLD
                  value: {{ .Values.env.deactivationThreshold | quote }}
                - name: LOG_LEVEL
                  value: {{ .Values.env.logLevel | quote }}
              envFrom:
                - secretRef:
                    name: platform-rds-credentials
                - secretRef:
                    name: ontology-importer-secrets
              resources: {{- toYaml .Values.import.resources | nindent 16 }}
