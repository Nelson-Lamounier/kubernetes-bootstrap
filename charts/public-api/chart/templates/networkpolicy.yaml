{{/*
@format
public-api — NetworkPolicy

Default-deny with explicit allow from:
  - traefik namespace (Ingress traffic)
  - Prometheus monitoring namespace (scraping)
  - Same namespace (inter-pod communication)
*/}}

{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    # Allow the internet-facing ALB (Ingress class alb, target-type: ip) to
    # reach pods directly. ALB ENIs live in the public subnets; with the VPC
    # CNI network-policy agent this path is denied unless explicitly allowed,
    # which would take api.nelsonlamounier.com down. Kubelet probes originate
    # from node IPs in the same subnets, so this rule admits them too.
    # Mirrors the admin-api chart's pattern (live and ALB-proven for 59d).
    {{- with .Values.albSourceCidrs }}
    - from:
        {{- range . }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ $.Values.port }}
    {{- end }}
    # Allow HTTP traffic from Traefik ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: {{ .Values.port }}
    # Allow traffic from within the same namespace (sidecars)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.port }}
    # Allow Prometheus scraping from the monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.port }}
    # Allow in-cluster BFF calls from nextjs-app (server-to-server, no public exposure)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nextjs-app
      ports:
        - protocol: TCP
          port: {{ .Values.port }}
{{- end }}
