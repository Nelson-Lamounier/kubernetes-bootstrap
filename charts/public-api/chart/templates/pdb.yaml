{{- if .Values.pdb.enabled }}
# ---------------------------------------------------------------
# PodDisruptionBudget — protects public-api availability during
# voluntary disruptions (CA scale-down, spot reclamation, drain).
#
# maxUnavailable: 1 — allows Karpenter to evict one pod at a time for
# bin-packing. For replicas: 1, this permits brief eviction+reschedule;
# for replicas > 1, it guarantees at least one pod remains available.
# ---------------------------------------------------------------
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    platform.engineering/layer: bff
spec:
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
{{- end }}
