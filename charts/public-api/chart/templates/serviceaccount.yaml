{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name | default .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.serviceAccount.roleArn }}
  annotations:
    # IRSA: least-privilege identity for runtime AWS calls (Bedrock API key from
    # Secrets Manager). Replaces node-role-wide access. Role codified in CDK.
    eks.amazonaws.com/role-arn: {{ . | quote }}
  {{- end }}
{{- end }}
