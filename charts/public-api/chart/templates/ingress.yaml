{{- if .Values.ingress.enabled }}
# public-api ALB Ingress — folded into the shared `public` IngressGroup
# (Plan 5b § 0.6). Public traffic from the frontend BFF reaches the
# service via api.nelsonlamounier.com; AWS Managed Rules + per-IP rate
# limit are applied at the WebACL attached to the shared ALB by the
# admin-api Ingress (single owner of the `wafv2-acl-arn` annotation in
# the IngressGroup).
#
# Cert auto-discovered by Host-SAN match against the eu-west-1 ACM
# wildcard provisioned in `EksAlbCertsStack`. ExternalDNS upserts the
# Route53 alias from the hostname annotation.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.groupName | quote }}
    alb.ingress.kubernetes.io/group.order: {{ .Values.ingress.groupOrder | quote }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.healthcheckPath | quote }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.host | quote }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
