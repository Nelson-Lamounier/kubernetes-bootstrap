# @format
# ExternalSecret: platform-rds-credentials (public-api)
#
# Provides PostgreSQL connection credentials to public-api pods for the
# project case-study read path (projects + oauth_connections via PgBouncer).
# Mirrors charts/admin-api/external-secrets/platform-rds-credentials.yaml.
#
# ESO store: aws-secretsmanager (ambient EC2 instance profile auth)
# Secret path: k8s-development/platform-rds/credentials
# Namespace: public-api
#
# Consumers: public-api Deployment (PG_HOST, PG_PORT, PG_DATABASE, PG_USER,
# PG_PASSWORD env vars — required by src/lib/config.ts fail-fast).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-rds-credentials
  namespace: public-api
  annotations:
    kubernetes.io/description: "Platform RDS credentials for public-api from Secrets Manager — sensitive, 15m refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: platform-rds-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        PG_HOST: pgbouncer.platform.svc.cluster.local
        PG_PORT: "5432"
        PG_DATABASE: tucaken
        PG_USER: "{{ .username }}"
        PG_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: k8s-development/platform-rds/credentials
        property: password
