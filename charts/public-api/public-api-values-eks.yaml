# @format
# public-api — EKS overlay.
#
# Activates the ALB Ingress at api.nelsonlamounier.com (group.order 200
# per Plan 5b § 0.6). Sits on the shared `public` ALB; the WAF
# annotation lives on admin-api's Ingress (single owner per group).
#
# AWS Managed Rule Sets + 2000 req/5min/IP rate limit on this Host
# come from the WebACL provisioned in EksPublicWafStack.
ingress:
  enabled: true
  host: api.nelsonlamounier.com
  groupName: public
  groupOrder: 200
  healthcheckPath: /healthz

# ---------------------------------------------------------------------------
# Topology Spread Constraints — AZ resilience
# ---------------------------------------------------------------------------
# Active when replicas > 1. ScheduleAnyway prevents scheduling stalls on
# a single-AZ dev cluster while still nudging the scheduler toward balance.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: public-api
