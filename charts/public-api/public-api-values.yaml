# @format
# public-api — Development environment overrides
#
# Applied by ArgoCD on top of chart/values.yaml.
# This file is committed to Git (no sensitive values).
#
# All AWS credentials come from the EC2 Instance Profile (IMDS).
# The Kubernetes ConfigMap (public-api-config) is managed by deploy.py.

image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/public-api
  # tag: intentionally omitted — ArgoCD Image Updater writes the tag to
  #       chart/.argocd-source-public-api.yaml on every successful CI push.
  #       An empty string here produces "<repo>:" which Kubernetes rejects
  #       with InvalidImageName before even attempting an ECR pull.

replicas: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Re-enabled for EKS (2026-07-05): the kubeadm-era reason to disable it —
# Calico ignoring ipBlock for host-network Traefik — does not apply here.
# The ALB (target-type: ip) and kubelet probes are admitted by the
# albSourceCidrs ipBlock rule, the same pattern admin-api has run live.
networkPolicy:
  enabled: true
