# @format
# ExternalSecret: ingestion-secrets
#
# Provides the GitHub PAT to ingestion Jobs as the GITHUB_TOKEN env var.
# The PAT is stored in Secrets Manager as { "token": "ghp_..." } and is
# created/managed by the legacy CDK IngestionStack (bedrock-development/github-token).
# Phase 5 cleanup will move this secret out of CDK once the Lambda chain is gone.
#
# ESO store: aws-secretsmanager
# Secret path: bedrock-development/github-token
# Namespace: ingestion
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ingestion-secrets
  namespace: ingestion
  annotations:
    kubernetes.io/description: "GitHub PAT for ingestion Jobs — sensitive, 15m refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: ingestion-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        GITHUB_TOKEN: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: bedrock-development/github-token
        property: token
