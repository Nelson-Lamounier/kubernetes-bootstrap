# @format
# ExternalSecret: rds-credentials
#
# RDS password extracted from the Secrets Manager secret created by CDK
# fromGeneratedSecret('postgres'). The secret JSON contains:
#   { "username": "postgres", "password": "<auto-generated>", ... }
#
# ESO extracts only the "password" property — the Kubernetes Secret will
# contain a single key: RDS_PASSWORD.
#
# Consumed by the ingestion Job/CronJob via envFrom.secretRef: name: rds-credentials
# Combine with rds-config to get all five RDS_* env vars.
#
# Secret name pattern: {namePrefix}/rds-pgvector/credentials
# namePrefix for development = "bedrock-development"

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials
  namespace: ingestion
  annotations:
    kubernetes.io/description: "RDS pgvector password from Secrets Manager — sensitive, short refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: RDS_PASSWORD
      remoteRef:
        key: bedrock-development/rds-pgvector/credentials
        property: password
