# @format
# Headlamp admin identity:
#   ServiceAccount      headlamp-admin   — cluster-admin identity for human dashboard admins
#   ClusterRoleBinding                   — binds admin SA to cluster-admin
#
# There is intentionally NO standing SA-token Secret. A non-expiring
# cluster-admin token stored in a Secret (and copied to SSM) is a permanent
# credential that outlives any session and is exfiltrable via a single leaked
# string. Instead, mint a short-lived token on demand when you need write
# access from the Headlamp UI:
#
#   kubectl create token headlamp-admin -n headlamp --duration=1h
#
# Paste it into Headlamp's token prompt; it expires in an hour and leaves no
# standing credential behind. The headlamp-viewer identity (viewer.yaml)
# remains for read-only use and keeps its auto-pushed token for convenience.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: headlamp
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: headlamp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: {{ .Values.namespace }}
