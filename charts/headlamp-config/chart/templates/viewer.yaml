# @format
# Headlamp viewer identity:
#   ClusterRole        headlamp-viewer   — extends built-in `view` with cluster-scoped
#                                          resources Headlamp needs (nodes, PVs, namespaces)
#   ServiceAccount     headlamp-viewer   — identity for human dashboard users
#   ClusterRoleBinding                   — binds viewer SA to the ClusterRole above
#   Secret (sa-token)                    — non-expiring token auto-populated by K8s
---
# Built-in `view` ClusterRole covers namespace-scoped resources but excludes
# cluster-scoped resources (nodes, persistentvolumes) that Headlamp displays.
# This role aggregates `view` and adds read-only access to those resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp-viewer
  labels:
    app.kubernetes.io/name: headlamp-viewer
    app.kubernetes.io/part-of: headlamp
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.authorization.k8s.io/aggregate-to-view: "true"
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - persistentvolumes
      - namespaces
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - gatewayclasses
      - httproutes
      - grpcroutes
      - referencegrants
      - tcproutes
      - tlsroutes
    verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-viewer
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: headlamp-viewer
    app.kubernetes.io/part-of: headlamp
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-viewer
  labels:
    app.kubernetes.io/name: headlamp-viewer
    app.kubernetes.io/part-of: headlamp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: headlamp-viewer
subjects:
  - kind: ServiceAccount
    name: headlamp-viewer
    namespace: {{ .Values.namespace }}
---
# Non-expiring SA token — Kubernetes token controller auto-populates
# `.data.token` once the headlamp-viewer ServiceAccount exists.
# No manual `kubectl create token` or rotation needed.
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: headlamp-viewer-token
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: headlamp-viewer
    app.kubernetes.io/part-of: headlamp
  annotations:
    kubernetes.io/service-account.name: headlamp-viewer
