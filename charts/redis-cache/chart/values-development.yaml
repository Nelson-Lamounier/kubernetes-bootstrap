# @format
# Dev overrides for redis-cache.
# ArgoCD application references this file in spec.source.helm.valueFiles.

redis:
  master:
    # Dev pod sized small — cluster has finite headroom across all apps.
    resources:
      requests:
        memory: 256Mi
        cpu:    50m
      limits:
        memory: 512Mi
        cpu:    250m
    configuration: |-
      maxmemory 350mb
      maxmemory-policy allkeys-lru
      save ""
      appendonly no
      timeout 300
      tcp-keepalive 60
  metrics:
    serviceMonitor:
      enabled: true
