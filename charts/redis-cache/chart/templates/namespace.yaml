# @format
# Namespace for redis-cache. ArgoCD Application uses CreateNamespace=true
# as well; this template gives the namespace a stable label set for
# selectors (NetworkPolicy from client namespaces, monitoring, etc.).
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name:        redis-cache
    app.kubernetes.io/part-of:     data-plane
    tucaken.com/data-tier:         cache
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit:   restricted
    pod-security.kubernetes.io/warn:    restricted
