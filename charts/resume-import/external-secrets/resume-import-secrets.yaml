# @format
# ExternalSecret: resume-import-secrets
# Namespace: resume-import
#
# Optional — the Job pod declares this secretRef with optional:true.
# If the SSM key is absent (Tavily not configured), ESO leaves the Secret
# absent and the pod starts without TAVILY_API_KEY. The run-import.ts
# pipeline falls back to NoOpSearchTool and skips role enrichment gracefully.
#
# To enable Tavily enrichment, write the API key:
#   aws ssm put-parameter \
#     --name "/bedrock-dev/tavily-api-key" \
#     --value "<key>" \
#     --type SecureString --overwrite
# ESO will sync the Secret within refreshInterval (5m).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: resume-import-secrets
  namespace: resume-import
  annotations:
    kubernetes.io/description: "Optional Tavily API key for resume role enrichment — absent = enrichment skipped"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: resume-import-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: TAVILY_API_KEY
      remoteRef:
        key: /bedrock-dev/tavily-api-key
