# @format
# Live profile for tucaken.io (single-account setup — this cluster serves
# production traffic). Tuned for resilience at low resource cost: 2 replicas
# spread across AZs, ingress-locked, PDB-protected.
#
# NOTE: image.tag is intentionally absent here.
# ArgoCD Image Updater owns image.tag via its git write-back to
# .argocd-source-tucaken-app.yaml. Any static tag in this file (including
# a "PENDING" sentinel) creates a competing source of truth: ArgoCD's
# selfHeal loop re-applies the merged spec with the stale hardcoded value, so
# Argo Rollouts sees no image delta and restarts the pod in-place rather than
# spawning a green ReplicaSet.

image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/tucaken-app
  # tag: managed by ArgoCD Image Updater → .argocd-source-tucaken-app.yaml

# Two replicas = N+1 redundancy on the paid checkout path. With the PDB below
# (maxUnavailable: 1) at least one pod always stays up during node drains,
# Karpenter consolidation, and spot reclaim.
replicas: 2

# Per-pod footprint stays small — requests are what Karpenter reserves (cost),
# so they are kept low; limits allow short SSR bursts. Two pods reserve only
# 100m CPU / 256Mi memory in total.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 384Mi

# Sized for the blue/green peak: 2 active + 2 preview = 4 pods running at once.
#   requests: 4 × (50m / 128Mi) = 200m / 512Mi
#   limits:   4 × (300m / 384Mi) = 1200m / 1536Mi
# Quota carries headroom above those peaks so a rollout can never be quota-blocked.
resourceQuota:
  hard:
    requests.cpu: "600m"
    requests.memory: 768Mi
    limits.cpu: "1500m"
    limits.memory: 1792Mi
    persistentvolumeclaims: "1"

# ---------------------------------------------------------------------------
# Topology spread — keep the replicas apart so a single node/AZ loss cannot
# take out both.
#   · hostname: DoNotSchedule — HARD. Guarantees the two pods land on
#     different nodes (the cluster has spare nodes, so this is satisfiable
#     without adding capacity; if it ever isn't, Karpenter provisions a node).
#     Without this the scheduler bin-packs both pods onto one node and 2
#     replicas stop being real HA.
#   · zone: ScheduleAnyway — SOFT. Prefers AZ balance but won't stall
#     scheduling when an AZ has limited node capacity.
# ---------------------------------------------------------------------------
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: tucaken-app
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app: tucaken-app

# ---------------------------------------------------------------------------
# Argo Rollouts — BlueGreen. Manual promotion retained (autoPromotionEnabled:
# false) so a human gates each production swing after the analysis run passes.
# ---------------------------------------------------------------------------
rollout:
  blueGreen:
    autoPromotionEnabled: false
    autoPromotionSeconds: 120
    scaleDownDelaySeconds: 30

# Ingress-only NetworkPolicy — restricts inbound to Traefik + monitoring.
# It declares no egress rules, so outbound (Stripe API, Cognito JWKS,
# admin-api, SSM) is unaffected.
networkPolicy:
  enabled: true

# ── Observability ─────────────────────────────────────────────────────────────
# env stays 'development' deliberately: this single environment IS production,
# but the observability label is kept as 'development' for dashboard continuity
# (existing Grafana panels filter on env=development). logLevel is raised to
# info — debug is verbose + costly and can over-expose internals on a live site.
observability:
  env:      development
  logLevel: info
