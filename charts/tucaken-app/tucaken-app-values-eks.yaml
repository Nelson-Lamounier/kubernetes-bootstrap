# @format
# tucaken-app — EKS overlay.
#
# Activates the ALB Ingress with all 4 hostnames pointing at the same
# backend (Plan 5b § 0.6 — group.order 300). The ALB serves the right
# ACM cert per Host via SNI (wildcards in EksAlbCertsStack).
#
# Future enhancement: 301 redirect from .com / www to canonical
# tucaken.io via `alb.ingress.kubernetes.io/actions.*` annotations.
# V1 just serves all four equally.
ingress:
  enabled: true
  host: tucaken.io
  extraHosts:
    - www.tucaken.io
    - tucaken.com
    - www.tucaken.com
  groupName: public
  groupOrder: 300
  healthcheckPath: /readyz
  # WAF ACL ARN — keeps the eks-public-development WebACL attached to the
  # shared ALB through every LBC reconciliation. The ACL blocks all traffic
  # to tucaken.io/tucaken.com that does not originate from the allowed CIDR
  # (pre-launch IP gate). Drop the wafv2AclArn entry when going public.
  wafv2AclArn: "arn:aws:wafv2:eu-west-1:771826808455:regional/webacl/eks-public-development/f0f356dd-d955-4688-93c4-a4b4abba90bc"
