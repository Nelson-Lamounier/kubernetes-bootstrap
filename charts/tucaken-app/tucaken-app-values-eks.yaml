# @format
# tucaken-app — EKS overlay.
#
# Activates the ALB Ingress with all 4 hostnames pointing at the same
# backend (Plan 5b § 0.6 — group.order 300). The ALB serves the right
# ACM cert per Host via SNI (wildcards in EksAlbCertsStack).
#
# Future enhancement: 301 redirect from .com / www to canonical
# tucaken.io via `alb.ingress.kubernetes.io/actions.*` annotations.
# V1 just serves all four equally.
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilization: 70

ingress:
  enabled: true
  host: tucaken.io
  extraHosts:
    - www.tucaken.io
    - tucaken.com
    - www.tucaken.com
  groupName: public
  groupOrder: 300
  healthcheckPath: /readyz
  # WAF ACL ARN — set at deploy time by the waf-annotator PostSync Job,
  # which reads /k8s/<env>/eks/waf-acl-arn from SSM. Not stored here to
  # avoid hardcoding infrastructure ARNs in git. ArgoCD ignoreDifferences
  # prevents selfHeal from stripping the annotation between syncs.

wafAnnotator:
  ssmPath: "/k8s/development/eks/waf-acl-arn"
  # Pod Identity role ARN published to SSM by EksPublicWafStack.
  # Read via: aws ssm get-parameter --name /k8s/development/eks/waf-annotator-role-arn
  # Populated by deploy pipeline after EksPublicWafStack runs; not hardcoded here.
  roleArn: ""  # set by pipeline

# ---------------------------------------------------------------------------
# Topology Spread Constraints — node + AZ resilience.
# This file is the LAST valueFile loaded, so its array REPLACES the one in
# tucaken-app-values.yaml — the hostname rule must live here to take effect.
#   · hostname: DoNotSchedule — HARD. Guarantees the 2 replicas land on
#     different nodes (cluster has spare nodes, so satisfiable without new
#     capacity; Karpenter provisions only if none is free). Without this the
#     scheduler bin-packs both pods onto one node and 2 replicas aren't HA.
#   · zone: ScheduleAnyway — SOFT. Nudges AZ balance without stalling
#     scheduling when an AZ has limited node capacity.
# ---------------------------------------------------------------------------
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: tucaken-app
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app: tucaken-app

# ---------------------------------------------------------------------------
# Resource requests/limits — EKS baseline for accurate Karpenter bin-packing
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
