{{- if .Values.ingress.enabled }}
# tucaken-app ALB Ingress — folded into the shared `public`
# IngressGroup (Plan 5b § 0.6). Multiple hosts (tucaken.io,
# www.tucaken.io, tucaken.com, www.tucaken.com) map to the same
# backend Service via separate rule entries; the ALB serves the
# matching ACM cert per Host via SNI.
#
# Argo Rollouts blueGreen: ALB targets the active Service. Preview
# stays internal.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.groupName | quote }}
    alb.ingress.kubernetes.io/group.order: {{ .Values.ingress.groupOrder | quote }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.healthcheckPath | quote }}
    {{- if .Values.ingress.wafv2AclArn }}
    alb.ingress.kubernetes.io/wafv2-acl-arn: {{ .Values.ingress.wafv2AclArn | quote }}
    {{- end }}
    # ExternalDNS picks up every host listed (canonical + extras).
    external-dns.alpha.kubernetes.io/hostname: {{ printf "%s,%s" .Values.ingress.host (join "," .Values.ingress.extraHosts) | trimSuffix "," | quote }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: {{ .Values.service.port }}
{{- range .Values.ingress.extraHosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}
                port:
                  number: {{ $.Values.service.port }}
{{- end }}
{{- end }}
