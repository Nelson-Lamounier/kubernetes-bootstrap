# ---------------------------------------------------------------
# Blue/Green Rollout — Argo Rollouts progressive delivery
#
# Two full ReplicaSets run side by side:
#   activeService  → receives production traffic (tucaken-app)
#   previewService → receives zero traffic until promoted (tucaken-app-preview)
#
# Pre-promotion analysis queries Prometheus for error rate and
# P95 latency. If metrics breach thresholds, the rollout pauses
# and does NOT promote automatically.
#
# After manual promotion, the preview becomes active and the old
# ReplicaSet scales down after scaleDownDelaySeconds.
# ---------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: tucaken-app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tucaken-app.fullLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "tucaken-app.selectorLabels" . | nindent 6 }}
  strategy:
    blueGreen:
      activeService: tucaken-app
      previewService: tucaken-app-preview
      autoPromotionEnabled: {{ .Values.rollout.blueGreen.autoPromotionEnabled }}
      {{- if .Values.rollout.blueGreen.autoPromotionSeconds }}
      autoPromotionSeconds: {{ .Values.rollout.blueGreen.autoPromotionSeconds }}
      {{- end }}
      scaleDownDelaySeconds: {{ .Values.rollout.blueGreen.scaleDownDelaySeconds | default 30 }}
      prePromotionAnalysis:
        templates:
          - templateName: tucaken-app-bluegreen-analysis
        args:
          - name: service-name
            value: "tucaken-app"
  template:
    metadata:
      labels:
        {{- include "tucaken-app.fullLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tucaken-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.port }}
              name: http
              protocol: TCP
          env:
            # ── Service wiring ────────────────────────────────────────────
            # Explicit cluster-internal URL for the admin-api BFF.
            # Matches the ClusterIP Service: admin-api.admin-api.svc.cluster.local:3002.
            - name: ADMIN_API_URL
              value: "http://admin-api.admin-api:3002"
            # ── Observability (OTel SDK + pino + prom-client) ─────────────
            # The image preloads telemetry.js via `node --import` so the
            # SDK monkey-patches http/undici before server.js evaluates;
            # outbound fetches to admin-api therefore carry traceparent
            # without any per-callsite plumbing.
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.serviceName | quote }}
            - name: OTEL_SERVICE_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment={{ .Values.observability.env }},k8s.namespace.name={{ .Values.namespace }}"
            - name: DEPLOY_ENV
              value: {{ .Values.observability.env | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.observability.logLevel | quote }}
            {{- if .Values.observability.pyroscopeServer }}
            - name: PYROSCOPE_SERVER_ADDRESS
              value: {{ .Values.observability.pyroscopeServer | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.name }}
            # ESO syncs SSM into a K8s Secret (not a ConfigMap). optional: true
            # so the pod can start before the tucaken-app-config ExternalSecret
            # is provisioned.
            - secretRef:
                name: {{ .Values.config.name }}
                optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
      volumes:
        - name: tmp
          emptyDir: {}
