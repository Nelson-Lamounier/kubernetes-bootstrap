# ---------------------------------------------------------------
# IngressRoute — chart-managed with a placeholder origin secret.
#
# The CloudFront origin secret cannot live in git, so the rendered
# matchRule embeds a never-matching regex placeholder. The PostSync
# Job in templates/ingressroute-patcher.yaml then patches
# /spec/routes/0/match with the real value from the
# tucaken-cloudfront-origin-secret K8s Secret (hydrated by ESO).
#
# The argocd-apps/tucaken-app.yaml ignoreDifferences block stops
# selfHeal from reverting the patched matchRule.
# ---------------------------------------------------------------
{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tucaken-app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tucaken-app.fullLabels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.ingress.entryPoint }}
  routes:
    - match: "{{ if .Values.ingress.host }}Host(`{{ .Values.ingress.host }}`) && {{ end }}{{ .Values.ingress.matchRule }} && HeaderRegexp(`X-CloudFront-Origin-Secret`, `{{ .Values.cloudfront.originSecret }}`)"
      kind: Rule
      services:
        - name: tucaken-app
          port: {{ .Values.service.port }}
{{- end }}
