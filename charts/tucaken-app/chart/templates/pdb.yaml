{{- if .Values.pdb.enabled }}
# ---------------------------------------------------------------
# PodDisruptionBudget — maxUnavailable: 1 allows Karpenter to evict
# one pod at a time for bin-packing. For replicas > 1 it also
# guarantees at least one pod remains available during drains.
# ---------------------------------------------------------------
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tucaken-app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tucaken-app.fullLabels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "tucaken-app.selectorLabels" . | nindent 6 }}
{{- end }}
