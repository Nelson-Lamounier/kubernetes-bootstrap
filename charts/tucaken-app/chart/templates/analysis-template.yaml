# ---------------------------------------------------------------
# Pre-Promotion Analysis Template — Prometheus metric validation
#
# Runs during the blue/green pre-promotion phase. Queries the SLO
# recording rules that are already computed from ssr_requests_total
# and ssr_request_duration_seconds_bucket (prom-client, port 5001).
#
#   1. Error rate  — slo:tucaken-app:errors_ratio:rate5m < threshold
#   2. Latency bad ratio — fraction of requests > 1 s (SLO bucket le=1)
#                          must be below threshold
#
# Recording rules are defined in the monitoring chart
# (charts/monitoring/chart/templates/prometheus/rules-configmap.yaml)
# and are always available as long as Prometheus is up, even under
# zero traffic — isNaN() guards handle the no-data case safely.
#
# If either metric breaches its threshold, the AnalysisRun fails
# and the Rollout pauses — the preview is NOT promoted to active.
# ---------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: tucaken-app-bluegreen-analysis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tucaken-app.fullLabels" . | nindent 4 }}
spec:
  metrics:
    # ----- Error Rate: SLO recording rule (5xx / total, 5-min window) -----
    - name: error-rate
      interval: {{ .Values.rollout.analysis.interval }}
      count: {{ .Values.rollout.analysis.count }}
      failureLimit: {{ .Values.rollout.analysis.failureLimit }}
      consecutiveErrorLimit: {{ .Values.rollout.analysis.consecutiveErrorLimit }}
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090/prometheus
          query: |
            scalar(slo:tucaken-app:errors_ratio:rate5m)
      successCondition: "isNaN(result) || result < {{ .Values.rollout.analysis.errorRateThreshold }}"
    # ----- Latency bad ratio: fraction of requests exceeding the 1 s SLO bucket -----
    - name: latency-bad-ratio
      interval: {{ .Values.rollout.analysis.interval }}
      count: {{ .Values.rollout.analysis.count }}
      failureLimit: {{ .Values.rollout.analysis.failureLimit }}
      consecutiveErrorLimit: {{ .Values.rollout.analysis.consecutiveErrorLimit }}
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090/prometheus
          query: |
            scalar(slo:tucaken-app:latency_bad_ratio:rate5m)
      successCondition: "isNaN(result) || result < {{ .Values.rollout.analysis.latencyBadRatioThreshold }}"
