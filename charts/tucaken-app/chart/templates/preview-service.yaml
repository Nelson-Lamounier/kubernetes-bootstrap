# ---------------------------------------------------------------
# Preview Service — routes traffic to the preview (blue/green) ReplicaSet
#
# Argo Rollouts requires a separate "preview" Service for blue/green
# deployments. The new version's pods receive traffic through this
# Service during pre-promotion analysis.
#
# During rollout: preview pods ← tucaken-app-preview Service
#                 active pods  ← tucaken-app Service (unchanged)
# After promotion: all pods    ← tucaken-app Service
# ---------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: tucaken-app-preview
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tucaken-app.fullLabels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "tucaken-app.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
