# @format
# ExternalSecret: tucaken-app-secrets
#
# Syncs Cognito auth values from SSM into a K8s Secret consumed by the
# tucaken-app pod via envFrom.secretRef. Extend `data:` with additional
# tucaken-specific auth values as needed.
#
# Referenced by: charts/tucaken-app/chart/templates/rollout.yaml
#   envFrom.secretRef: name: tucaken-app-secrets

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tucaken-app-secrets
  namespace: tucaken-app
  annotations:
    kubernetes.io/description: "tucaken-app auth secrets from SSM"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: tucaken-app-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    # NOTE: Update SSM paths to tucaken-specific Cognito user pool when ready.
    # Until tucaken has its own Cognito pool, reuse the nextjs dev paths so
    # the pod can boot during initial migration.
    - secretKey: AUTH_COGNITO_DOMAIN
      remoteRef:
        key: /nextjs/development/auth/cognito-domain
    - secretKey: AUTH_COGNITO_ID
      remoteRef:
        key: /nextjs/development/auth/cognito-client-id
