# @format
# ExternalSecret: tucaken-app-secrets
#
# Syncs Cognito auth values from SSM into a K8s Secret consumed by the
# tucaken-app pod via envFrom.secretRef. Extend `data:` with additional
# tucaken-specific auth values as needed.
#
# Referenced by: charts/tucaken-app/chart/templates/rollout.yaml
#   envFrom.secretRef: name: tucaken-app-secrets

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tucaken-app-secrets
  namespace: tucaken-app
  annotations:
    kubernetes.io/description: "tucaken-app auth secrets from SSM"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: tucaken-app-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: AUTH_COGNITO_DOMAIN
      remoteRef:
        key: /nextjs/development/auth/cognito-domain
    # cognito-m2m.ts reads `COGNITO_DOMAIN` (no AUTH_ prefix) — alias the
    # same SSM key under that name to avoid renaming the existing one.
    - secretKey: COGNITO_DOMAIN
      remoteRef:
        key: /nextjs/development/auth/cognito-domain
    - secretKey: AUTH_COGNITO_ID
      remoteRef:
        key: /nextjs/development/auth/cognito-client-id
    - secretKey: AUTH_COGNITO_ISSUER_URL
      remoteRef:
        key: /nextjs/development/auth/cognito-issuer-url
    - secretKey: VITE_APP_URL
      remoteRef:
        key: /tucaken-app/development/app-url

    # ---------------------------------------------------------------------
    # Stripe (subscription billing)
    # ---------------------------------------------------------------------
    # Consumed by src/server/stripe.ts, src/server/billing.ts, and the
    # webhook handler. See docs/billing-integration.md in tucaken-app.
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: /tucaken-app/development/billing/stripe-secret-key
    - secretKey: VITE_STRIPE_PUBLISHABLE_KEY
      remoteRef:
        key: /tucaken-app/development/billing/stripe-publishable-key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: /tucaken-app/development/billing/stripe-webhook-secret
    - secretKey: STRIPE_PRICE_PRO_MONTHLY
      remoteRef:
        key: /tucaken-app/development/billing/price-pro-monthly
    - secretKey: STRIPE_PRICE_PRO_ANNUAL
      remoteRef:
        key: /tucaken-app/development/billing/price-pro-annual
    - secretKey: STRIPE_PRICE_PREMIUM_MONTHLY
      remoteRef:
        key: /tucaken-app/development/billing/price-premium-monthly
    - secretKey: STRIPE_PRICE_PREMIUM_ANNUAL
      remoteRef:
        key: /tucaken-app/development/billing/price-premium-annual

    # ---------------------------------------------------------------------
    # Cognito M2M (client_credentials for /api/internal/*)
    # ---------------------------------------------------------------------
    # Provisioned by scripts/setup-cognito-m2m.ts. The webhook handler
    # mints access tokens against the Cognito token endpoint and forwards
    # them as Bearer to admin-api.
    - secretKey: COGNITO_M2M_CLIENT_ID
      remoteRef:
        key: /tucaken-app/development/cognito-m2m/client-id
    - secretKey: COGNITO_M2M_CLIENT_SECRET
      remoteRef:
        key: /tucaken-app/development/cognito-m2m/client-secret
    - secretKey: COGNITO_M2M_SCOPE
      remoteRef:
        key: /tucaken-app/development/cognito-m2m/scope

    # ---------------------------------------------------------------------
    # App origin — used to build absolute return_url for Checkout / Portal
    # ---------------------------------------------------------------------
    - secretKey: APP_ORIGIN
      remoteRef:
        key: /tucaken-app/development/app-origin
