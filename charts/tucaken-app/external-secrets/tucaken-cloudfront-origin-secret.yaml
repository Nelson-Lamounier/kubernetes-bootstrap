# @format
# ExternalSecret: tucaken-cloudfront-origin-secret
#
# Hydrates the CloudFront origin secret into a K8s Secret in tucaken-app.
# Consumed at sync time by the ingressroute-patcher Job (Helm-rendered
# PostSync hook in charts/tucaken-app/chart/templates/ingressroute-patcher.yaml),
# which reads .data.value and rewrites the IngressRoute matchRule to embed
# the actual secret. This is independent from the portfolio
# (/k8s/{env}/cloudfront-origin-secret) — separate rotation lifecycle.
#
# Refresh: every 5 minutes — bounds the worst-case rotation window. After
# rotating /k8s/{env}/tucaken-cloudfront-origin-secret in SSM, trigger an
# ArgoCD sync of the tucaken-app Application to re-run the patcher Job;
# selfHeal does not auto-trigger on Secret content changes.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tucaken-cloudfront-origin-secret
  namespace: tucaken-app
  annotations:
    kubernetes.io/description: "CloudFront origin secret for Traefik IngressRoute matchRule — patched in by PostSync hook"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: tucaken-cloudfront-origin-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: value
      remoteRef:
        key: /k8s/development/tucaken-cloudfront-origin-secret
