# @format
# ExternalSecret: redis-broker-auth
#
# Source: SSM Parameter Store SecureString /k8s/development/redis-broker-auth.
# Seed manually one time:
#   aws ssm put-parameter \
#     --name /k8s/development/redis-broker-auth \
#     --type SecureString \
#     --value "$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-broker-auth
  namespace: redis-broker
  annotations:
    kubernetes.io/description: "Redis broker password from SSM SecureString — 15m refresh"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: redis-broker-auth
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      engineVersion: v2
      type: Opaque
      data:
        redis-password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: /k8s/development/redis-broker-auth
