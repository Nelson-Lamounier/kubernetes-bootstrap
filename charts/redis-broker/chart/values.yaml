# @format
# redis-broker — JOB QUEUE / PUB-SUB profile
#
# Design intent (do not change without re-reading):
#   • Durable. In-flight jobs survive pod restart.
#   • AOF persistence ON (appendonly yes, appendfsync everysec).
#   • noeviction — running out of memory is a louder failure than silent
#     job loss via eviction.
#   • EBS gp3 PVC. Snapshot via AWS Backup on the PVC tag (separate concern).
#   • PDB minAvailable: 1 — node consolidation must not orphan jobs.
#
# Pair: charts/redis-cache (ephemeral, allkeys-lru).

namespace: redis-broker

redis:
  # See charts/redis-cache/chart/values.yaml for the rationale.
  global:
    security:
      allowInsecureImages: true

  architecture: standalone
  fullnameOverride: redis-broker

  image:
    registry:   docker.io
    repository: bitnamilegacy/redis
    tag:        7.4.1-debian-12-r2

  auth:
    enabled: true
    existingSecret:            redis-broker-auth
    existingSecretPasswordKey: redis-password

  master:
    count: 1
    persistence:
      enabled:      true
      # Cluster exposes `ebs-sc` (ebs.csi.aws.com, WaitForFirstConsumer)
      # and in-tree `gp2`. No `gp3` class. ebs-sc is the CSI-backed
      # choice; its underlying volume type is set in the StorageClass.
      storageClass: ebs-sc
      size:         8Gi
      accessModes:
        - ReadWriteOnce
    resources:
      requests:
        memory: 512Mi
        cpu:    100m
      limits:
        memory: 1Gi
        cpu:    500m
    configuration: |-
      maxmemory 750mb
      maxmemory-policy noeviction
      save ""
      appendonly yes
      appendfsync everysec
      auto-aof-rewrite-percentage 100
      auto-aof-rewrite-min-size 64mb
      timeout 0
      tcp-keepalive 60
    pdb:
      create:       true
      minAvailable: 1

  replica:
    replicaCount: 0

  # redis_exporter sidecar — upstream oliver006 image (bitnamilegacy tags were
  # purged after Broadcom's Aug-2025 Bitnami catalog change). Annotation-driven
  # scrape (no Prometheus Operator): the metrics Service carries
  # prometheus.io/scrape so the kubernetes-service-endpoints job scrapes port
  # 9121. Enabled per-env (true in values-development.yaml).
  metrics:
    enabled: false
    image:
      registry:   docker.io
      repository: oliver006/redis_exporter
      tag:        v1.67.0-alpine
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9121"
        prometheus.io/path:   "/metrics"
    serviceMonitor:
      # Cluster runs Grafana-only (no Prometheus Operator CRDs).
      enabled:     false
      namespace:   monitoring
      honorLabels: true
      labels:
        release: kube-prometheus-stack

  networkPolicy:
    enabled:        true
    allowExternal:  false
    ingressNSMatchLabels:
      tucaken.com/redis-broker-client: "true"
    ingressNSPodMatchLabels: {}
